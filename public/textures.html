<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Synthestasia Texture Workshop</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a1a; color:#c8c0b0; font-family:'Courier New',monospace; padding:20px; overflow-y:auto; }
h1 { font-size:13px; font-weight:400; color:#f0a500; margin-bottom:2px; letter-spacing:1.5px; text-transform:uppercase; }
h1 span { color:#706860; font-weight:normal; }
.subtitle { font-size:0.7em; color:#706860; margin-bottom:16px; }

/* Two-panel layout */
.workshop { display:flex; gap:16px; height:calc(100vh - 80px); }
.left-panel { width:320px; min-width:280px; overflow-y:auto; padding-right:8px; flex-shrink:0; }
.right-panel { flex:1; overflow-y:auto; display:flex; flex-direction:column; }

/* Category sections */
.cat-section { margin-bottom:8px; }
.cat-header { font-size:0.65em; color:#f0a500; text-transform:uppercase; letter-spacing:2px; margin-bottom:4px; padding-bottom:2px; border-bottom:1px dashed #333; }
.thumb-grid { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:4px; }
.thumb { width:86px; cursor:pointer; text-align:center; border:2px solid transparent; border-radius:6px; padding:3px; transition:all 0.2s; background:#1f1f1f; }
.thumb:hover { border-color:#555; background:#252525; }
.thumb.active { border-color:#f0a500; background:#252525; box-shadow:0 0 12px rgba(240,165,0,0.15); }
.thumb canvas { display:block; margin:0 auto 2px; border-radius:3px; }
.thumb .tname { font-size:0.6em; color:#888; line-height:1.1; }
.thumb.active .tname { color:#f0a500; font-weight:bold; }

/* Controls */
.ctrl-bar { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; align-items:flex-end; padding:8px 12px; background:#1f1f1f; border:1px dashed #333; border-radius:8px; }
.ctrl { display:flex; flex-direction:column; gap:1px; }
.ctrl label { font-size:0.6em; color:#706860; letter-spacing:0.5px; }
.ctrl input, .ctrl select { background:#252525; color:#c8c0b0; border:1px dashed #333; padding:2px 5px; border-radius:4px; font-size:0.75em; }
.ctrl input[type=range] { width:85px; accent-color:#f0a500; }
.ctrl-val { font-size:0.6em; color:#f0a500; min-width:18px; text-align:center; }
.btn { border:none; padding:5px 14px; border-radius:4px; cursor:pointer; font-weight:bold; font-size:0.75em; letter-spacing:0.5px; transition:all 0.15s; }
.btn-gen { background:#f0a500; color:#1a1a1a; }
.btn-gen:hover { background:#a87200; }
.btn-all { background:#0f0; color:#1a1a1a; }
.btn-all:hover { background:#0d0; }

/* Map output */
.maps-header { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
.maps-label { font-size:0.7em; color:#706860; text-transform:uppercase; letter-spacing:2px; }
.canvases { display:flex; flex-wrap:wrap; gap:8px; }
.map-card { background:#1f1f1f; border:1px dashed #333; border-radius:8px; padding:6px; text-align:center; }
.map-card canvas { border:1px solid #222; cursor:pointer; display:block; margin:0 auto; border-radius:4px; }
.map-card .label { font-size:0.6em; color:#f0a500; margin:4px 0 3px; letter-spacing:0.5px; }
.map-card button { background:#252525; color:#f0a500; border:1px dashed #333; padding:2px 8px; border-radius:4px; cursor:pointer; font-size:0.6em; font-weight:bold; transition:all 0.15s; }
.map-card button:hover { background:#f0a500; color:#1a1a1a; }
.checker { background-image:linear-gradient(45deg,#252525 25%,transparent 25%),linear-gradient(-45deg,#252525 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#252525 75%),linear-gradient(-45deg,transparent 75%,#252525 75%);background-size:14px 14px;background-position:0 0,0 7px,7px -7px,-7px 0; }

/* Scrollbar styling */
.left-panel::-webkit-scrollbar, .right-panel::-webkit-scrollbar { width:6px; }
.left-panel::-webkit-scrollbar-track, .right-panel::-webkit-scrollbar-track { background:#1a1a1a; }
.left-panel::-webkit-scrollbar-thumb, .right-panel::-webkit-scrollbar-thumb { background:#333; border-radius:3px; }
.left-panel::-webkit-scrollbar-thumb:hover, .right-panel::-webkit-scrollbar-thumb:hover { background:#444; }
</style>
</head><body>
<h1>SYNTHESTASIA <span>texture workshop</span></h1>

<div class="workshop">
  <div class="left-panel" id="shapeGrid"></div>

  <div class="right-panel">
    <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
      <button class="btn btn-gen" onclick="saveSet()" style="background:#f0a;color:#1a1a1a;font-size:0.8em;padding:6px 16px;">Save Set to Visualizer</button>
      <button class="btn" onclick="resetShape()" style="background:#252525;color:#f0a500;border:1px dashed #f0a500;font-size:0.8em;padding:6px 16px;">Reset Shape</button>
      <button class="btn" onclick="exportPalette()" style="background:#252525;color:#c8c0b0;border:1px dashed #333;font-size:0.8em;padding:6px 16px;" title="Download palette as shareable file">Export Palette</button>
      <button class="btn" onclick="document.getElementById('import-file').click()" style="background:#252525;color:#c8c0b0;border:1px dashed #333;font-size:0.8em;padding:6px 16px;" title="Load palette from file">Import Palette</button>
      <input type="file" id="import-file" accept=".synth-tex,.json" style="display:none" onchange="importPalette(this)">
    </div>
    <div class="ctrl-bar">
      <div class="ctrl"><label>Size</label><select id="sz"><option value="512">512</option><option value="1024" selected>1024</option><option value="2048">2048</option></select></div>
      <div class="ctrl"><label>Complexity</label><input type="range" id="complexity" min="3" max="50" value="14"><span class="ctrl-val" id="complexityV">14</span></div>
      <div class="ctrl"><label>Segments</label><input type="range" id="segs" min="3" max="80" value="24"><span class="ctrl-val" id="segsV">24</span></div>
      <div class="ctrl"><label>Thickness</label><input type="range" id="thick" min="3" max="80" value="25"><span class="ctrl-val" id="thickV">25</span></div>
      <div class="ctrl"><label>Chaos</label><input type="range" id="chaos" min="0" max="100" value="40"><span class="ctrl-val" id="chaosV">40</span></div>
      <div class="ctrl"><label>Detail</label><input type="range" id="detail" min="0" max="100" value="50"><span class="ctrl-val" id="detailV">50</span></div>
      <div class="ctrl"><label>Void</label><input type="range" id="void" min="0" max="60" value="10"><span class="ctrl-val" id="voidV">10</span></div>
      <div class="ctrl"><label>Rotation</label><input type="range" id="rot" min="0" max="360" value="0"><span class="ctrl-val" id="rotV">0</span></div>
      <div class="ctrl"><label>Noise</label><input type="range" id="noiseAmt" min="0" max="100" value="40"><span class="ctrl-val" id="noiseAmtV">40</span></div>
      <div class="ctrl"><label>Edge Blur</label><input type="range" id="edgeBlur" min="1" max="30" value="8"><span class="ctrl-val" id="edgeBlurV">8</span></div>
      <div class="ctrl"><label>Seed</label><input type="number" id="seed" value="42" style="width:50px"></div>
      <button class="btn btn-gen" onclick="generate()">Generate</button>
      <button class="btn btn-all" onclick="downloadAll()">Download All</button>
    </div>

    <div class="maps-header">
      <div class="maps-label" id="mapsTitle">Maps</div>
    </div>
    <div class="canvases" id="cards"></div>
  </div>
</div>

<script>
// ===== PRNG & NOISE =====
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
let rng=mulberry32(42);
function makeNoise(seed){const r=mulberry32(seed);const p=new Uint8Array(512);for(let i=0;i<256;i++)p[i]=i;for(let i=255;i>0;i--){const j=(r()*(i+1))|0;[p[i],p[j]]=[p[j],p[i]]}for(let i=0;i<256;i++)p[i+256]=p[i];const g=new Float32Array(256);for(let i=0;i<256;i++)g[i]=r()*2-1;return function(x,y){const xi=Math.floor(x)&255,yi=Math.floor(y)&255;const xf=x-Math.floor(x),yf=y-Math.floor(y);const u=xf*xf*(3-2*xf),v=yf*yf*(3-2*yf);const a=p[xi]+yi,b=p[xi+1]+yi;return g[p[a]]+u*(g[p[b]]-g[p[a]])+v*(g[p[a+1]]-g[p[a]])+u*v*(g[p[a]]-g[p[b]]-g[p[a+1]]+g[p[b+1]])}}
function hsl2rgb(h,s,l){s/=100;l/=100;const c=(1-Math.abs(2*l-1))*s;const x=c*(1-Math.abs((h/60)%2-1));const m=l-c/2;let r,g,b;if(h<60){r=c;g=x;b=0}else if(h<120){r=x;g=c;b=0}else if(h<180){r=0;g=c;b=x}else if(h<240){r=0;g=x;b=c}else if(h<300){r=x;g=0;b=c}else{r=c;g=0;b=x}return[Math.round((r+m)*255),Math.round((g+m)*255),Math.round((b+m)*255)]}

// ===== SHAPES =====
const SHAPES = {
  jinxed:{name:'Jinxed',cat:'Mechanical'},
  gearwork:{name:'Gearwork',cat:'Mechanical'},
  motherboard:{name:'Motherboard',cat:'Mechanical'},
  circuitboard:{name:'Circuit Board',cat:'Mechanical'},
  clockwork:{name:'Clockwork',cat:'Mechanical'},

  flowerOfLife:{name:'Flower of Life',cat:'Sacred'},
  sriYantra:{name:'Sri Yantra',cat:'Sacred'},
  mandala:{name:'Mandala',cat:'Sacred'},
  metatron:{name:'Metatron',cat:'Sacred'},
  hexfield:{name:'Hex Field',cat:'Sacred'},

  mycelium:{name:'Mycelium',cat:'Organic'},
  voronoi:{name:'Voronoi',cat:'Organic'},
  coral:{name:'Coral',cat:'Organic'},
  erosion:{name:'Erosion',cat:'Organic'},
  tree:{name:'Tree of Life',cat:'Organic'},

  spirograph:{name:'Spirograph',cat:'Mathematical'},
  lissajous:{name:'Lissajous',cat:'Mathematical'},
  moire:{name:'Moiré',cat:'Mathematical'},
  topography:{name:'Topography',cat:'Mathematical'},
  sierpinski:{name:'Sierpinski',cat:'Fractal'},
  kochSnow:{name:'Koch Snowflake',cat:'Fractal'},
  julia:{name:'Julia Set',cat:'Fractal'},
  dragonCurve:{name:'Dragon Curve',cat:'Fractal'},

  cathedral:{name:'Cathedral',cat:'Architectural'},
  shatter:{name:'Shatter',cat:'Architectural'},
  lattice:{name:'Lattice',cat:'Architectural'},
  labyrinth:{name:'Labyrinth',cat:'Architectural'},
  cityscape:{name:'Cityscape',cat:'Architectural'},

  escherTile:{name:'Escher Tile',cat:'Escher'},
  escherSpiral:{name:'Escher Spiral',cat:'Escher'},
  impossible:{name:'Impossible',cat:'Escher'},
  tessellation:{name:'Tessellation',cat:'Escher'},
};

let currentShape = 'jinxed';

// Per-shape slider settings — each shape remembers its own values
const SLIDER_IDS = ['complexity','segs','thick','chaos','detail','void','rot','noiseAmt','edgeBlur','seed'];
const SLIDER_DEFAULTS = {complexity:14,segs:24,thick:25,chaos:40,detail:50,void:10,rot:0,noiseAmt:40,edgeBlur:8,seed:42};
const shapeSettings = {};
// Initialize all shapes with defaults
for (const id of Object.keys(SHAPES)) shapeSettings[id] = {...SLIDER_DEFAULTS};

function saveCurrentSliders() {
  const s = shapeSettings[currentShape];
  for (const id of SLIDER_IDS) s[id] = +(document.getElementById(id).value);
}

function loadSlidersForShape(id) {
  const s = shapeSettings[id] || SLIDER_DEFAULTS;
  for (const sid of SLIDER_IDS) {
    const el = document.getElementById(sid);
    el.value = s[sid];
    const vEl = document.getElementById(sid + 'V');
    if (vEl) vEl.textContent = s[sid];
  }
}

function resetShape() {
  shapeSettings[currentShape] = {...SLIDER_DEFAULTS};
  loadSlidersForShape(currentShape);
  generate();
}

function getP(){return{sz:+document.getElementById('sz').value,complexity:+document.getElementById('complexity').value,segs:+document.getElementById('segs').value,thick:+document.getElementById('thick').value/100,chaos:+document.getElementById('chaos').value/100,detail:+document.getElementById('detail').value/100,voidR:+document.getElementById('void').value/100,rot:+document.getElementById('rot').value*Math.PI/180,noiseAmt:+document.getElementById('noiseAmt').value/100,edgeBlur:+document.getElementById('edgeBlur').value,seed:+document.getElementById('seed').value}}

// ===== SHAPE DRAW FUNCTIONS =====
function drawShape(sz, p) {
  const c = document.createElement('canvas'); c.width=c.height=sz;
  const ctx = c.getContext('2d');
  rng = mulberry32(p.seed);
  const cx=sz/2, cy=sz/2, maxR=sz*0.44, minR=maxR*p.voidR;
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(p.rot); ctx.translate(-cx,-cy);
  ctx.strokeStyle='#fff'; ctx.fillStyle='#fff'; ctx.lineCap='round';
  if(shapeFns[currentShape]) shapeFns[currentShape](ctx, sz, cx, cy, maxR, minR, p);
  ctx.restore();
  return c;
}

const shapeFns = {

// ========== MECHANICAL ==========
jinxed(ctx, sz, cx, cy, maxR, minR, p) {
  for(let r=0;r<p.complexity;r++){
    const t=r/p.complexity, innerR=minR+(maxR-minR)*t;
    const outerR=innerR+(maxR-minR)/p.complexity*p.thick*(1+rng()*0.5);
    const nSegs=Math.max(4,p.segs+Math.floor((rng()-0.5)*p.segs*p.chaos));
    const segA=(Math.PI*2)/nSegs, ringOff=rng()*Math.PI*2;
    for(let s=0;s<nSegs;s++){
      if(rng()<p.chaos*0.3)continue;
      const sA=ringOff+s*segA, eA=sA+segA*(1-rng()*p.chaos*0.4);
      ctx.beginPath();ctx.arc(cx,cy,outerR,sA,eA);ctx.arc(cx,cy,innerR,eA,sA,true);ctx.closePath();ctx.fill();
      if(p.detail>0&&rng()<p.detail){const mA=(sA+eA)/2,mR=(innerR+outerR)/2,sx=cx+Math.cos(mA)*mR,sy=cy+Math.sin(mA)*mR;ctx.save();ctx.translate(sx,sy);ctx.rotate(mA);const sw=(outerR-innerR)*0.3*(0.5+rng()*0.5),sh=segA*mR*0.2*(0.5+rng()*0.5);if(rng()<0.5)ctx.clearRect(-sw/2,-sh/2,sw,sh);else ctx.fillRect(-sw*0.8,-sh*0.3,sw*0.4,sh*0.6);ctx.restore()}
      if(p.detail>0.3&&rng()<p.detail*0.6){const tA=sA+rng()*(eA-sA),tR1=innerR+rng()*(outerR-innerR)*0.3,tR2=outerR-rng()*(outerR-innerR)*0.3;ctx.beginPath();ctx.moveTo(cx+Math.cos(tA)*tR1,cy+Math.sin(tA)*tR1);ctx.lineTo(cx+Math.cos(tA)*tR2,cy+Math.sin(tA)*tR2);ctx.lineWidth=1+rng()*2;ctx.stroke()}
    }
    if(r>0&&rng()<0.4+p.detail*0.4){for(let l=0;l<2+Math.floor(rng()*4);l++){const la=rng()*Math.PI*2;ctx.beginPath();ctx.moveTo(cx+Math.cos(la)*(innerR-2),cy+Math.sin(la)*(innerR-2));ctx.lineTo(cx+Math.cos(la)*(innerR+(outerR-innerR)*0.5),cy+Math.sin(la)*(innerR+(outerR-innerR)*0.5));ctx.lineWidth=0.5+rng()*1.5;ctx.stroke()}}
  }
},

gearwork(ctx, sz, cx, cy, maxR, minR, p) {
  const nGears=Math.max(2,Math.floor(p.complexity/3));
  for(let g=0;g<nGears;g++){
    const gr=minR+(maxR-minR)*(g+0.5)/nGears;const teeth=Math.max(6,p.segs-Math.floor(rng()*p.segs*p.chaos*0.5));const toothH=(maxR-minR)/nGears*p.thick*0.6;const innerGR=gr-toothH/2,outerGR=gr+toothH/2;const gOff=rng()*Math.PI*2;
    ctx.beginPath();ctx.arc(cx,cy,innerGR+toothH*0.2,0,Math.PI*2);ctx.lineWidth=toothH*0.3;ctx.stroke();
    for(let t=0;t<teeth;t++){const a=gOff+(t/teeth)*Math.PI*2,aw=(Math.PI*2/teeth)*0.35;ctx.beginPath();ctx.arc(cx,cy,outerGR,a-aw,a+aw);ctx.arc(cx,cy,innerGR,a+aw,a-aw,true);ctx.closePath();ctx.fill()}
    if(p.detail>0.2){const nS=3+Math.floor(rng()*5*p.detail);for(let s=0;s<nS;s++){const sa=gOff+s/nS*Math.PI*2;ctx.beginPath();ctx.moveTo(cx+Math.cos(sa)*minR*0.3,cy+Math.sin(sa)*minR*0.3);ctx.lineTo(cx+Math.cos(sa)*innerGR,cy+Math.sin(sa)*innerGR);ctx.lineWidth=1+rng()*2;ctx.stroke()}}
    if(g===0){ctx.save();ctx.globalCompositeOperation='destination-out';ctx.beginPath();ctx.arc(cx,cy,minR*0.25+rng()*minR*0.1,0,Math.PI*2);ctx.fill();ctx.restore()}
    if(p.detail>0.4){const nB=4+Math.floor(rng()*4);for(let b=0;b<nB;b++){const ba=gOff+b/nB*Math.PI*2;ctx.beginPath();ctx.arc(cx+Math.cos(ba)*gr,cy+Math.sin(ba)*gr,2+rng()*3,0,Math.PI*2);ctx.fill()}}
  }
},

motherboard(ctx, sz, cx, cy, maxR, minR, p) {
  const gridN=Math.max(4,p.segs),cellSz=(maxR*2)/gridN,startX=cx-maxR,startY=cy-maxR;
  for(let i=0;i<gridN;i++)for(let j=0;j<gridN;j++){
    const x=startX+i*cellSz,y=startY+j*cellSz,dx=x+cellSz/2-cx,dy=y+cellSz/2-cy;
    if(Math.sqrt(dx*dx+dy*dy)>maxR||rng()<p.chaos*0.4)continue;
    if(rng()<0.6+p.detail*0.3){ctx.beginPath();ctx.moveTo(x,y+cellSz/2);ctx.lineTo(x+cellSz*(0.5+rng()*0.5),y+cellSz/2);ctx.lineWidth=1+rng()*2*p.thick;ctx.stroke()}
    if(rng()<0.5+p.detail*0.3){ctx.beginPath();ctx.moveTo(x+cellSz/2,y);ctx.lineTo(x+cellSz/2,y+cellSz*(0.5+rng()*0.5));ctx.lineWidth=1+rng()*2*p.thick;ctx.stroke()}
    if(rng()<p.detail*0.5){const pr=2+rng()*4*p.thick;ctx.beginPath();ctx.arc(x+cellSz/2,y+cellSz/2,pr,0,Math.PI*2);ctx.fill()}
    if(rng()<p.detail*0.15){const cw=cellSz*0.6*(0.5+rng()*0.5),ch=cellSz*0.4*(0.5+rng()*0.5);ctx.fillRect(x+cellSz/2-cw/2,y+cellSz/2-ch/2,cw,ch);const nP=2+Math.floor(rng()*4);for(let pin=0;pin<nP;pin++){const px=x+cellSz/2-cw/2+cw*(pin+0.5)/nP;ctx.beginPath();ctx.moveTo(px,y+cellSz/2-ch/2);ctx.lineTo(px,y+cellSz/2-ch/2-cellSz*0.15);ctx.lineWidth=1;ctx.stroke();ctx.beginPath();ctx.moveTo(px,y+cellSz/2+ch/2);ctx.lineTo(px,y+cellSz/2+ch/2+cellSz*0.15);ctx.stroke()}}
  }
  ctx.save();ctx.globalCompositeOperation='destination-in';ctx.beginPath();ctx.arc(cx,cy,maxR,0,Math.PI*2);ctx.fill();ctx.restore();
},

circuitboard(ctx, sz, cx, cy, maxR, minR, p) {
  const gridN=Math.max(8,Math.floor(p.segs*1.2)),cellSz=maxR*2/gridN,startX=cx-maxR,startY=cy-maxR;const noise=makeNoise(p.seed+777);
  for(let i=0;i<gridN;i++)for(let j=0;j<gridN;j++){
    const x=startX+i*cellSz,y=startY+j*cellSz,dx=x+cellSz/2-cx,dy=y+cellSz/2-cy;
    if(Math.sqrt(dx*dx+dy*dy)>maxR||rng()<p.chaos*0.25)continue;
    if(rng()<0.7){ctx.beginPath();const midX=x+cellSz*(0.3+rng()*0.4),endY=y+cellSz*(0.2+rng()*0.6);ctx.moveTo(x,y+cellSz*(0.3+rng()*0.4));ctx.lineTo(midX,y+cellSz*(0.3+rng()*0.4));ctx.lineTo(midX,endY);ctx.lineTo(x+cellSz,endY);ctx.lineWidth=0.8+p.thick*2;ctx.stroke()}
    if(rng()<p.detail*0.4){const vr=2+p.thick*3,vx=x+cellSz*(0.2+rng()*0.6),vy=y+cellSz*(0.2+rng()*0.6);ctx.beginPath();ctx.arc(vx,vy,vr,0,Math.PI*2);ctx.fill();if(p.detail>0.3){ctx.save();ctx.globalCompositeOperation='destination-out';ctx.beginPath();ctx.arc(vx,vy,vr*0.4,0,Math.PI*2);ctx.fill();ctx.restore()}}
    if(rng()<p.detail*0.08){const cw=cellSz*(0.8+rng()*0.8),ch=cellSz*(0.5+rng()*0.5),chipX=x+cellSz/2-cw/2,chipY=y+cellSz/2-ch/2;ctx.fillRect(chipX,chipY,cw,ch);const nP=4+Math.floor(rng()*8);for(let pin=0;pin<nP;pin++){const px=chipX+cw*(pin+0.5)/nP;ctx.beginPath();ctx.moveTo(px,chipY);ctx.lineTo(px,chipY-cellSz*0.2);ctx.lineWidth=1+p.thick;ctx.stroke();ctx.beginPath();ctx.moveTo(px,chipY+ch);ctx.lineTo(px,chipY+ch+cellSz*0.2);ctx.stroke()}}
    if(rng()<p.detail*0.2){ctx.fillRect(x+rng()*cellSz*0.6,y+rng()*cellSz*0.6,3+rng()*6*p.thick,2+rng()*3*p.thick)}
  }
  ctx.save();ctx.globalCompositeOperation='destination-in';ctx.beginPath();ctx.arc(cx,cy,maxR,0,Math.PI*2);ctx.fill();ctx.restore();
},

clockwork(ctx, sz, cx, cy, maxR, minR, p) {
  const nF=Math.max(2,Math.floor(p.complexity/4));
  for(let f=0;f<nF;f++){
    const fr=minR+(maxR-minR)*(f+0.5)/nF,tickR=fr*0.9,tickRI=fr*0.75,nT=12+Math.floor(rng()*p.segs*0.5),fOff=rng()*Math.PI*2;
    ctx.beginPath();ctx.arc(cx,cy,fr,0,Math.PI*2);ctx.lineWidth=1+p.thick*3;ctx.stroke();
    for(let t=0;t<nT;t++){const ta=fOff+t/nT*Math.PI*2,isM=t%Math.max(1,Math.floor(nT/12))===0,ri=isM?tickRI*0.9:tickRI;ctx.beginPath();ctx.moveTo(cx+Math.cos(ta)*ri,cy+Math.sin(ta)*ri);ctx.lineTo(cx+Math.cos(ta)*tickR,cy+Math.sin(ta)*tickR);ctx.lineWidth=isM?2+p.thick*2:1;ctx.stroke();if(isM&&p.detail>0.3){ctx.beginPath();ctx.arc(cx+Math.cos(ta)*ri*0.92,cy+Math.sin(ta)*ri*0.92,2+rng()*2,0,Math.PI*2);ctx.fill()}}
    if(p.detail>0.2){const hA=fOff+rng()*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(hA)*fr*0.7,cy+Math.sin(hA)*fr*0.7);ctx.lineWidth=2+p.thick*3;ctx.stroke();const h2A=fOff+rng()*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(h2A)*fr*0.5,cy+Math.sin(h2A)*fr*0.5);ctx.lineWidth=3+p.thick*4;ctx.stroke()}
    ctx.beginPath();ctx.arc(cx,cy,3+p.thick*5,0,Math.PI*2);ctx.fill();
  }
},

// ========== SACRED ==========
flowerOfLife(ctx, sz, cx, cy, maxR, minR, p) {
  const baseR=maxR/(1+p.complexity*0.15),layers=Math.max(1,Math.floor(p.complexity/3));
  ctx.lineWidth=1+p.thick*3;
  ctx.beginPath();ctx.arc(cx,cy,baseR,0,Math.PI*2);ctx.stroke();
  let pts=[{x:cx,y:cy}];
  for(let layer=0;layer<layers;layer++){
    const nw=[];
    for(const pt of pts)for(let i=0;i<6;i++){
      const a=i*Math.PI/3+(layer%2?Math.PI/6:0),nx=pt.x+Math.cos(a)*baseR,ny=pt.y+Math.sin(a)*baseR;
      if(Math.sqrt((nx-cx)**2+(ny-cy)**2)>maxR||rng()<p.chaos*0.2)continue;
      ctx.beginPath();ctx.arc(nx,ny,baseR*(0.8+rng()*0.4*p.chaos),0,Math.PI*2);ctx.stroke();
      if(p.detail>0.5&&rng()<0.3){ctx.beginPath();ctx.arc(nx,ny,baseR*0.15,0,Math.PI*2);ctx.fill()}
      nw.push({x:nx,y:ny});
    }
    pts=nw.slice(0,50);
  }
  ctx.beginPath();ctx.arc(cx,cy,maxR,0,Math.PI*2);ctx.lineWidth=2+p.thick*4;ctx.stroke();
},

sriYantra(ctx, sz, cx, cy, maxR, minR, p) {
  const nT=Math.max(3,Math.floor(p.complexity*0.7));ctx.lineWidth=1.5+p.thick*3;
  for(let t=0;t<nT;t++){
    const pr=t/nT,r=minR+(maxR-minR)*(1-pr*0.8),up=t%2===0,bOff=(up?-Math.PI/2:Math.PI/2)+rng()*p.chaos*0.3,sh=0.6+pr*0.3+rng()*p.chaos*0.15;
    ctx.beginPath();for(let i=0;i<3;i++){const a=bOff+i*Math.PI*2/3,px=cx+Math.cos(a)*r*sh,py=cy+Math.sin(a)*r*sh;i===0?ctx.moveTo(px,py):ctx.lineTo(px,py)}ctx.closePath();ctx.stroke();
    if(p.detail>0.4&&rng()<p.detail){for(let i=0;i<3;i++){const a=bOff+i*Math.PI*2/3,a2=bOff+((i+1)%3)*Math.PI*2/3,mx=(Math.cos(a)+Math.cos(a2))/2*r*sh,my=(Math.sin(a)+Math.sin(a2))/2*r*sh;ctx.beginPath();ctx.arc(cx+mx,cy+my,2+rng()*3,0,Math.PI*2);ctx.fill()}}
  }
  ctx.beginPath();ctx.arc(cx,cy,4+p.thick*6,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cx,cy,maxR,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.arc(cx,cy,maxR*0.95,0,Math.PI*2);ctx.stroke();
},

mandala(ctx, sz, cx, cy, maxR, minR, p) {
  const sym=Math.max(4,p.segs),layers=Math.max(2,Math.floor(p.complexity/2));
  for(let layer=0;layer<layers;layer++){
    const lr=minR+(maxR-minR)*(layer+0.5)/layers,lrI=lr*(0.7+p.thick*0.3);
    for(let s=0;s<sym;s++){
      const a=s/sym*Math.PI*2,aw=Math.PI/sym*(0.6+p.detail*0.4);
      if(rng()<p.chaos*0.15)continue;
      ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*lrI,cy+Math.sin(a)*lrI);
      const tip=lr*(1+p.detail*0.2);
      ctx.quadraticCurveTo(cx+Math.cos(a-aw)*lr*1.1,cy+Math.sin(a-aw)*lr*1.1,cx+Math.cos(a)*tip,cy+Math.sin(a)*tip);
      ctx.quadraticCurveTo(cx+Math.cos(a+aw)*lr*1.1,cy+Math.sin(a+aw)*lr*1.1,cx+Math.cos(a)*lrI,cy+Math.sin(a)*lrI);
      ctx.lineWidth=1+p.thick*2;ctx.stroke();if(rng()<0.3+p.detail*0.4)ctx.fill();
      if(p.detail>0.3){ctx.beginPath();ctx.arc(cx+Math.cos(a)*(lrI+lr)/2,cy+Math.sin(a)*(lrI+lr)/2,2+rng()*3,0,Math.PI*2);ctx.fill()}
    }
    ctx.beginPath();ctx.arc(cx,cy,lrI,0,Math.PI*2);ctx.lineWidth=1+p.thick;ctx.stroke();
  }
},

metatron(ctx, sz, cx, cy, maxR, minR, p) {
  const r=maxR*0.85;ctx.lineWidth=1+p.thick*2;
  const pts=[{x:cx,y:cy}];for(let ring=1;ring<=2;ring++){const rr=r*ring*0.33;for(let i=0;i<6;i++){const a=i*Math.PI/3+(ring===2?Math.PI/6:0);pts.push({x:cx+Math.cos(a)*rr,y:cy+Math.sin(a)*rr})}}
  const cR=r*0.15*(0.5+p.thick);pts.forEach(pt=>{ctx.beginPath();ctx.arc(pt.x,pt.y,cR,0,Math.PI*2);ctx.stroke()});
  if(p.detail>0.1){for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){if(rng()<p.chaos*0.3)continue;ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.lineWidth=0.5+p.detail*2;ctx.stroke()}}
  ctx.beginPath();ctx.arc(cx,cy,maxR,0,Math.PI*2);ctx.lineWidth=2+p.thick*3;ctx.stroke();
},

hexfield(ctx, sz, cx, cy, maxR, minR, p) {
  const hexR=Math.max(8,50-p.complexity*0.8),hexH=hexR*Math.sqrt(3);const cols=Math.ceil(maxR*2.5/(hexR*1.5)),rows=Math.ceil(maxR*2.5/hexH);
  ctx.lineWidth=1+p.thick*3;
  for(let col=-cols;col<=cols;col++)for(let row=-rows;row<=rows;row++){
    const hx=cx+col*hexR*1.5,hy=cy+row*hexH+(col%2?hexH/2:0);
    if(Math.sqrt((hx-cx)**2+(hy-cy)**2)>maxR||rng()<p.chaos*0.2)continue;
    ctx.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3+Math.PI/6,px=hx+Math.cos(a)*hexR*0.9,py=hy+Math.sin(a)*hexR*0.9;i===0?ctx.moveTo(px,py):ctx.lineTo(px,py)}ctx.closePath();
    const roll=rng();if(roll<0.3*p.detail)ctx.fill();else ctx.stroke();
    if(p.detail>0.3&&rng()<p.detail*0.6){const iR=hexR*0.4*(0.5+rng()*0.5);ctx.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3+Math.PI/6;i===0?ctx.moveTo(hx+Math.cos(a)*iR,hy+Math.sin(a)*iR):ctx.lineTo(hx+Math.cos(a)*iR,hy+Math.sin(a)*iR)}ctx.closePath();if(rng()<0.4)ctx.fill();else ctx.stroke()}
    if(p.detail>0.5&&rng()<0.3){const na=rng()*Math.PI*2;ctx.beginPath();ctx.moveTo(hx,hy);ctx.lineTo(hx+Math.cos(na)*hexR*1.4,hy+Math.sin(na)*hexR*1.4);ctx.lineWidth=0.5+p.thick;ctx.stroke();ctx.lineWidth=1+p.thick*3}
  }
},

// ========== ORGANIC ==========
mycelium(ctx, sz, cx, cy, maxR, minR, p) {
  const branches=Math.max(5,p.complexity*2),maxD=Math.max(2,Math.floor(3+p.detail*5));
  function br(x,y,a,d,l){if(d>maxD||l<3)return;const ex=x+Math.cos(a)*l,ey=y+Math.sin(a)*l;if(Math.sqrt((ex-cx)**2+(ey-cy)**2)>maxR)return;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(ex,ey);ctx.lineWidth=Math.max(0.5,(maxD-d)*p.thick*1.5);ctx.stroke();if(p.detail>0.3&&rng()<0.4){ctx.beginPath();ctx.arc(ex,ey,1+rng()*3*p.thick,0,Math.PI*2);ctx.fill()}const n=1+Math.floor(rng()*2*(1+p.chaos));for(let b=0;b<n;b++)br(ex,ey,a+(rng()-0.5)*Math.PI*(0.5+p.chaos*0.8),d+1,l*(0.5+rng()*0.4))}
  for(let b=0;b<branches;b++){const a=b/branches*Math.PI*2+rng()*p.chaos*0.5,sR=minR*0.5;br(cx+Math.cos(a)*sR,cy+Math.sin(a)*sR,a,0,maxR/(2+p.complexity*0.1))}
},

voronoi(ctx, sz, cx, cy, maxR, minR, p) {
  const nP=Math.max(5,p.complexity*2),pts=[];for(let i=0;i<nP;i++){const a=rng()*Math.PI*2,r=rng()*maxR*0.9;pts.push({x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r})}
  const step=Math.max(2,Math.floor(4-p.detail*3));ctx.lineWidth=1+p.thick*2;
  for(let x=cx-maxR;x<cx+maxR;x+=step)for(let y=cy-maxR;y<cy+maxR;y+=step){
    if(Math.sqrt((x-cx)**2+(y-cy)**2)>maxR)continue;let d1=Infinity,d2=Infinity;
    for(const pt of pts){const d=Math.sqrt((x-pt.x)**2+(y-pt.y)**2);if(d<d1){d2=d1;d1=d}else if(d<d2)d2=d}
    if(Math.abs(d2-d1)<(4+p.thick*12)*(1+p.chaos*rng()*0.5))ctx.fillRect(x,y,step,step);
  }
  if(p.detail>0.2)pts.forEach(pt=>{ctx.beginPath();ctx.arc(pt.x,pt.y,2+p.detail*4,0,Math.PI*2);ctx.fill()});
  ctx.save();ctx.globalCompositeOperation='destination-in';ctx.beginPath();ctx.arc(cx,cy,maxR,0,Math.PI*2);ctx.fill();ctx.restore();
},

coral(ctx, sz, cx, cy, maxR, minR, p) {
  const nA=Math.max(3,Math.floor(p.segs/3)),maxD=Math.max(3,Math.floor(4+p.detail*4));
  function limb(x,y,a,d,w){if(d>maxD)return;const len=maxR/(maxD+1)*(0.6+rng()*0.6),curve=(rng()-0.5)*p.chaos*1.5;const mx=x+Math.cos(a+curve*0.5)*len*0.5,my=y+Math.sin(a+curve*0.5)*len*0.5,ex=x+Math.cos(a+curve)*len,ey=y+Math.sin(a+curve)*len;if(Math.sqrt((ex-cx)**2+(ey-cy)**2)>maxR)return;ctx.beginPath();ctx.moveTo(x,y);ctx.quadraticCurveTo(mx,my,ex,ey);ctx.lineWidth=w;ctx.stroke();if(p.detail>0.4&&rng()<0.4){ctx.beginPath();ctx.arc(ex,ey,w*1.5,0,Math.PI*2);ctx.fill()}const n=1+Math.floor(rng()*(1+p.chaos));for(let s=0;s<n;s++)limb(ex,ey,a+(rng()-0.5)*Math.PI*0.7,d+1,w*0.7)}
  for(let i=0;i<nA;i++){const a=i/nA*Math.PI*2;limb(cx+Math.cos(a)*minR*0.3,cy+Math.sin(a)*minR*0.3,a,0,2+p.thick*8)}
},

erosion(ctx, sz, cx, cy, maxR, minR, p) {
  const nCh=Math.max(3,p.complexity),noise=makeNoise(p.seed);
  for(let ch=0;ch<nCh;ch++){let x=cx+(rng()-0.5)*maxR*0.5,y=cy-maxR*0.8+rng()*maxR*0.3;ctx.beginPath();ctx.moveTo(x,y);const steps=80+Math.floor(p.detail*120);
    for(let s=0;s<steps;s++){const n=noise(x/sz*6,y/sz*6);x+=n*8*p.chaos+rng()*4-2;y+=2+rng()*3;if(Math.sqrt((x-cx)**2+(y-cy)**2)>maxR)break;ctx.lineTo(x,y);
      if(rng()<p.detail*0.08){const ox=x,oy=y;ctx.stroke();ctx.beginPath();ctx.moveTo(x,y);for(let ss=0;ss<20;ss++){x+=n*6+(rng()-0.5)*8;y+=2+rng()*2;ctx.lineTo(x,y)}ctx.lineWidth=1+p.thick*2;ctx.stroke();x=ox;y=oy;ctx.beginPath();ctx.moveTo(x,y)}}
    ctx.lineWidth=2+p.thick*5+rng()*3;ctx.stroke()}
  ctx.save();ctx.globalCompositeOperation='destination-in';ctx.beginPath();ctx.arc(cx,cy,maxR,0,Math.PI*2);ctx.fill();ctx.restore();
},

tree(ctx, sz, cx, cy, maxR, minR, p) {
  const trunkW=8+p.thick*30,trunkH=maxR*(0.5+p.detail*0.3),baseY=cy+maxR*0.5;
  ctx.beginPath();ctx.moveTo(cx-trunkW/2,baseY);ctx.lineTo(cx-trunkW/3,baseY-trunkH);ctx.lineTo(cx+trunkW/3,baseY-trunkH);ctx.lineTo(cx+trunkW/2,baseY);ctx.closePath();ctx.fill();
  if(p.detail>0.2){const nL=5+Math.floor(p.detail*15);for(let i=0;i<nL;i++){const lx=cx+(rng()-0.5)*trunkW*0.6,ly1=baseY-rng()*trunkH*0.8;ctx.beginPath();ctx.moveTo(lx,ly1);ctx.lineTo(lx+(rng()-0.5)*4,ly1-10-rng()*30);ctx.lineWidth=0.5+rng();ctx.stroke()}}
  const maxBD=Math.max(2,Math.floor(3+p.detail*4));
  function branch(x,y,a,d,w){if(d>maxBD||w<0.5)return;const len=maxR*0.2*(0.5+rng()*0.5)*(1-d*0.12),ex=x+Math.cos(a)*len,ey=y+Math.sin(a)*len;if(Math.sqrt((ex-cx)**2+(ey-cy)**2)>maxR)return;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(ex,ey);ctx.lineWidth=w;ctx.stroke();if(d>=maxBD-1&&p.detail>0.4){ctx.beginPath();ctx.arc(ex,ey,3+rng()*8*p.thick,0,Math.PI*2);ctx.fill()}const n=1+Math.floor(rng()*(1.5+p.chaos));for(let s=0;s<n;s++)branch(ex,ey,a+(rng()-0.5)*Math.PI*(0.4+p.chaos*0.5),d+1,w*0.65)}
  const topY=baseY-trunkH,nB=Math.max(3,Math.floor(p.complexity*0.6));
  for(let b=0;b<nB;b++)branch(cx+(rng()-0.5)*trunkW*0.4,topY-rng()*trunkH*0.15,-Math.PI/2+(rng()-0.5)*Math.PI*0.8,0,trunkW*0.3);
  function root(x,y,a,d,w){if(d>maxBD-1||w<0.5)return;const len=maxR*0.15*(0.5+rng()*0.5),ex=x+Math.cos(a)*len,ey=y+Math.sin(a)*len;if(Math.sqrt((ex-cx)**2+(ey-cy)**2)>maxR)return;ctx.beginPath();ctx.moveTo(x,y);ctx.quadraticCurveTo((x+ex)/2+(rng()-0.5)*10*p.chaos,(y+ey)/2,ex,ey);ctx.lineWidth=w;ctx.stroke();if(d>=maxBD-2&&p.detail>0.3){ctx.beginPath();ctx.arc(ex,ey,1+rng()*2,0,Math.PI*2);ctx.fill()}const n=1+Math.floor(rng()*(1+p.chaos*0.8));for(let s=0;s<n;s++)root(ex,ey,a+(rng()-0.5)*Math.PI*0.5,d+1,w*0.6)}
  for(let r=0;r<Math.max(3,Math.floor(p.complexity*0.4));r++)root(cx+(rng()-0.5)*trunkW*0.5,baseY,Math.PI/2+(rng()-0.5)*Math.PI*0.7,0,trunkW*0.25);
  ctx.save();ctx.globalCompositeOperation='destination-in';ctx.beginPath();ctx.arc(cx,cy,maxR,0,Math.PI*2);ctx.fill();ctx.restore();
},

// ========== MATHEMATICAL ==========
spirograph(ctx, sz, cx, cy, maxR, minR, p) {
  const R=maxR*0.45,nC=Math.max(1,Math.floor(p.complexity/4));
  for(let c=0;c<nC;c++){const r=R*(0.2+rng()*0.6)*(0.5+p.thick),d=r*(0.5+rng()*p.chaos),scale=maxR/(R+r+d)*0.9;ctx.beginPath();const steps=2000+Math.floor(p.detail*3000);for(let i=0;i<=steps;i++){const t=i/steps*Math.PI*2*Math.max(5,p.segs),x=cx+((R-r)*Math.cos(t)+d*Math.cos((R-r)/r*t))*scale,y=cy+((R-r)*Math.sin(t)-d*Math.sin((R-r)/r*t))*scale;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.lineWidth=1+p.thick*2;ctx.stroke()}
},

lissajous(ctx, sz, cx, cy, maxR, minR, p) {
  const nC=Math.max(1,Math.floor(p.complexity/3));
  for(let c=0;c<nC;c++){const a=1+Math.floor(rng()*p.segs*0.3),b=1+Math.floor(rng()*p.segs*0.3),delta=rng()*Math.PI*p.chaos,r=maxR*(0.4+c*0.2/nC);ctx.beginPath();const steps=1000+Math.floor(p.detail*2000);for(let i=0;i<=steps;i++){const t=i/steps*Math.PI*2,x=cx+Math.sin(a*t+delta)*r,y=cy+Math.sin(b*t)*r;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.lineWidth=1+p.thick*2.5;ctx.stroke();if(p.detail>0.5){for(let i=0;i<steps;i+=Math.floor(steps/20)){const t=i/steps*Math.PI*2;ctx.beginPath();ctx.arc(cx+Math.sin(a*t+delta)*r,cy+Math.sin(b*t)*r,1.5+p.thick*2,0,Math.PI*2);ctx.fill()}}}
},

moire(ctx, sz, cx, cy, maxR, minR, p) {
  const nS=2+Math.floor(p.detail*2),lineGap=Math.max(3,20-p.complexity*0.3);
  for(let s=0;s<nS;s++){const offX=(rng()-0.5)*maxR*p.chaos*0.6,offY=(rng()-0.5)*maxR*p.chaos*0.6,angle=s*Math.PI/nS,cos=Math.cos(angle),sin=Math.sin(angle);
    for(let i=-maxR*1.5;i<maxR*1.5;i+=lineGap){ctx.beginPath();ctx.moveTo(cx+offX+cos*i-sin*maxR*1.5,cy+offY+sin*i+cos*maxR*1.5);ctx.lineTo(cx+offX+cos*i+sin*maxR*1.5,cy+offY+sin*i-cos*maxR*1.5);ctx.lineWidth=1+p.thick*2;ctx.stroke()}}
  ctx.save();ctx.globalCompositeOperation='destination-in';ctx.beginPath();ctx.arc(cx,cy,maxR,0,Math.PI*2);ctx.fill();ctx.restore();
},

topography(ctx, sz, cx, cy, maxR, minR, p) {
  const noise=makeNoise(p.seed),noise2=makeNoise(p.seed+500),nC=Math.max(5,p.complexity*2),freq=2+p.detail*4;
  ctx.lineWidth=1+p.thick*2.5;
  for(let c=0;c<nC;c++){const threshold=c/nC;const step=Math.max(2,Math.floor(4-p.detail*2));ctx.beginPath();let drawing=false;
    for(let a=0;a<Math.PI*2;a+=0.02)for(let r=minR;r<maxR;r+=step){const x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r,n=(noise(x/sz*freq,y/sz*freq)+1)/2,n2=(noise2(x/sz*freq*2,y/sz*freq*2)+1)/2,h=n*0.7+n2*0.3;if(Math.abs(h-threshold)<0.02+p.thick*0.02){if(rng()<p.chaos*0.05)continue;if(!drawing){ctx.moveTo(x,y);drawing=true}else ctx.lineTo(x,y)}}ctx.stroke()}
  ctx.lineWidth=2+p.thick*4;
  for(let ridge=0;ridge<3;ridge++){ctx.beginPath();for(let a=0;a<Math.PI*2;a+=0.03){const r=minR+(maxR-minR)*(0.3+ridge*0.2),x=cx+Math.cos(a)*(r+noise(a*3,ridge)*maxR*0.15*(1+p.chaos)),y=cy+Math.sin(a)*(r+noise2(a*3,ridge)*maxR*0.15*(1+p.chaos));if(Math.sqrt((x-cx)**2+(y-cy)**2)>maxR)continue;a<0.03?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.stroke()}
  ctx.save();ctx.globalCompositeOperation='destination-in';ctx.beginPath();ctx.arc(cx,cy,maxR,0,Math.PI*2);ctx.fill();ctx.restore();
},

// ========== FRACTAL ==========
sierpinski(ctx, sz, cx, cy, maxR, minR, p) {
  const depth = Math.max(1, Math.min(7, Math.floor(p.complexity / 5)));
  ctx.lineWidth = 1 + p.thick * 2;

  function tri(x1,y1,x2,y2,x3,y3,d) {
    if(d <= 0) {
      if(rng() < p.chaos * 0.15) return;
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.lineTo(x3,y3);ctx.closePath();
      if(rng() < 0.3 + p.detail * 0.5) ctx.fill(); else ctx.stroke();
      return;
    }
    const mx1=(x1+x2)/2,my1=(y1+y2)/2,mx2=(x2+x3)/2,my2=(y2+y3)/2,mx3=(x1+x3)/2,my3=(y1+y3)/2;
    tri(x1,y1,mx1,my1,mx3,my3,d-1);
    tri(mx1,my1,x2,y2,mx2,my2,d-1);
    tri(mx3,my3,mx2,my2,x3,y3,d-1);
  }

  const h = maxR * Math.sqrt(3) * 0.9;
  tri(cx, cy - maxR * 0.85, cx - maxR * 0.85, cy + h * 0.45, cx + maxR * 0.85, cy + h * 0.45, depth);

  // Sierpinski carpet variant (square version) when detail is high
  if(p.detail > 0.7) {
    const carpetSz = maxR * 0.4;
    function carpet(x,y,s,d) {
      if(d<=0 || s < 2) { ctx.fillRect(x,y,s,s); return; }
      const ns = s/3;
      for(let i=0;i<3;i++) for(let j=0;j<3;j++) {
        if(i===1 && j===1) continue; // center hole
        if(rng() < p.chaos * 0.1) continue;
        carpet(x+i*ns, y+j*ns, ns, d-1);
      }
    }
    carpet(cx + maxR*0.2, cy - maxR*0.3, carpetSz, Math.min(4, depth));
  }
},

kochSnow(ctx, sz, cx, cy, maxR, minR, p) {
  const depth = Math.max(1, Math.min(6, Math.floor(p.complexity / 6)));
  ctx.lineWidth = 1 + p.thick * 2;

  function kochLine(x1,y1,x2,y2,d) {
    if(d <= 0) {
      if(rng() < p.chaos * 0.08) return;
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
      return;
    }
    const dx=x2-x1,dy=y2-y1;
    const ax=x1+dx/3, ay=y1+dy/3;
    const bx=x1+dx*2/3, by=y1+dy*2/3;
    const px=ax+dx/6-dy*Math.sqrt(3)/6, py=ay+dy/6+dx*Math.sqrt(3)/6;
    kochLine(x1,y1,ax,ay,d-1);
    kochLine(ax,ay,px,py,d-1);
    kochLine(px,py,bx,by,d-1);
    kochLine(bx,by,x2,y2,d-1);
  }

  // Snowflake — 3 Koch curves forming a triangle
  const pts = [];
  for(let i=0;i<3;i++) {
    const a = i * Math.PI * 2/3 - Math.PI/2;
    pts.push({x: cx + Math.cos(a)*maxR*0.85, y: cy + Math.sin(a)*maxR*0.85});
  }
  for(let i=0;i<3;i++) {
    kochLine(pts[i].x, pts[i].y, pts[(i+1)%3].x, pts[(i+1)%3].y, depth);
  }

  // Detail dots at vertices
  if(p.detail > 0.4) {
    pts.forEach(pt => { ctx.beginPath();ctx.arc(pt.x,pt.y,2+p.thick*3,0,Math.PI*2);ctx.fill() });
  }

  // Inner snowflake
  if(p.detail > 0.6) {
    const inner = [];
    for(let i=0;i<3;i++) {
      const a = i * Math.PI*2/3 + Math.PI/6;
      inner.push({x:cx+Math.cos(a)*maxR*0.35, y:cy+Math.sin(a)*maxR*0.35});
    }
    for(let i=0;i<3;i++) kochLine(inner[i].x,inner[i].y,inner[(i+1)%3].x,inner[(i+1)%3].y, Math.max(1,depth-1));
  }
},

julia(ctx, sz, cx, cy, maxR, minR, p) {
  // Reset transform for pixel-level work
  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  const imgData = ctx.getImageData(0,0,sz,sz);
  const d = imgData.data;
  const cr = -0.7 + p.chaos * 0.4, ci = 0.27015 + (p.seed % 100) * 0.003;
  const maxIter = sz <= 128 ? 15 : (20 + Math.floor(p.detail * 80));
  const zoom = 1.5 / (0.5 + p.thick);
  const step = sz > 256 ? 1 : 1; // full res

  for(let px=0;px<sz;px++) for(let py=0;py<sz;py++) {
    const dx = px-cx, dy = py-cy;
    if(Math.sqrt(dx*dx+dy*dy) > maxR) continue;

    let zr = (px - sz/2) / (sz/2) * zoom;
    let zi = (py - sz/2) / (sz/2) * zoom;
    let iter = 0;
    while(zr*zr + zi*zi < 4 && iter < maxIter) {
      const tmp = zr*zr - zi*zi + cr;
      zi = 2*zr*zi + ci;
      zr = tmp;
      iter++;
    }

    if(iter < maxIter) {
      // Smooth banding for interesting texture
      const t = iter / maxIter;
      const bright = t > 0.15 ? 255 : 0;
      const i = (py * sz + px) * 4;
      d[i] = d[i+1] = d[i+2] = bright;
      d[i+3] = bright > 0 ? 255 : 0;
    }
  }
  ctx.putImageData(imgData,0,0);
  ctx.restore();
},

dragonCurve(ctx, sz, cx, cy, maxR, minR, p) {
  const iters = Math.max(5, Math.min(14, Math.floor(p.complexity * 0.5 + 4)));
  let turns = [1]; // 1=right, 0=left
  for(let i=1;i<iters;i++) {
    const mid = [1];
    const rev = turns.slice().reverse().map(t=>1-t);
    turns = turns.concat(mid, rev);
  }

  const stepLen = Math.max(1, maxR * 2 / Math.sqrt(turns.length));
  let x = cx - maxR * 0.3, y = cy + maxR * 0.2;
  let dir = 0; // 0=right, 1=up, 2=left, 3=down
  const dx=[1,0,-1,0], dy=[0,-1,0,1];

  ctx.beginPath();
  ctx.moveTo(x, y);

  for(const turn of turns) {
    if(turn === 1) dir = (dir + 1) % 4;
    else dir = (dir + 3) % 4;
    x += dx[dir] * stepLen;
    y += dy[dir] * stepLen;

    if(rng() < p.chaos * 0.03) continue;
    ctx.lineTo(x, y);
  }
  ctx.lineWidth = 1 + p.thick * 2;
  ctx.stroke();

  // Dots at bends
  if(p.detail > 0.5) {
    let bx = cx - maxR*0.3, by = cy + maxR*0.2, bd = 0;
    for(let i=0;i<turns.length;i+=Math.floor(turns.length/30)) {
      if(rng()<0.5)continue;
      // approximate position
      const t = turns[i];
      if(t===1)bd=(bd+1)%4;else bd=(bd+3)%4;
      bx+=dx[bd]*stepLen*10;by+=dy[bd]*stepLen*10;
      ctx.beginPath();ctx.arc(bx,by,1+rng()*3,0,Math.PI*2);ctx.fill();
    }
  }

  ctx.save();ctx.globalCompositeOperation='destination-in';ctx.beginPath();ctx.arc(cx,cy,maxR,0,Math.PI*2);ctx.fill();ctx.restore();
},

// ========== ARCHITECTURAL ==========
cathedral(ctx, sz, cx, cy, maxR, minR, p) {
  const nA=Math.max(2,Math.floor(p.segs/4)),archW=maxR*2/nA;
  for(let a=0;a<nA;a++){const ax=cx-maxR+a*archW+archW/2,baseY=cy+maxR*0.5,h=maxR*(0.5+rng()*0.5)*p.thick*2;if(rng()<p.chaos*0.2)continue;
    ctx.beginPath();ctx.moveTo(ax-archW/2*0.4,baseY);ctx.lineTo(ax-archW/2*0.4,baseY-h*0.6);ctx.quadraticCurveTo(ax-archW/2*0.3,baseY-h,ax,baseY-h);ctx.quadraticCurveTo(ax+archW/2*0.3,baseY-h,ax+archW/2*0.4,baseY-h*0.6);ctx.lineTo(ax+archW/2*0.4,baseY);ctx.lineWidth=2+p.thick*3;ctx.stroke();
    if(p.detail>0.3){const nR=2+Math.floor(rng()*3*p.detail);for(let r=0;r<nR;r++){const ry=baseY-h*(0.3+r*0.2);ctx.beginPath();ctx.moveTo(ax-archW*0.15,ry);ctx.quadraticCurveTo(ax,ry-archW*0.15,ax+archW*0.15,ry);ctx.lineWidth=1+p.thick;ctx.stroke()}}
    if(p.detail>0.5&&rng()<0.5){const rwR=archW*0.12;ctx.beginPath();ctx.arc(ax,baseY-h*0.75,rwR,0,Math.PI*2);ctx.stroke();for(let i=0;i<6;i++){const ra=i*Math.PI/3;ctx.beginPath();ctx.moveTo(ax,baseY-h*0.75);ctx.lineTo(ax+Math.cos(ra)*rwR,baseY-h*0.75+Math.sin(ra)*rwR);ctx.stroke()}}}
  for(let layer=1;layer<Math.min(p.complexity/3,4);layer++){const ly=cy+maxR*0.5-layer*maxR*0.3,lw=maxR*2*(1-layer*0.15),lA=Math.max(2,nA-layer),law=lw/lA;for(let a=0;a<lA;a++){const ax=cx-lw/2+a*law+law/2;if(rng()<p.chaos*0.3)continue;ctx.beginPath();ctx.moveTo(ax-law*0.2,ly);ctx.quadraticCurveTo(ax,ly-law*0.5,ax+law*0.2,ly);ctx.lineWidth=1.5+p.thick*2;ctx.stroke()}}
  ctx.save();ctx.globalCompositeOperation='destination-in';ctx.beginPath();ctx.arc(cx,cy,maxR,0,Math.PI*2);ctx.fill();ctx.restore();
},

shatter(ctx, sz, cx, cy, maxR, minR, p) {
  const nS=Math.max(5,p.complexity*2),pts=[{x:cx,y:cy}];for(let i=0;i<nS;i++){const a=rng()*Math.PI*2,r=rng()*maxR;pts.push({x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r})}
  ctx.lineWidth=1+p.thick*2;
  for(let i=1;i<pts.length;i++){const pt=pts[i];let near=pts.filter((_,j)=>j!==i).sort((a,b)=>Math.sqrt((a.x-pt.x)**2+(a.y-pt.y)**2)-Math.sqrt((b.x-pt.x)**2+(b.y-pt.y)**2));const nC=2+Math.floor(rng()*3*p.detail);
    for(let c=0;c<Math.min(nC,near.length);c++){if(rng()<p.chaos*0.3)continue;const np=near[c];ctx.beginPath();ctx.moveTo(pt.x,pt.y);const steps=3+Math.floor(rng()*5);for(let s=1;s<=steps;s++){const t=s/steps;ctx.lineTo(pt.x+(np.x-pt.x)*t+(rng()-0.5)*20*p.chaos,pt.y+(np.y-pt.y)*t+(rng()-0.5)*20*p.chaos)}ctx.stroke()}
    if(p.detail>0.3){ctx.beginPath();ctx.arc(pt.x,pt.y,1+rng()*3*p.thick,0,Math.PI*2);ctx.fill()}}
  ctx.save();ctx.globalCompositeOperation='destination-in';ctx.beginPath();ctx.arc(cx,cy,maxR,0,Math.PI*2);ctx.fill();ctx.restore();
},

lattice(ctx, sz, cx, cy, maxR, minR, p) {
  const gridN=Math.max(4,Math.floor(p.segs*0.8)),cellSz=maxR*2/gridN,startX=cx-maxR,startY=cy-maxR;ctx.lineWidth=1+p.thick*3;
  for(let i=0;i<=gridN;i++)for(let j=0;j<=gridN;j++){const x=startX+i*cellSz,y=startY+j*cellSz;if(Math.sqrt((x+cellSz/2-cx)**2+(y+cellSz/2-cy)**2)>maxR||rng()<p.chaos*0.15)continue;
    if((i+j)%2===0)ctx.fillRect(x,y+cellSz*0.3,cellSz,cellSz*0.4);else ctx.fillRect(x+cellSz*0.3,y,cellSz*0.4,cellSz);
    if(p.detail>0.4){ctx.save();ctx.globalCompositeOperation='destination-out';ctx.fillRect(x+cellSz*0.35,y+cellSz*0.35,cellSz*0.3,cellSz*0.3);ctx.restore()}}
  ctx.save();ctx.globalCompositeOperation='destination-in';ctx.beginPath();ctx.arc(cx,cy,maxR,0,Math.PI*2);ctx.fill();ctx.restore();
},

labyrinth(ctx, sz, cx, cy, maxR, minR, p) {
  const walls=Math.max(3,Math.floor(p.complexity*0.7));ctx.lineWidth=2+p.thick*4;
  for(let w=0;w<walls;w++){const wr=minR+(maxR-minR)*(w+0.5)/walls,gapA=rng()*Math.PI*2,gapSz=Math.PI*2*(0.08+p.chaos*0.15+rng()*0.1);ctx.beginPath();ctx.arc(cx,cy,wr,gapA+gapSz,gapA+Math.PI*2);ctx.stroke();
    if(w<walls-1&&rng()<0.6+p.detail*0.3){const connA=gapA+Math.PI*(0.5+rng()),nextR=minR+(maxR-minR)*((w+1)+0.5)/walls;ctx.beginPath();ctx.moveTo(cx+Math.cos(connA)*wr,cy+Math.sin(connA)*wr);ctx.lineTo(cx+Math.cos(connA)*nextR,cy+Math.sin(connA)*nextR);ctx.stroke()}
    if(p.detail>0.3){const nR=1+Math.floor(rng()*3*p.detail);for(let r=0;r<nR;r++){const ra=gapA+rng()*Math.PI*2,nextR=minR+(maxR-minR)*((w+1)+0.5)/walls;if(w<walls-1){ctx.beginPath();ctx.moveTo(cx+Math.cos(ra)*wr,cy+Math.sin(ra)*wr);ctx.lineTo(cx+Math.cos(ra)*Math.min(nextR,wr+maxR/walls*0.8),cy+Math.sin(ra)*Math.min(nextR,wr+maxR/walls*0.8));ctx.stroke()}}}}
  ctx.beginPath();ctx.arc(cx,cy,minR*0.3+3,0,Math.PI*2);ctx.fill();
},

cityscape(ctx, sz, cx, cy, maxR, minR, p) {
  const gridN=Math.max(6,p.segs),cellSz=maxR*2/gridN,startX=cx-maxR,startY=cy-maxR;
  for(let i=0;i<gridN;i++)for(let j=0;j<gridN;j++){const bx=startX+i*cellSz,by=startY+j*cellSz,bcx=bx+cellSz/2,bcy=by+cellSz/2,dx=bcx-cx,dy=bcy-cy,dist=Math.sqrt(dx*dx+dy*dy);if(dist>maxR||rng()<p.chaos*0.15)continue;
    const fishScale=1+(1-dist/maxR)*1.5*p.detail,bw=cellSz*0.7*fishScale*(0.4+rng()*0.6)*p.thick*2,bh=cellSz*0.7*fishScale*(0.4+rng()*0.6)*p.thick*2;ctx.fillRect(bcx-bw/2,bcy-bh/2,bw,bh);
    if(p.detail>0.2&&bw>8&&bh>8){ctx.save();ctx.globalCompositeOperation='destination-out';const wSz=Math.max(1.5,bw*0.08),wG=wSz*2.5;for(let wx=bcx-bw/2+wG;wx<bcx+bw/2-wG;wx+=wG)for(let wy=bcy-bh/2+wG;wy<bcy+bh/2-wG;wy+=wG){if(rng()<0.3)continue;ctx.fillRect(wx,wy,wSz,wSz)}ctx.restore()}
    if(p.detail>0.5&&rng()<0.4){ctx.beginPath();ctx.arc(bcx+(rng()-0.5)*bw*0.4,bcy+(rng()-0.5)*bh*0.4,1+rng()*3,0,Math.PI*2);ctx.fill()}}
  ctx.lineWidth=1+p.thick;for(let i=0;i<=gridN;i++){ctx.beginPath();ctx.moveTo(startX+i*cellSz,cy-maxR);ctx.lineTo(startX+i*cellSz,cy+maxR);ctx.stroke();ctx.beginPath();ctx.moveTo(cx-maxR,startY+i*cellSz);ctx.lineTo(cx+maxR,startY+i*cellSz);ctx.stroke()}
  ctx.save();ctx.globalCompositeOperation='destination-in';ctx.beginPath();ctx.arc(cx,cy,maxR,0,Math.PI*2);ctx.fill();ctx.restore();
},

// ========== ESCHER ==========
escherTile(ctx, sz, cx, cy, maxR, minR, p) {
  // Interlocking lizard-like tiles
  const tileW = Math.max(20, 80 - p.complexity);
  const tileH = tileW * 0.8;
  ctx.lineWidth = 1 + p.thick * 2;

  for(let gx = cx-maxR-tileW; gx < cx+maxR+tileW; gx += tileW) {
    for(let gy = cy-maxR-tileH; gy < cy+maxR+tileH; gy += tileH) {
      const tx = gx + ((Math.floor(gy/tileH)%2) ? tileW/2 : 0);
      if(Math.sqrt((tx-cx)**2+(gy-cy)**2) > maxR) continue;
      if(rng() < p.chaos * 0.15) continue;

      const filled = rng() < 0.5;
      ctx.beginPath();
      // Escher-style interlocking shape
      ctx.moveTo(tx, gy);
      ctx.lineTo(tx + tileW*0.3, gy - tileH*0.15);
      ctx.quadraticCurveTo(tx + tileW*0.5, gy + tileH*0.1, tx + tileW*0.7, gy - tileH*0.1);
      ctx.lineTo(tx + tileW, gy);
      ctx.lineTo(tx + tileW + tileW*0.1, gy + tileH*0.4);
      ctx.quadraticCurveTo(tx + tileW - tileW*0.05, gy + tileH*0.5, tx + tileW + tileW*0.05, gy + tileH*0.7);
      ctx.lineTo(tx + tileW, gy + tileH);
      ctx.lineTo(tx + tileW*0.6, gy + tileH + tileH*0.1);
      ctx.quadraticCurveTo(tx + tileW*0.4, gy + tileH*0.85, tx + tileW*0.2, gy + tileH + tileH*0.05);
      ctx.lineTo(tx, gy + tileH);
      ctx.closePath();
      if(filled) ctx.fill(); else ctx.stroke();

      // Eye detail
      if(p.detail > 0.4) {
        ctx.beginPath();ctx.arc(tx+tileW*0.3, gy+tileH*0.35, 2+p.thick*3, 0, Math.PI*2);
        if(filled) { ctx.save();ctx.globalCompositeOperation='destination-out';ctx.fill();ctx.restore(); }
        else ctx.fill();
      }
    }
  }
  ctx.save();ctx.globalCompositeOperation='destination-in';ctx.beginPath();ctx.arc(cx,cy,maxR,0,Math.PI*2);ctx.fill();ctx.restore();
},

escherSpiral(ctx, sz, cx, cy, maxR, minR, p) {
  // Spiral with morphing shapes
  const nArms = Math.max(2, Math.floor(p.segs / 6));
  const turns = 2 + p.complexity * 0.1;
  ctx.lineWidth = 1 + p.thick * 2;

  for(let arm=0;arm<nArms;arm++) {
    const armOff = arm / nArms * Math.PI * 2;
    const steps = 80 + Math.floor(p.detail * 120);

    for(let s=0;s<steps;s++) {
      const t = s / steps;
      const a = armOff + t * Math.PI * 2 * turns;
      const r = minR + (maxR - minR) * t;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;

      if(rng() < p.chaos * 0.1) continue;

      // Morph from circle to square along the spiral
      const shapeSz = (3 + p.thick * 15) * (0.5 + t * 0.8);
      const morph = t; // 0=circle, 1=square

      if(morph < 0.5) {
        ctx.beginPath();ctx.arc(x,y,shapeSz*(1-morph),0,Math.PI*2);
        if(rng()<0.3)ctx.fill(); else ctx.stroke();
      } else {
        const half = shapeSz * morph;
        ctx.save();ctx.translate(x,y);ctx.rotate(a);
        if(rng()<0.3) ctx.fillRect(-half,-half,half*2,half*2);
        else ctx.strokeRect(-half,-half,half*2,half*2);
        ctx.restore();
      }
    }
  }
},

impossible(ctx, sz, cx, cy, maxR, minR, p) {
  // Impossible triangle / Penrose shapes
  const triR = maxR * 0.75;
  const barW = 15 + p.thick * 40;
  ctx.lineWidth = 1.5 + p.thick * 2;

  // Penrose triangle
  const pts = [];
  for(let i=0;i<3;i++) {
    const a = i * Math.PI * 2/3 - Math.PI/2;
    pts.push({x: cx + Math.cos(a)*triR, y: cy + Math.sin(a)*triR});
  }

  for(let i=0;i<3;i++) {
    const p1 = pts[i], p2 = pts[(i+1)%3];
    const dx = p2.x-p1.x, dy = p2.y-p1.y;
    const len = Math.sqrt(dx*dx+dy*dy);
    const nx = -dy/len * barW/2, ny = dx/len * barW/2;

    // Outer edge
    ctx.beginPath();ctx.moveTo(p1.x+nx,p1.y+ny);ctx.lineTo(p2.x+nx,p2.y+ny);ctx.stroke();
    // Inner edge
    ctx.beginPath();ctx.moveTo(p1.x-nx,p1.y-ny);ctx.lineTo(p2.x-nx,p2.y-ny);ctx.stroke();
    // Fill the bar
    ctx.beginPath();ctx.moveTo(p1.x+nx,p1.y+ny);ctx.lineTo(p2.x+nx,p2.y+ny);ctx.lineTo(p2.x-nx,p2.y-ny);ctx.lineTo(p1.x-nx,p1.y-ny);ctx.closePath();ctx.fill();
    // Cut impossible overlap
    ctx.save();ctx.globalCompositeOperation='destination-out';
    const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
    ctx.fillRect(mx-barW*0.3, my-barW*0.3, barW*0.6, barW*0.6);
    ctx.restore();
  }

  // Detail: smaller impossible shapes
  if(p.detail > 0.3) {
    const nSmall = 2 + Math.floor(p.detail * 4);
    for(let s=0;s<nSmall;s++) {
      const sa = rng()*Math.PI*2, sr = minR + rng()*(maxR-minR)*0.5;
      const sx = cx+Math.cos(sa)*sr, sy = cy+Math.sin(sa)*sr;
      const smR = 10+rng()*20*p.thick;
      if(rng()<p.chaos*0.3)continue;
      // Mini impossible square
      ctx.strokeRect(sx-smR,sy-smR,smR*2,smR*2);
      ctx.save();ctx.globalCompositeOperation='destination-out';
      ctx.fillRect(sx-smR*0.3,sy-smR*0.3,smR*0.6,smR*0.6);
      ctx.restore();
      ctx.strokeRect(sx-smR*0.5,sy-smR*0.5,smR,smR);
    }
  }
},

tessellation(ctx, sz, cx, cy, maxR, minR, p) {
  // Islamic/geometric tessellation patterns
  const tileR = Math.max(15, 60 - p.complexity);
  ctx.lineWidth = 1 + p.thick * 2;

  // Base grid
  const rows = Math.ceil(maxR*2.5/tileR);
  for(let i=-rows;i<=rows;i++) for(let j=-rows;j<=rows;j++) {
    const tx = cx + i * tileR + (j%2 ? tileR/2 : 0);
    const ty = cy + j * tileR * 0.866;
    if(Math.sqrt((tx-cx)**2+(ty-cy)**2) > maxR) continue;
    if(rng() < p.chaos * 0.12) continue;

    const nSides = 4 + Math.floor(rng() * 4) * 2; // 4,6,8,10-gon
    const r1 = tileR * 0.45;

    // Outer polygon
    ctx.beginPath();
    for(let s=0;s<nSides;s++) {
      const a = s/nSides * Math.PI*2;
      s===0 ? ctx.moveTo(tx+Math.cos(a)*r1, ty+Math.sin(a)*r1) : ctx.lineTo(tx+Math.cos(a)*r1, ty+Math.sin(a)*r1);
    }
    ctx.closePath();ctx.stroke();

    // Inner star pattern
    if(p.detail > 0.2) {
      const r2 = r1 * (0.3 + p.detail * 0.4);
      ctx.beginPath();
      for(let s=0;s<nSides;s++) {
        const a1 = s/nSides * Math.PI*2;
        const a2 = (s+0.5)/nSides * Math.PI*2;
        ctx.moveTo(tx+Math.cos(a1)*r1, ty+Math.sin(a1)*r1);
        ctx.lineTo(tx+Math.cos(a2)*r2, ty+Math.sin(a2)*r2);
      }
      ctx.stroke();
    }

    // Center dot
    if(p.detail > 0.5 && rng() < 0.6) {
      ctx.beginPath();ctx.arc(tx,ty,2+p.thick*2,0,Math.PI*2);ctx.fill();
    }
  }

  ctx.save();ctx.globalCompositeOperation='destination-in';ctx.beginPath();ctx.arc(cx,cy,maxR,0,Math.PI*2);ctx.fill();ctx.restore();
}

}; // end shapeFns

// ===== MAP GENERATORS =====
const MAP_TYPES=['alpha','noise','gradient','edge','invert','mixed','phase','ripple'];
const MAP_LABELS=['Alpha','Noise','Gradient','Edge','Invert','Mixed','Phase','Ripple'];

function genNoise(sz,p,base){const c=document.createElement('canvas');c.width=c.height=sz;const ctx=c.getContext('2d');ctx.drawImage(base,0,0);const id=ctx.getImageData(0,0,sz,sz),d=id.data;const noise=makeNoise(p.seed+1000);const freq=4+p.noiseAmt*12;for(let y=0;y<sz;y++)for(let x=0;x<sz;x++){const i=(y*sz+x)*4;if(d[i+3]>0){const n=noise(x/sz*freq,y/sz*freq);if((n+1)/2<p.noiseAmt*0.5)d[i+3]=0;else{const br=Math.max(0,Math.min(255,d[i]+n*80*p.noiseAmt));d[i]=d[i+1]=d[i+2]=br;d[i+3]=Math.max(0,d[i+3]-Math.floor(Math.abs(n)*100*p.noiseAmt))}}}ctx.putImageData(id,0,0);return c}
function genGradient(sz,p,base){const c=document.createElement('canvas');c.width=c.height=sz;const ctx=c.getContext('2d');ctx.drawImage(base,0,0);const id=ctx.getImageData(0,0,sz,sz),d=id.data;const cx2=sz/2,cy2=sz/2;for(let y=0;y<sz;y++)for(let x=0;x<sz;x++){const i=(y*sz+x)*4;if(d[i+3]>0){const a=Math.atan2(y-cy2,x-cx2);const t=(a+Math.PI)/(Math.PI*2);const[r,g,b]=hsl2rgb(t*360,100,55);d[i]=r;d[i+1]=g;d[i+2]=b}}ctx.putImageData(id,0,0);return c}
function genEdge(sz,p,base){const c=document.createElement('canvas');c.width=c.height=sz;const ctx=c.getContext('2d');ctx.filter=`blur(${p.edgeBlur}px)`;ctx.globalAlpha=0.6;ctx.drawImage(base,0,0);ctx.filter='none';ctx.globalAlpha=0.3;ctx.drawImage(base,0,0);ctx.globalAlpha=1;const id=ctx.getImageData(0,0,sz,sz),d=id.data;for(let i=0;i<d.length;i+=4){if(d[i+3]>0){const l=d[i]*0.7+40;d[i]=Math.min(255,l*0.85);d[i+1]=Math.min(255,l*0.9);d[i+2]=Math.min(255,l)}}ctx.putImageData(id,0,0);return c}
function genInvert(sz,p,base){const c=document.createElement('canvas');c.width=c.height=sz;const ctx=c.getContext('2d');ctx.beginPath();ctx.arc(sz/2,sz/2,sz*0.45*1.05,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.globalCompositeOperation='destination-out';ctx.drawImage(base,0,0);return c}
function genMixed(sz,p,base){const c=document.createElement('canvas');c.width=c.height=sz;const ctx=c.getContext('2d');const e=genEdge(sz,p,base);ctx.save();ctx.beginPath();ctx.rect(0,0,sz/2,sz);ctx.clip();ctx.drawImage(e,0,0);ctx.restore();const g=genGradient(sz,p,base);ctx.save();ctx.beginPath();ctx.rect(sz/2,0,sz/2,sz);ctx.clip();ctx.drawImage(g,0,0);ctx.restore();return c}
function genPhase(sz,p,base){const c=document.createElement('canvas');c.width=c.height=sz;const ctx=c.getContext('2d');ctx.save();ctx.beginPath();ctx.rect(0,0,sz/2,sz);ctx.clip();ctx.drawImage(base,0,0);ctx.restore();const g=genGradient(sz,p,base);ctx.save();ctx.beginPath();ctx.rect(sz/2,0,sz/2,sz);ctx.clip();ctx.drawImage(g,0,0);ctx.restore();return c}
function genRipple(sz,p,base){
  const c=document.createElement('canvas');c.width=c.height=sz;const ctx=c.getContext('2d');
  // Read source pixels
  const srcC=document.createElement('canvas');srcC.width=srcC.height=sz;
  const srcCtx=srcC.getContext('2d');srcCtx.drawImage(base,0,0);
  const src=srcCtx.getImageData(0,0,sz,sz);const sd=src.data;
  const dst=ctx.getImageData(0,0,sz,sz);const dd=dst.data;
  const cx2=sz/2,cy2=sz/2;
  const waves=3+p.noiseAmt*8; // ripple frequency from noise slider
  const amp=5+p.thick*25; // displacement from thickness slider
  for(let y=0;y<sz;y++)for(let x=0;x<sz;x++){
    const dx=x-cx2,dy=y-cy2;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const angle=Math.atan2(dy,dx);
    // Concentric ripple displacement
    const ripple=Math.sin(dist/sz*Math.PI*2*waves)*amp;
    const sx=Math.round(x+Math.cos(angle)*ripple);
    const sy=Math.round(y+Math.sin(angle)*ripple);
    const di=(y*sz+x)*4;
    if(sx>=0&&sx<sz&&sy>=0&&sy<sz){
      const si=(sy*sz+sx)*4;
      dd[di]=sd[si];dd[di+1]=sd[si+1];dd[di+2]=sd[si+2];dd[di+3]=sd[si+3];
    }
  }
  ctx.putImageData(dst,0,0);return c;
}
const mapGens={alpha:(sz,p,base)=>base,noise:genNoise,gradient:genGradient,edge:genEdge,invert:genInvert,mixed:genMixed,phase:genPhase,ripple:genRipple};

// ===== THUMBNAIL GRID =====
function buildGrid() {
  const grid = document.getElementById('shapeGrid');
  grid.innerHTML = '';
  const cats = {};
  for(const [id, s] of Object.entries(SHAPES)) {
    if(!cats[s.cat]) cats[s.cat] = [];
    cats[s.cat].push(id);
  }

  for(const [cat, ids] of Object.entries(cats)) {
    const section = document.createElement('div');
    section.className = 'cat-section';
    const header = document.createElement('div');
    header.className = 'cat-header';
    header.textContent = cat;
    section.appendChild(header);

    const thumbGrid = document.createElement('div');
    thumbGrid.className = 'thumb-grid';

    for(const id of ids) {
      const thumb = document.createElement('div');
      thumb.className = 'thumb' + (id === currentShape ? ' active' : '');
      thumb.id = 'thumb_' + id;

      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = 80;
      canvas.style.width = canvas.style.height = '80px';
      canvas.style.background = '#252525';

      const label = document.createElement('div');
      label.className = 'tname';
      label.textContent = SHAPES[id].name;

      thumb.appendChild(canvas);
      thumb.appendChild(label);
      thumb.onclick = () => selectShape(id);
      thumbGrid.appendChild(thumb);

      // Generate tiny preview
      const prev = currentShape;
      currentShape = id;
      const small = drawShape(80, {sz:80,complexity:10,segs:16,thick:0.3,chaos:0.3,detail:0.4,voidR:0.08,rot:0,noiseAmt:0,edgeBlur:4,seed:42});
      currentShape = prev;
      const tctx = canvas.getContext('2d');
      tctx.drawImage(small, 0, 0);
    }

    section.appendChild(thumbGrid);
    grid.appendChild(section);
  }
}

function selectShape(id) {
  saveCurrentSliders(); // save current shape's settings before switching
  currentShape = id;
  loadSlidersForShape(id); // load the new shape's settings
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  const el = document.getElementById('thumb_' + id);
  if(el) el.classList.add('active');
  document.getElementById('mapsTitle').textContent = SHAPES[id].name + ' — Maps';
  generate();
}

// ===== GENERATE =====
function generate() {
  const p=getP(),sz=p.sz,base=drawShape(sz,p);
  const container=document.getElementById('cards');container.innerHTML='';
  document.getElementById('mapsTitle').textContent = SHAPES[currentShape].name + ' — Maps';
  MAP_TYPES.forEach((type,idx)=>{
    const card=document.createElement('div');card.className='map-card';
    const preview=document.createElement('canvas');preview.width=preview.height=256;preview.className='checker';
    const label=document.createElement('div');label.className='label';label.textContent=MAP_LABELS[idx];
    const btn=document.createElement('button');btn.textContent='Save PNG';btn.onclick=()=>{const fc=mapGens[type](sz,p,base);const a=document.createElement('a');a.download=`${currentShape}_${type}.png`;a.href=fc.toDataURL('image/png');a.click()};
    card.appendChild(preview);card.appendChild(label);card.appendChild(btn);container.appendChild(card);
    const full=mapGens[type](sz,p,base);
    preview.getContext('2d').drawImage(full,0,0,256,256);
    // Auto-sync alpha map to visualizer via localStorage
    if (type === 'alpha') {
      try { localStorage.setItem('synthestasia_texture', full.toDataURL('image/png')); } catch(e) {}
    }
  });
}

function downloadAll(){
  const p=getP(),sz=p.sz,base=drawShape(sz,p);
  MAP_TYPES.forEach((type,i)=>{setTimeout(()=>{const c=mapGens[type](sz,p,base);const a=document.createElement('a');a.download=`${currentShape}_${type}.png`;a.href=c.toDataURL('image/png');a.click()},i*300)});
}

// Save entire set — generates alpha maps for all shapes, stores to localStorage
function saveSet() {
  saveCurrentSliders();
  const prev = currentShape;
  const textures = [];
  const shapeIds = Object.keys(SHAPES);
  for (const id of shapeIds) {
    currentShape = id;
    const s = shapeSettings[id];
    // Build params from this shape's saved settings
    const p = {
      sz: 512, // smaller for pool storage
      complexity: s.complexity, segs: s.segs, thick: s.thick/100,
      chaos: s.chaos/100, detail: s.detail/100, voidR: s.void/100,
      rot: s.rot * Math.PI/180, noiseAmt: s.noiseAmt/100,
      edgeBlur: s.edgeBlur, seed: s.seed
    };
    const base = drawShape(512, p);
    const alpha = mapGens.alpha(512, p, base);
    textures.push(alpha.toDataURL('image/png'));
  }
  currentShape = prev;
  // Store as indexed pool
  try {
    localStorage.setItem('synthestasia_tex_count', textures.length);
    for (let i = 0; i < textures.length; i++) {
      localStorage.setItem('synthestasia_tex_' + i, textures[i]);
    }
    // Also set the first as current texture for immediate display
    localStorage.setItem('synthestasia_texture', textures[0]);
    // Flash the button green
    const btn = document.querySelector('[onclick="saveSet()"]');
    if (btn) { btn.style.background = '#0f0'; btn.textContent = 'Saved!'; setTimeout(() => { btn.style.background = '#f0a'; btn.textContent = 'Save Set to Visualizer'; }, 1500); }
  } catch(e) { alert('localStorage full — try smaller size or fewer shapes'); }
}

// Auto-save slider changes per shape
document.querySelectorAll('input[type=range]').forEach(el=>{el.addEventListener('input',()=>{
  const sp=document.getElementById(el.id+'V');if(sp)sp.textContent=el.value;
  saveCurrentSliders();
})});
document.getElementById('seed').addEventListener('change', saveCurrentSliders);

// Persist/restore shape settings to localStorage
function persistAllSettings() {
  saveCurrentSliders();
  try { localStorage.setItem('synthestasia_workshop_settings', JSON.stringify(shapeSettings)); } catch(e) {}
}
function restoreAllSettings() {
  try {
    const data = localStorage.getItem('synthestasia_workshop_settings');
    if (data) { const saved = JSON.parse(data); for (const [id, s] of Object.entries(saved)) { if (shapeSettings[id]) Object.assign(shapeSettings[id], s); } }
  } catch(e) {}
}
// Auto-persist on any slider change
document.querySelectorAll('input[type=range]').forEach(el=>{el.addEventListener('change', persistAllSettings)});
document.getElementById('seed').addEventListener('change', persistAllSettings);

restoreAllSettings();
loadSlidersForShape(currentShape);
buildGrid();
generate();

// ===== EXPORT / IMPORT PALETTE =====
function exportPalette() {
  saveCurrentSliders();
  persistAllSettings();
  const palette = {
    version: 1,
    type: 'synthestasia-texture-palette',
    created: new Date().toISOString(),
    settings: { ...shapeSettings },
  };
  const blob = new Blob([JSON.stringify(palette)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `synthestasia-palette-${Date.now()}.synth-tex`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function importPalette(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const palette = JSON.parse(reader.result);
      if (palette.settings) {
        for (const [id, s] of Object.entries(palette.settings)) {
          if (shapeSettings[id]) Object.assign(shapeSettings[id], s);
        }
        persistAllSettings();
        loadSlidersForShape(currentShape);
        buildGrid();
        generate();
        // Flash feedback
        const btn = document.querySelector('[onclick*="import-file"]');
        if (btn) { const orig = btn.textContent; btn.textContent = 'Loaded!'; btn.style.color = '#f0a500'; setTimeout(() => { btn.textContent = orig; btn.style.color = ''; }, 1500); }
      }
    } catch(e) { alert('Could not read palette file'); }
  };
  reader.readAsText(file);
  input.value = ''; // reset so same file can be re-imported
}

// Drag-drop palette files onto the workshop
document.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
document.addEventListener('drop', e => {
  const file = e.dataTransfer.files[0];
  if (file && (file.name.endsWith('.synth-tex') || file.name.endsWith('.json'))) {
    e.preventDefault();
    const fakeInput = { files: [file], value: '' };
    importPalette(fakeInput);
  }
});
</script>
