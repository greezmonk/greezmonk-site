<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualizer Studio</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a1a1a; --panel: #1f1f1f; --border: #333; --text: #c8c0b0;
    --dim: #706860; --accent: #f0a500; --accent-dim: #a87200;
    --input-bg: #252525; --group-bg: #1c1c1c;
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Courier New', monospace;
    background: var(--bg); color: var(--text);
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
  }
  body.fullscreen-mode { grid-template-columns: 1fr; }
  body.fullscreen-mode #sidebar,
  body.fullscreen-mode #output-panel,
  body.fullscreen-mode header { display: none; }

  header {
    grid-column: 1 / -1; grid-row: 1; padding: 8px 16px;
    background: var(--panel); border-bottom: 1px dashed var(--border);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  header h1 { font-size: 13px; font-weight: 400; color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase; }
  .presets { display: flex; gap: 5px; margin-left: auto; flex-wrap: wrap; }
  .presets button, .toolbar button {
    background: var(--input-bg); border: 1px dashed var(--border); color: var(--dim);
    padding: 3px 9px; border-radius: 2px; cursor: pointer;
    font: 10px 'Courier New', monospace; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .presets button:hover, .toolbar button:hover { border-color: var(--accent-dim); color: var(--text); }
  .presets button.active, .toolbar button.active { border-color: var(--accent); border-style: solid; color: var(--accent); background: rgba(240,165,0,0.08); }
  .toolbar { display: flex; gap: 5px; align-items: center; }
  #mic-select {
    font: 10px 'Courier New', monospace; background: var(--input-bg); color: var(--dim);
    border: 1px dashed var(--border); padding: 3px 6px; border-radius: 2px; max-width: 180px;
    outline: none; cursor: pointer;
  }
  #mic-select:hover { border-color: var(--accent-dim); color: var(--text); }
  #mic-select option { background: var(--panel); color: var(--text); }

  #sidebar {
    grid-column: 1; grid-row: 2; overflow-y: auto; padding: 8px;
    background: var(--panel); border-right: 1px dashed var(--border);
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    min-height: 0;
  }
  .group { margin-bottom: 5px; background: var(--group-bg); border: 1px dashed var(--border); border-radius: 2px; }
  .group-header {
    padding: 6px 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--accent); cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none;
  }
  .group-header::after { content: '▾'; font-size: 9px; color: var(--dim); transition: transform 0.2s; }
  .group.collapsed .group-header::after { transform: rotate(-90deg); }
  .group.collapsed .group-body { display: none; }
  .group-body { padding: 5px 10px 8px; }
  .ctl { margin-bottom: 6px; }
  .ctl:last-child { margin-bottom: 0; }
  .ctl label { display: flex; justify-content: space-between; font-size: 10px; color: var(--dim); margin-bottom: 2px; }
  .ctl .val { color: var(--accent); min-width: 44px; text-align: right; }
  input[type="range"] { -webkit-appearance: none; width: 100%; height: 3px; background: var(--input-bg); border-radius: 1px; outline: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; cursor: pointer; border: 2px solid var(--bg); }
  input[type="range"]::-moz-range-thumb { width: 12px; height: 12px; background: var(--accent); border-radius: 50%; cursor: pointer; border: 2px solid var(--bg); }
  .toggle-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 3px; }
  .tog {
    font: 9px 'Courier New', monospace; padding: 2px 6px;
    background: var(--input-bg); border: 1px dashed var(--border); color: var(--dim);
    border-radius: 2px; cursor: pointer;
  }
  .tog.on { background: rgba(240,165,0,0.1); border-color: var(--accent); border-style: solid; color: var(--accent); }
  .wm-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 3px; margin-top: 3px; }
  .wm-btn {
    aspect-ratio: 1.4; background: var(--input-bg); border: 1px dashed var(--border); border-radius: 2px;
    cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 9px; color: var(--dim); padding: 2px;
  }
  .wm-btn canvas { width: 34px; height: 18px; }
  .wm-btn.active { border-color: var(--accent); border-style: solid; color: var(--accent); background: rgba(240,165,0,0.06); }
  .cprev { width: 100%; height: 5px; border-radius: 1px; margin-top: 2px; border: 1px dashed var(--border); }

  #preview-wrap { grid-column: 2; grid-row: 2; position: relative; overflow: hidden; background: #000; min-height: 0; }
  #preview-wrap canvas { width: 100%; height: 100%; display: block; }
  #hud {
    position: absolute; top: 8px; right: 8px;
    font: 10px 'Courier New', monospace; color: var(--accent);
    background: rgba(0,0,0,0.5); padding: 3px 8px; border-radius: 2px;
    pointer-events: none;
  }
  #hud .d { color: var(--dim); }

  #output-panel {
    grid-column: 1 / -1; grid-row: 3; background: var(--panel); border-top: 1px dashed var(--border);
    display: grid; grid-template-columns: 1fr auto; height: 140px; min-height: 100px; max-height: 180px;
  }
  #milk-out {
    font: 10px 'Courier New', monospace; background: var(--bg); color: var(--text);
    border: none; padding: 6px 10px; resize: none; overflow-y: auto; outline: none;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #copy-col { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; gap: 6px; }
  #copy-btn {
    background: var(--accent); color: var(--bg); border: none; padding: 7px 14px; border-radius: 2px;
    cursor: pointer; font: bold 11px 'Courier New', monospace; text-transform: uppercase; letter-spacing: 1px;
  }
  #copy-btn:hover { background: #f0c060; }
  #copy-btn.ok { background: #4a8; }
  #copy-label { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 1.5px; }
</style>
</head>
<body>

<header>
  <a href="lab.html" style="color:var(--dim);text-decoration:none;border:1px dashed var(--border);padding:3px 9px;font:10px 'Courier New',monospace;letter-spacing:0.5px;transition:all 0.3s;" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--dim)'">&larr; LAB</a>
  <h1>// visualizer studio</h1>
  <div class="toolbar">
    <select id="mic-select" onchange="switchMic(this.value)" title="Audio input device">
      <option value="">-- mic select --</option>
    </select>
    <button id="btn-mic" onclick="toggleMic()">mic: off</button>
    <button id="btn-fs" onclick="goFullscreen()">fullscreen</button>
  </div>
  <div class="presets">
    <button onclick="loadPreset('cyan_vscope')" id="pre-cyan_vscope">Cyan V-Scope</button>
    <button onclick="loadPreset('slow_burn')" id="pre-slow_burn">Slow Burn</button>
    <button onclick="loadPreset('deep_keel')" id="pre-deep_keel">Deep Keel</button>
    <button onclick="loadPreset('metheus')" id="pre-metheus">Metheus</button>
    <button onclick="loadPreset('water')" id="pre-water">Water</button>
    <button onclick="loadPreset('fire')" id="pre-fire">Fire</button>
  </div>
</header>

<div id="sidebar"></div>

<div id="preview-wrap">
  <canvas id="c"></canvas>
  <div id="hud">--</div>
</div>

<div id="output-panel">
  <textarea id="milk-out" readonly rows="7"></textarea>
  <div id="copy-col">
    <span id="copy-label">.milk</span>
    <button id="copy-btn" onclick="copyMilk()">Copy</button>
  </div>
</div>

<script>
// =====================================================
// VISUALIZER STUDIO — WebGL Engine + Parameter Controls
// =====================================================

const DEFAULTS = {
  wave_mode: 0,
  wave_r: 1, wave_g: 1, wave_b: 1, wave_a: 1,
  wave_x: 0.5, wave_y: 0.5, wave_mystery: 0,
  wave_dots: 0, wave_thick: 0, wave_additive: 1, wave_brighten: 1,
  zoom: 1, rot: 0, warp: 0,
  cx: 0.5, cy: 0.5, dx: 0, dy: 0, sx: 1, sy: 1,
  decay: 0.98, gamma: 1,
  ob_size: 0.01, ob_r: 0, ob_g: 0, ob_b: 0, ob_a: 0,
  ib_size: 0.01, ib_r: 0.25, ib_g: 0.25, ib_b: 0.25, ib_a: 0,
  brighten: 0, darken: 0, solarize: 0, invert: 0,
  wave_scale: 1, wave_smoothing: 0.75,
  bloom_strength: 0.3, bloom_threshold: 0.4,
};

const PRESETS = {
  cyan_vscope: {
    _name: 'Cyan V-Scope', wave_mode: 5, wave_r: 0.33, wave_g: 1, wave_b: 1, wave_a: 0.8,
    wave_x: 0.51, wave_y: 0.5, wave_mystery: 1, wave_dots: 0, wave_thick: 1, wave_additive: 1, wave_brighten: 0,
    zoom: 1.081, rot: 0.057, warp: 0.56, cx: 0.5, cy: 0.48, dx: -0.001, dy: 0, sx: 1, sy: 1.012,
    decay: 0.9, gamma: 0.5, ob_size: 0.034, ob_r: 0.08, ob_g: 0, ob_b: 0, ob_a: 0,
    ib_size: 0, ib_r: 0.25, ib_g: 0.25, ib_b: 0.25, ib_a: 0,
    wave_scale: 4, wave_smoothing: 1, brighten: 0, darken: 1, solarize: 0, invert: 0,
    bloom_strength: 0.25, bloom_threshold: 0.5,
  },
  slow_burn: {
    _name: 'Forge — Slow Burn', wave_mode: 7, wave_r: 0.9, wave_g: 0.6, wave_b: 0.2, wave_a: 0.9,
    wave_x: 0.5, wave_y: 0.5, wave_mystery: 0, wave_dots: 0, wave_thick: 1, wave_additive: 1, wave_brighten: 0,
    zoom: 0.999, rot: 0, warp: 0.5, cx: 0.5, cy: 0.5, dx: 0, dy: 0, sx: 1, sy: 1,
    decay: 0.975, gamma: 1.8, ob_size: 0.005, ob_r: 0, ob_g: 0, ob_b: 0, ob_a: 0,
    ib_size: 0.01, ib_r: 0, ib_g: 0, ib_b: 0, ib_a: 0,
    wave_scale: 1, wave_smoothing: 0.75, brighten: 0, darken: 0, solarize: 0, invert: 0,
    bloom_strength: 0.4, bloom_threshold: 0.35,
  },
  deep_keel: {
    _name: 'Forge — Deep Keel', wave_mode: 7, wave_r: 0.2, wave_g: 0.5, wave_b: 0.9, wave_a: 0.85,
    wave_x: 0.5, wave_y: 0.5, wave_mystery: 0, wave_dots: 0, wave_thick: 1, wave_additive: 1, wave_brighten: 0,
    zoom: 0.9995, rot: 0, warp: 0.2, cx: 0.5, cy: 0.5, dx: 0, dy: 0, sx: 1, sy: 1,
    decay: 0.985, gamma: 1.6, ob_size: 0.005, ob_r: 0, ob_g: 0, ob_b: 0, ob_a: 0,
    ib_size: 0.01, ib_r: 0, ib_g: 0, ib_b: 0, ib_a: 0,
    wave_scale: 1, wave_smoothing: 0.85, brighten: 0, darken: 0, solarize: 0, invert: 0,
    bloom_strength: 0.2, bloom_threshold: 0.45,
  },
  metheus: {
    _name: 'Forge — Metheus', wave_mode: 7, wave_r: 1, wave_g: 0.5, wave_b: 0.1, wave_a: 0.9,
    wave_x: 0.5, wave_y: 0.5, wave_mystery: 0, wave_dots: 0, wave_thick: 1, wave_additive: 1, wave_brighten: 0,
    zoom: 0.998, rot: 0, warp: 0.6, cx: 0.5, cy: 0.5, dx: 0, dy: 0, sx: 1, sy: 1,
    decay: 0.965, gamma: 2, ob_size: 0.005, ob_r: 0, ob_g: 0, ob_b: 0, ob_a: 0,
    ib_size: 0.01, ib_r: 0, ib_g: 0, ib_b: 0, ib_a: 0,
    wave_scale: 1.2, wave_smoothing: 0.7, brighten: 0, darken: 0, solarize: 0, invert: 0,
    bloom_strength: 0.5, bloom_threshold: 0.3,
  },
  water: {
    _name: 'ROOT — Water', wave_mode: 1, wave_r: 0.98, wave_g: 0.6, wave_b: 0.2, wave_a: 0.9,
    wave_x: 0.54, wave_y: 0.54, wave_mystery: -0.02, wave_dots: 1, wave_thick: 1, wave_additive: 1, wave_brighten: 0,
    zoom: 1.051, rot: 0.002, warp: 0.13, cx: 0.53, cy: 0.5, dx: 0, dy: 0, sx: 1, sy: 1,
    decay: 0.989, gamma: 1.35, ob_size: 0.005, ob_r: 0, ob_g: 0, ob_b: 0, ob_a: 0,
    ib_size: 0.01, ib_r: 0, ib_g: 0, ib_b: 0, ib_a: 0,
    wave_scale: 4, wave_smoothing: 1, brighten: 0, darken: 0, solarize: 0, invert: 1,
    bloom_strength: 0.3, bloom_threshold: 0.4,
  },
  fire: {
    _name: 'ROOT — Fire', wave_mode: 1, wave_r: 0.98, wave_g: 0.6, wave_b: 0.2, wave_a: 0.9,
    wave_x: 0.54, wave_y: 0.54, wave_mystery: -0.02, wave_dots: 0, wave_thick: 1, wave_additive: 1, wave_brighten: 0,
    zoom: 1.051, rot: 0.002, warp: 0.13, cx: 0.53, cy: 0.5, dx: 0, dy: 0, sx: 1, sy: 1,
    decay: 0.989, gamma: 1.35, ob_size: 0.005, ob_r: 0, ob_g: 0, ob_b: 0, ob_a: 0,
    ib_size: 0.01, ib_r: 0, ib_g: 0, ib_b: 0, ib_a: 0,
    wave_scale: 4, wave_smoothing: 1, brighten: 0, darken: 0, solarize: 0, invert: 0,
    bloom_strength: 0.45, bloom_threshold: 0.3,
  },
};

const state = { ...DEFAULTS };
let currentPresetName = '';
let paused = false;
let useMic = false;

// =====================================================
// UI CONTROLS
// =====================================================
const GROUPS = [
  { name: 'Wave Shape', controls: [
    { type: 'wavemode' },
    { type: 'slider', key: 'wave_mystery', min: -1, max: 1, step: 0.01, label: 'mystery' },
    { type: 'slider', key: 'wave_scale', min: 0.1, max: 4, step: 0.01, label: 'scale' },
    { type: 'slider', key: 'wave_smoothing', min: 0, max: 1, step: 0.01, label: 'smoothing' },
    { type: 'toggles', keys: ['wave_dots','wave_thick','wave_additive','wave_brighten'] },
  ]},
  { name: 'Wave Color', controls: [
    { type: 'slider', key: 'wave_r', min: 0, max: 1, step: 0.01, label: 'red' },
    { type: 'slider', key: 'wave_g', min: 0, max: 1, step: 0.01, label: 'green' },
    { type: 'slider', key: 'wave_b', min: 0, max: 1, step: 0.01, label: 'blue' },
    { type: 'slider', key: 'wave_a', min: 0, max: 1, step: 0.01, label: 'alpha' },
    { type: 'color', keys: ['wave_r','wave_g','wave_b','wave_a'] },
    { type: 'slider', key: 'wave_x', min: 0, max: 1, step: 0.01, label: 'x pos' },
    { type: 'slider', key: 'wave_y', min: 0, max: 1, step: 0.01, label: 'y pos' },
  ]},
  { name: 'Motion', controls: [
    { type: 'slider', key: 'zoom', min: 0.9, max: 1.2, step: 0.001, label: 'zoom' },
    { type: 'slider', key: 'rot', min: -0.1, max: 0.1, step: 0.001, label: 'rotation' },
    { type: 'slider', key: 'warp', min: 0, max: 2, step: 0.01, label: 'warp' },
    { type: 'slider', key: 'cx', min: 0, max: 1, step: 0.01, label: 'center x' },
    { type: 'slider', key: 'cy', min: 0, max: 1, step: 0.01, label: 'center y' },
    { type: 'slider', key: 'dx', min: -0.05, max: 0.05, step: 0.001, label: 'pan x' },
    { type: 'slider', key: 'dy', min: -0.05, max: 0.05, step: 0.001, label: 'pan y' },
    { type: 'slider', key: 'sx', min: 0.9, max: 1.1, step: 0.001, label: 'stretch x' },
    { type: 'slider', key: 'sy', min: 0.9, max: 1.1, step: 0.001, label: 'stretch y' },
  ]},
  { name: 'Decay & Gamma', controls: [
    { type: 'slider', key: 'decay', min: 0.9, max: 1, step: 0.001, label: 'decay' },
    { type: 'slider', key: 'gamma', min: 0.5, max: 3, step: 0.01, label: 'gamma' },
  ]},
  { name: 'Borders', collapsed: true, controls: [
    { type: 'slider', key: 'ob_size', min: 0, max: 0.1, step: 0.001, label: 'outer size' },
    { type: 'slider', key: 'ob_r', min: 0, max: 1, step: 0.01, label: 'outer R' },
    { type: 'slider', key: 'ob_g', min: 0, max: 1, step: 0.01, label: 'outer G' },
    { type: 'slider', key: 'ob_b', min: 0, max: 1, step: 0.01, label: 'outer B' },
    { type: 'slider', key: 'ob_a', min: 0, max: 1, step: 0.01, label: 'outer A' },
    { type: 'color', keys: ['ob_r','ob_g','ob_b','ob_a'] },
    { type: 'slider', key: 'ib_size', min: 0, max: 0.1, step: 0.001, label: 'inner size' },
    { type: 'slider', key: 'ib_r', min: 0, max: 1, step: 0.01, label: 'inner R' },
    { type: 'slider', key: 'ib_g', min: 0, max: 1, step: 0.01, label: 'inner G' },
    { type: 'slider', key: 'ib_b', min: 0, max: 1, step: 0.01, label: 'inner B' },
    { type: 'slider', key: 'ib_a', min: 0, max: 1, step: 0.01, label: 'inner A' },
    { type: 'color', keys: ['ib_r','ib_g','ib_b','ib_a'] },
  ]},
  { name: 'Bloom', controls: [
    { type: 'slider', key: 'bloom_strength', min: 0, max: 1, step: 0.01, label: 'strength' },
    { type: 'slider', key: 'bloom_threshold', min: 0, max: 1, step: 0.01, label: 'threshold' },
  ]},
  { name: 'Post-Processing', collapsed: true, controls: [
    { type: 'toggles', keys: ['brighten','darken','solarize','invert'] },
  ]},
];

function buildUI() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  for (const g of GROUPS) {
    const div = document.createElement('div');
    div.className = 'group' + (g.collapsed ? ' collapsed' : '');
    const hdr = document.createElement('div');
    hdr.className = 'group-header'; hdr.textContent = g.name;
    hdr.onclick = () => div.classList.toggle('collapsed');
    div.appendChild(hdr);
    const body = document.createElement('div');
    body.className = 'group-body';
    for (const c of g.controls) {
      if (c.type === 'slider') body.appendChild(mkSlider(c));
      else if (c.type === 'wavemode') body.appendChild(mkWaveMode());
      else if (c.type === 'toggles') body.appendChild(mkToggles(c.keys));
      else if (c.type === 'color') body.appendChild(mkColor(c.keys));
    }
    div.appendChild(body);
    sb.appendChild(div);
  }
}

function mkSlider(c) {
  const d = document.createElement('div'); d.className = 'ctl';
  const dec = c.step < 0.01 ? 3 : 2;
  d.innerHTML = `<label><span>${c.label}</span><span class="val" id="v-${c.key}">${Number(state[c.key]).toFixed(dec)}</span></label>
    <input type="range" id="s-${c.key}" min="${c.min}" max="${c.max}" step="${c.step}" value="${state[c.key]}">`;
  d.querySelector('input').addEventListener('input', e => {
    state[c.key] = parseFloat(e.target.value);
    document.getElementById(`v-${c.key}`).textContent = Number(e.target.value).toFixed(dec);
    onParamChange();
  });
  return d;
}

function mkWaveMode() {
  const d = document.createElement('div'); d.className = 'ctl';
  d.innerHTML = '<label><span>wave_mode</span></label>';
  const grid = document.createElement('div'); grid.className = 'wm-grid';
  for (let i = 0; i < 8; i++) {
    const btn = document.createElement('div');
    btn.className = 'wm-btn' + (state.wave_mode === i ? ' active' : '');
    btn.id = `wm-${i}`;
    const cvs = document.createElement('canvas'); cvs.width = 68; cvs.height = 36;
    drawWaveThumb(cvs, i);
    btn.appendChild(cvs);
    const lbl = document.createElement('span'); lbl.textContent = i; btn.appendChild(lbl);
    btn.onclick = () => {
      document.querySelectorAll('.wm-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.wave_mode = i; onParamChange();
    };
    grid.appendChild(btn);
  }
  d.appendChild(grid); return d;
}

function drawWaveThumb(cvs, mode) {
  const ctx = cvs.getContext('2d'), w = cvs.width, h = cvs.height, cx = w/2, cy = h/2;
  ctx.strokeStyle = '#f0a500'; ctx.lineWidth = 1.5; ctx.beginPath();
  if (mode===0) ctx.arc(cx,cy,10,0,Math.PI*2);
  else if (mode===1) { ctx.moveTo(cx-10,cy-8); ctx.lineTo(cx+10,cy+8); ctx.moveTo(cx+10,cy-8); ctx.lineTo(cx-10,cy+8); }
  else if (mode===2) { ctx.moveTo(cx,cy-10); ctx.lineTo(cx,cy+10); ctx.moveTo(cx-12,cy); ctx.lineTo(cx+12,cy); }
  else if (mode===3) { for(let a=0;a<=6.3;a+=.1){const r=8+3*Math.sin(a*3);a===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));} ctx.closePath(); }
  else if (mode===4) { ctx.arc(cx,cy,11,0,Math.PI*2); ctx.moveTo(cx+6,cy); ctx.arc(cx,cy,6,0,Math.PI*2); }
  else if (mode===5) { ctx.moveTo(cx,cy-12); ctx.lineTo(cx,cy+12); }
  else if (mode===6) { for(let x=6;x<w-6;x++){const y=cy+Math.sin((x-6)*0.15)*8;x===6?ctx.moveTo(x,y):ctx.lineTo(x,y);} }
  else { for(let a=0;a<=6.3;a+=.1){const r=8+2*Math.sin(a*5)+2*Math.cos(a*2);a===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));} ctx.closePath(); }
  ctx.stroke();
}

function mkToggles(keys) {

function syncUI() {
  for (const g of GROUPS) for (const c of g.controls) {
    if (c.type === 'slider') {

      const vl = document.getElementById(`v-${c.key}`);
      if (sl) { sl.value = state[c.key]; vl.textContent = Number(state[c.key]).toFixed(c.step<0.01?3:2); }

      for (const k of c.keys) { const b = document.getElementById(`t-${k}`); if(b) b.className = 'tog'+(state[k]?' on':''); }
    } else if (c.type === 'wavemode') {

}

// =====================================================
// WEBGL ENGINE
// =====================================================
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { alpha: false, antialias: false, powerPreference: 'high-performance' });
if (!gl) { document.body.innerHTML = '<p style="color:#f0a500;font:20px monospace;padding:40px">WebGL2 required</p>'; throw 'no gl'; }
const useFloat = !!gl.getExtension('EXT_color_buffer_float');

function mkShader(t,s) { const sh=gl.createShader(t); gl.shaderSource(sh,s); gl.compileShader(sh); if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(sh));} return sh; }
function mkProg(vs,fs) { const p=gl.createProgram(); gl.attachShader(p,mkShader(gl.VERTEX_SHADER,vs)); gl.attachShader(p,mkShader(gl.FRAGMENT_SHADER,fs)); gl.linkProgram(p); if(!gl.getProgramParameter(p,gl.LINK_STATUS)){console.error(gl.getProgramInfoLog(p));} return p; }

const QUAD_VS = `#version 300 es
in vec2 a_pos; out vec2 v_uv;
void main() { v_uv = a_pos; gl_Position = vec4(a_pos * 2.0 - 1.0, 0.0, 1.0); }`;

// Warp mesh — vertex shader does per-vertex distortion like real projectM
const WARP_MESH_VS = `#version 300 es
in vec2 a_pos;
out vec2 v_uv;
uniform float u_time, u_zoom, u_rot, u_warp, u_cx, u_cy, u_dx, u_dy, u_sx, u_sy;
void main() {
  vec2 uv = a_pos;
  vec2 c = vec2(u_cx, u_cy);
  vec2 rel = uv - c;
  // Zoom + stretch
  rel /= vec2(u_zoom * u_sx, u_zoom * u_sy);
  // Rotation
  float cs = cos(u_rot), sn = sin(u_rot);
  rel = vec2(rel.x*cs - rel.y*sn, rel.x*sn + rel.y*cs);
  // Warp displacement per-vertex
  float r = length(rel), a = atan(rel.y, rel.x), w = u_warp * 0.04;
  float w1 = sin(r*12.0 + u_time*0.8 + a*2.0) * w;
  float w2 = sin(r*8.0 - u_time*0.5 + a*3.0) * w * 0.6;
  float w3 = sin(a*5.0 + u_time*0.3 + r*15.0) * w * 0.4;
  rel += vec2((w1+w3)*cos(a) - w2*sin(a), (w1+w3)*sin(a) + w2*cos(a));
  // Pan
  rel -= vec2(u_dx, u_dy);
  v_uv = rel + c;
  gl_Position = vec4(a_pos * 2.0 - 1.0, 0.0, 1.0);
}`;

const WARP_MESH_FS = `#version 300 es
precision highp float;
in vec2 v_uv; out vec4 o;
uniform sampler2D u_prev;
uniform float u_decay;
void main() {
  o = vec4(texture(u_prev, fract(v_uv)).rgb * u_decay, 1.0);
}`;

const WAVE_VS = `#version 300 es
in vec2 a_pos; void main() { gl_Position = vec4(a_pos, 0.0, 1.0); gl_PointSize = 3.0; }`;
const WAVE_FS = `#version 300 es
precision highp float; out vec4 o; uniform vec4 u_col;
void main() { o = u_col; }`;

const COMP_FS = `#version 300 es
precision highp float;
in vec2 v_uv; out vec4 o;
uniform sampler2D u_tex;
uniform float u_gamma;
uniform bool u_darken, u_brighten, u_solarize, u_invert;
uniform float u_obSize; uniform vec4 u_obCol;
void main() {
  vec3 c = texture(u_tex, v_uv).rgb;
  c = pow(max(c,0.0), vec3(1.0/max(u_gamma,0.1)));
  if (u_obCol.a>0.01 && u_obSize>0.001) {
    float d=min(min(v_uv.x,1.0-v_uv.x),min(v_uv.y,1.0-v_uv.y));
    c=mix(c, u_obCol.rgb, (1.0-smoothstep(0.0,u_obSize,d))*u_obCol.a);
  }
  if(u_darken){float l=dot(c,vec3(.299,.587,.114));c*=smoothstep(0.0,0.08,l);}
  if(u_brighten){c=min(c*1.15+0.03,1.0);}
  if(u_solarize){c=mix(c,1.0-c,step(0.5,c)*0.5);}
  if(u_invert){c=1.0-c;}
  vec2 vc=v_uv-0.5; c*=clamp(pow(max(1.0-dot(vc,vc)*1.2,0.0),0.5),0.0,1.0);
  o = vec4(c,1.0);
}`;

// Bloom shaders — extract bright + Gaussian blur + blend
const BLOOM_EXTRACT_FS = `#version 300 es
precision highp float;
in vec2 v_uv; out vec4 o;
uniform sampler2D u_tex;
uniform float u_threshold;
void main() {
  vec3 c = texture(u_tex, v_uv).rgb;
  float b = dot(c, vec3(0.299, 0.587, 0.114));
  o = vec4(c * smoothstep(u_threshold, u_threshold + 0.3, b), 1.0);
}`;

const BLOOM_BLUR_FS = `#version 300 es
precision highp float;
in vec2 v_uv; out vec4 o;
uniform sampler2D u_tex;
uniform vec2 u_dir;
void main() {
  vec3 c = vec3(0.0);
  float w[5] = float[](0.227027, 0.1945946, 0.1216216, 0.054054, 0.016216);
  c += texture(u_tex, v_uv).rgb * w[0];
  for (int i = 1; i < 5; i++) {
    vec2 off = u_dir * float(i);
    c += texture(u_tex, v_uv + off).rgb * w[i];
    c += texture(u_tex, v_uv - off).rgb * w[i];
  }
  o = vec4(c, 1.0);
}`;

const BLOOM_BLEND_FS = `#version 300 es
precision highp float;
in vec2 v_uv; out vec4 o;
uniform sampler2D u_scene;
uniform sampler2D u_bloom;
uniform float u_strength;
void main() {
  vec3 scene = texture(u_scene, v_uv).rgb;
  vec3 bloom = texture(u_bloom, v_uv).rgb;
  o = vec4(scene + bloom * u_strength, 1.0);
}`;

const warpP = mkProg(WARP_MESH_VS, WARP_MESH_FS);
const waveP = mkProg(WAVE_VS, WAVE_FS);
const compP = mkProg(QUAD_VS, COMP_FS);

const bloomExtP = mkProg(QUAD_VS, BLOOM_EXTRACT_FS);
const bloomBlurP = mkProg(QUAD_VS, BLOOM_BLUR_FS);
const bloomBlendP = mkProg(QUAD_VS, BLOOM_BLEND_FS);

function uL(p,n) { return gl.getUniformLocation(p,n); }
const wU={}; ['u_prev','u_time','u_zoom','u_rot','u_warp','u_cx','u_cy','u_dx','u_dy','u_sx','u_sy','u_decay'].forEach(n=>wU[n]=uL(warpP,n));
const cU={}; ['u_tex','u_gamma','u_darken','u_brighten','u_solarize','u_invert','u_obSize','u_obCol'].forEach(n=>cU[n]=uL(compP,n));
const vU={}; ['u_col'].forEach(n=>vU[n]=uL(waveP,n));
const beU={}; ['u_tex','u_threshold'].forEach(n=>beU[n]=uL(bloomExtP,n));
const bbU={}; ['u_tex','u_dir'].forEach(n=>bbU[n]=uL(bloomBlurP,n));
const blU={}; ['u_scene','u_bloom','u_strength'].forEach(n=>blU[n]=uL(bloomBlendP,n));

// Quad buffer (for comp, bloom passes)
const qBuf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, qBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([0,0,1,0,0,1,1,1]), gl.STATIC_DRAW);

function mkQuadVAO(prog) {
  const v=gl.createVertexArray(); gl.bindVertexArray(v);
  gl.bindBuffer(gl.ARRAY_BUFFER, qBuf);
  const l=gl.getAttribLocation(prog,'a_pos'); gl.enableVertexAttribArray(l); gl.vertexAttribPointer(l,2,gl.FLOAT,false,0,0);
  gl.bindVertexArray(null); return v;
}
const compVAO = mkQuadVAO(compP);
const bloomExtVAO = mkQuadVAO(bloomExtP);
const bloomBlurVAO = mkQuadVAO(bloomBlurP);
const bloomBlendVAO = mkQuadVAO(bloomBlendP);

// Warp mesh — 48x36 grid like projectM
const MESH_W = 48, MESH_H = 36;
let warpMeshVerts, warpMeshIdx, warpMeshBuf, warpMeshIdxBuf, warpVAO, warpMeshCount;

function buildWarpMesh() {
  const verts = new Float32Array((MESH_W+1)*(MESH_H+1)*2);
  let vi = 0;
  for (let j = 0; j <= MESH_H; j++) {
    for (let i = 0; i <= MESH_W; i++) {
      verts[vi++] = i / MESH_W;  // 0..1 UV coords
      verts[vi++] = j / MESH_H;
    }
  }
  const indices = [];
  for (let j = 0; j < MESH_H; j++) {
    for (let i = 0; i < MESH_W; i++) {
      const tl = j*(MESH_W+1)+i, tr = tl+1, bl = tl+(MESH_W+1), br = bl+1;
      indices.push(tl, bl, tr, tr, bl, br);
    }
  }
  warpMeshCount = indices.length;

  warpMeshBuf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, warpMeshBuf);
  gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);
  warpMeshIdxBuf = gl.createBuffer(); gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, warpMeshIdxBuf);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(indices), gl.STATIC_DRAW);

  warpVAO = gl.createVertexArray(); gl.bindVertexArray(warpVAO);
  gl.bindBuffer(gl.ARRAY_BUFFER, warpMeshBuf);
  const l = gl.getAttribLocation(warpP, 'a_pos');
  gl.enableVertexAttribArray(l); gl.vertexAttribPointer(l, 2, gl.FLOAT, false, 0, 0);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, warpMeshIdxBuf);
  gl.bindVertexArray(null);
}
buildWarpMesh();

// Wave VAO
const WAVE_N = 256;
const wBuf = gl.createBuffer();
const waveVAO = gl.createVertexArray();
gl.bindVertexArray(waveVAO);
gl.bindBuffer(gl.ARRAY_BUFFER, wBuf);
gl.bufferData(gl.ARRAY_BUFFER, WAVE_N*2*4, gl.DYNAMIC_DRAW);
const wPosL = gl.getAttribLocation(waveP, 'a_pos');
gl.enableVertexAttribArray(wPosL);
gl.vertexAttribPointer(wPosL, 2, gl.FLOAT, false, 0, 0);
gl.bindVertexArray(null);

// Framebuffers
let fbW,fbH,fbA,fbB,texA,texB;
let readTex,writeTex,readFB,writeFB;
// Bloom FBs (half res for performance)
let bloomFB1,bloomTex1,bloomFB2,bloomTex2,bloomW,bloomH;
// Comp intermediate (full res, for bloom source)
let compFB,compTex;

function mkFB(w,h,wrap) {
  const t=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,t);
  useFloat ? gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA16F,w,h,0,gl.RGBA,gl.FLOAT,null)
           : gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA8,w,h,0,gl.RGBA,gl.UNSIGNED_BYTE,null);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S, wrap||gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T, wrap||gl.REPEAT);
  const f=gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER,f);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,t,0);
  return {fb:f,tex:t};
}

function cleanupFBs() {
  if(texA){gl.deleteTexture(texA);gl.deleteTexture(texB);gl.deleteFramebuffer(fbA);gl.deleteFramebuffer(fbB);}
  if(bloomTex1){gl.deleteTexture(bloomTex1);gl.deleteTexture(bloomTex2);gl.deleteFramebuffer(bloomFB1);gl.deleteFramebuffer(bloomFB2);}
  if(compTex){gl.deleteTexture(compTex);gl.deleteFramebuffer(compFB);}
}

function initFBs() {
  const wrap = document.getElementById('preview-wrap');
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  canvas.width = wrap.clientWidth * dpr;
  canvas.height = wrap.clientHeight * dpr;
  fbW=canvas.width; fbH=canvas.height;
  cleanupFBs();
  // Main ping-pong
  const a=mkFB(fbW,fbH), b=mkFB(fbW,fbH);
  fbA=a.fb;texA=a.tex;fbB=b.fb;texB=b.tex;
  for(const f of[fbA,fbB]){gl.bindFramebuffer(gl.FRAMEBUFFER,f);gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);}
  // Comp intermediate (full res)
  const ci=mkFB(fbW,fbH,gl.CLAMP_TO_EDGE); compFB=ci.fb; compTex=ci.tex;
  // Bloom (half res)
  bloomW=Math.max(fbW>>1,1); bloomH=Math.max(fbH>>1,1);
  const b1=mkFB(bloomW,bloomH,gl.CLAMP_TO_EDGE), b2=mkFB(bloomW,bloomH,gl.CLAMP_TO_EDGE);
  bloomFB1=b1.fb;bloomTex1=b1.tex;bloomFB2=b2.fb;bloomTex2=b2.tex;
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  readTex=texA;readFB=fbA;writeTex=texB;writeFB=fbB;
}

// Audio
let audioCtx, analyser, audioTime, audioFreq, currentStream;
let selectedDeviceId = '';

async function populateMicList() {
  // Need a temp stream first to get permission, then enumerate
  try {
    const tempStream = await navigator.mediaDevices.getUserMedia({audio:true});
    tempStream.getTracks().forEach(t => t.stop());
  } catch(e) { /* no permission yet, list will be empty */ }
  const devices = await navigator.mediaDevices.enumerateDevices();
  const sel = document.getElementById('mic-select');
  sel.innerHTML = '<option value="">-- mic select --</option>';
  devices.filter(d => d.kind === 'audioinput').forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.deviceId;
    opt.textContent = d.label || `Mic ${sel.options.length}`;
    sel.appendChild(opt);
  });
}

async function switchMic(deviceId) {
  selectedDeviceId = deviceId;
  if (!deviceId) return;
  await startMic(deviceId);
}

async function startMic(deviceId) {
  if (!audioCtx) {
    audioCtx = new AudioContext(); analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512; analyser.smoothingTimeConstant = 0.8;
    audioTime = new Uint8Array(analyser.fftSize);
    audioFreq = new Uint8Array(analyser.frequencyBinCount);
  }
  // Stop existing stream
  if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); }
  try {
    const constraints = deviceId ? {audio:{deviceId:{exact:deviceId}}} : {audio:true};
    currentStream = await navigator.mediaDevices.getUserMedia(constraints);
    audioCtx.createMediaStreamSource(currentStream).connect(analyser);
    useMic = true;
    document.getElementById('btn-mic').textContent = 'mic: ON';
    document.getElementById('btn-mic').classList.add('active');
    // Select the device in dropdown if not already
    if (deviceId) document.getElementById('mic-select').value = deviceId;
  } catch(e) { console.warn('Mic denied',e); }
}

async function toggleMic() {
  if (useMic) {
    useMic = false;
    if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
    document.getElementById('btn-mic').textContent = 'mic: off';
    document.getElementById('btn-mic').classList.remove('active');
    return;
  }
  await startMic(selectedDeviceId || '');
}

// Populate mic list on load
populateMicList();

function getAudio(t) {
  if (useMic && analyser) {
    analyser.getByteFrequencyData(audioFreq);
    const n=audioFreq.length, bE=Math.floor(n*.1), mE=Math.floor(n*.4);
    let b=0,m=0,tr=0;
    for(let i=0;i<bE;i++)b+=audioFreq[i]; for(let i=bE;i<mE;i++)m+=audioFreq[i]; for(let i=mE;i<n;i++)tr+=audioFreq[i];
    return{bass:b/(bE*255),mid:m/((mE-bE)*255),treb:tr/((n-mE)*255)};
  }
  return{bass:.5+.4*Math.sin(t*1.2),mid:.3+.3*Math.sin(t*2.7+1),treb:.2+.2*Math.sin(t*5.3+2)};
}

function getWave(t) {
  const s=new Float32Array(WAVE_N);
  if(useMic&&analyser){analyser.getByteTimeDomainData(audioTime);for(let i=0;i<WAVE_N;i++)s[i]=(audioTime[Math.floor(i/WAVE_N*audioTime.length)]-128)/128;}
  else{const a=getAudio(t);for(let i=0;i<WAVE_N;i++){const p=i/WAVE_N;s[i]=Math.sin(p*6.283*2+t*3)*a.bass*.6+Math.sin(p*6.283*7+t*8)*a.mid*.3+Math.sin(p*6.283*16+t*15)*a.treb*.2;}}
  const passes=Math.floor(state.wave_smoothing*5);
  for(let p=0;p<passes;p++)for(let i=1;i<WAVE_N-1;i++)s[i]=s[i]*.5+(s[i-1]+s[i+1])*.25;
  return s;
}

function buildWaveVerts(samples, aspect) {
  const v=new Float32Array(WAVE_N*2);
  const sc=state.wave_scale*0.3, cx=state.wave_x*2-1, cy=1-state.wave_y*2, my=state.wave_mystery, mode=state.wave_mode;
  for(let i=0;i<WAVE_N;i++){
    const t=i/WAVE_N, val=samples[i];
    let x=0,y=0;
    if(mode===0){const a=t*6.283,r=sc*.5+val*sc*.5+my*.05;x=Math.cos(a)*r;y=Math.sin(a)*r;}
    else if(mode===1){const p=(t-.5)*2;x=p*sc+val*sc*.3*my;y=p*sc*(my>0?1:-1)+val*sc*.5;}
    else if(mode===2){const p=(t-.5)*2;x=p*sc;y=val*sc*.5+my*.04;}
    else if(mode===3){const a=t*6.283,r=sc*.4*(1+val*.7+my*.5);x=Math.cos(a)*r;y=Math.sin(a)*r*(1+my*.3);}
    else if(mode===4){const a=t*6.283,ring=t<.5?0:1,t2=(t*2)%1,a2=t2*6.283,rB=sc*(.3+ring*.2),r=rB+val*sc*.3*(ring+1)+my*.03;x=Math.cos(a2)*r;y=Math.sin(a2)*r;}
    else if(mode===5){const p=(t-.5)*2;x=val*sc*.5+my*.05;y=p*sc;}
    else if(mode===6){const p=(t-.5)*2;x=p*sc;y=val*sc*.6+my*.04;}
    else{const a=t*6.283,r=sc*.35*(1+val*.5+.3*Math.sin(a*3+my*4));x=Math.cos(a)*r;y=Math.sin(a)*r;}
    v[i*2]=cx+x*2/aspect; v[i*2+1]=cy+y*2;
  }
  return v;
}

// Resize
function resize() { initFBs(); }
window.addEventListener('resize', resize);
document.addEventListener('fullscreenchange', () => setTimeout(resize, 100));

// Fullscreen
function goFullscreen() {
  if (document.fullscreenElement) {
    document.exitFullscreen();
    document.body.classList.remove('fullscreen-mode');
  } else {
    document.body.requestFullscreen();
    document.body.classList.add('fullscreen-mode');
  }
}

// Render loop
let frameCount=0, lastFpsTime=performance.now(), fps=0, startTime=performance.now();

function render() {
  if(paused){requestAnimationFrame(render);return;}
  const now=performance.now(), t=(now-startTime)/1000;
  const w=canvas.width, h=canvas.height, aspect=w/h;
  const audio=getAudio(t), wave=getWave(t);

  // Per-frame equations
  let dZ=state.zoom,dR=state.rot,dCx=state.cx,dCy=state.cy,dW=state.warp,dD=state.decay;
  if(currentPresetName==='slow_burn'){const p1=t*.0517,p2=t*.0313,p3=t*.0719;dZ=.998+.003*Math.sin(p1)+.002*audio.bass;dR=.012*Math.sin(p2)+.008*Math.cos(p3);dCx=.5+.12*Math.sin(p1)+.08*Math.cos(p3);dCy=.5+.12*Math.cos(p2)+.08*Math.sin(t*.0127);dW=.3+.35*Math.sin(p3)+.15*audio.mid;dD=.973+.018*(1-audio.bass*.4);}
  else if(currentPresetName==='deep_keel'){const p1=t*.0211,p2=t*.0347,p3=t*.0153,p4=t*.0089;dZ=.9993+.001*Math.sin(p1)+.001*audio.bass;dR=.006*Math.sin(p2)+.004*Math.cos(p4);dCx=.5+.08*Math.sin(p1)+.06*Math.cos(p3);dCy=.5+.1*Math.cos(p2)+.05*Math.sin(p4);dW=.15+.2*Math.sin(p3)+.1*audio.mid;dD=.983+.012*(1-audio.bass*.3);}
  else if(currentPresetName==='metheus'){const p1=t*.0617,p2=t*.0431,p3=t*.0829,p4=t*.0173;dZ=.996+.005*Math.sin(p1)+.004*audio.bass;dR=.015*Math.sin(p2)+.01*audio.mid*Math.sin(p3);dCx=.5+.06*Math.sin(p1)+.04*audio.bass*Math.cos(p3);dCy=.5+.06*Math.cos(p2)+.04*audio.bass*Math.sin(p4);dW=.4+.3*Math.sin(p3)+.25*audio.mid;dD=.96+.025*(1-audio.bass*.5);}

  // Pass 1: Warp (mesh)
  gl.bindFramebuffer(gl.FRAMEBUFFER,writeFB); gl.viewport(0,0,w,h);
  gl.useProgram(warpP);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,readTex);
  gl.uniform1i(wU.u_prev,0); gl.uniform1f(wU.u_time,t);
  gl.uniform1f(wU.u_zoom,dZ); gl.uniform1f(wU.u_rot,dR); gl.uniform1f(wU.u_warp,dW);
  gl.uniform1f(wU.u_cx,dCx); gl.uniform1f(wU.u_cy,dCy);
  gl.uniform1f(wU.u_dx,state.dx); gl.uniform1f(wU.u_dy,state.dy);
  gl.uniform1f(wU.u_sx,state.sx); gl.uniform1f(wU.u_sy,state.sy);
  gl.uniform1f(wU.u_decay,dD);
  gl.bindVertexArray(warpVAO); gl.drawElements(gl.TRIANGLES, warpMeshCount, gl.UNSIGNED_SHORT, 0);

  // Pass 2: Waves
  gl.useProgram(waveP); gl.enable(gl.BLEND);
  gl.blendFunc(state.wave_additive?gl.SRC_ALPHA:gl.SRC_ALPHA, state.wave_additive?gl.ONE:gl.ONE_MINUS_SRC_ALPHA);
  const wv=buildWaveVerts(wave,aspect);
  gl.bindVertexArray(waveVAO);
  gl.bindBuffer(gl.ARRAY_BUFFER,wBuf); gl.bufferSubData(gl.ARRAY_BUFFER,0,wv);
  gl.uniform4f(vU.u_col, state.wave_r, state.wave_g, state.wave_b, state.wave_a);
  gl.drawArrays(state.wave_dots?gl.POINTS:gl.LINE_STRIP, 0, WAVE_N);
  if(state.wave_thick||state.wave_brighten){
    gl.uniform4f(vU.u_col, state.wave_r*1.2, state.wave_g*1.2, state.wave_b*1.2, state.wave_a*0.4);
    gl.drawArrays(state.wave_dots?gl.POINTS:gl.LINE_STRIP, 0, WAVE_N);
  }
  gl.disable(gl.BLEND);

  // Pass 3: Composite → intermediate FB (for bloom source)
  gl.bindFramebuffer(gl.FRAMEBUFFER, compFB); gl.viewport(0,0,w,h);
  gl.useProgram(compP);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,writeTex);
  gl.uniform1i(cU.u_tex,0); gl.uniform1f(cU.u_gamma,state.gamma);
  gl.uniform1i(cU.u_darken,state.darken); gl.uniform1i(cU.u_brighten,state.brighten);
  gl.uniform1i(cU.u_solarize,state.solarize); gl.uniform1i(cU.u_invert,state.invert);
  gl.uniform1f(cU.u_obSize,state.ob_size); gl.uniform4f(cU.u_obCol,state.ob_r,state.ob_g,state.ob_b,state.ob_a);
  gl.bindVertexArray(compVAO); gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

  // Pass 4: Bloom
  if (state.bloom_strength > 0.01) {
    // Extract bright pixels
    gl.bindFramebuffer(gl.FRAMEBUFFER, bloomFB1); gl.viewport(0,0,bloomW,bloomH);
    gl.useProgram(bloomExtP);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, compTex);
    gl.uniform1i(beU.u_tex, 0); gl.uniform1f(beU.u_threshold, state.bloom_threshold);
    gl.bindVertexArray(bloomExtVAO); gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

    // Horizontal blur
    gl.bindFramebuffer(gl.FRAMEBUFFER, bloomFB2); gl.viewport(0,0,bloomW,bloomH);
    gl.useProgram(bloomBlurP);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, bloomTex1);
    gl.uniform1i(bbU.u_tex, 0); gl.uniform2f(bbU.u_dir, 1.0/bloomW, 0);
    gl.bindVertexArray(bloomBlurVAO); gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

    // Vertical blur
    gl.bindFramebuffer(gl.FRAMEBUFFER, bloomFB1); gl.viewport(0,0,bloomW,bloomH);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, bloomTex2);
    gl.uniform2f(bbU.u_dir, 0, 1.0/bloomH);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

    // Blend bloom with scene → screen
    gl.bindFramebuffer(gl.FRAMEBUFFER, null); gl.viewport(0,0,w,h);
    gl.useProgram(bloomBlendP);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, compTex);
    gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, bloomTex1);
    gl.uniform1i(blU.u_scene, 0); gl.uniform1i(blU.u_bloom, 1);
    gl.uniform1f(blU.u_strength, state.bloom_strength);
    gl.bindVertexArray(bloomBlendVAO); gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  } else {
    // No bloom — blit comp straight to screen
    gl.bindFramebuffer(gl.FRAMEBUFFER, null); gl.viewport(0,0,w,h);
    gl.useProgram(bloomBlendP);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, compTex);
    gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, compTex);
    gl.uniform1i(blU.u_scene, 0); gl.uniform1i(blU.u_bloom, 1);
    gl.uniform1f(blU.u_strength, 0);
    gl.bindVertexArray(bloomBlendVAO); gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  }

  // Swap
  [readTex,writeTex]=[writeTex,readTex]; [readFB,writeFB]=[writeFB,readFB];

  // FPS
  frameCount++;
  if(now-lastFpsTime>500){fps=Math.round(frameCount/((now-lastFpsTime)/1000));frameCount=0;lastFpsTime=now;}
  document.getElementById('hud').innerHTML=`${fps} <span class="d">fps</span> ${useMic?'<span class="d">|</span> MIC':''}`;

  requestAnimationFrame(render);
}

// Preset loading
function loadPreset(name) {
  const p=PRESETS[name]; if(!p) return;
  currentPresetName=name;
  Object.assign(state, DEFAULTS, {...p}); delete state._name;
  syncUI(); updateMilk();
  document.querySelectorAll('.presets button').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById(`pre-${name}`); if(btn) btn.classList.add('active');
}

// Keyboard
document.addEventListener('keydown', e => {
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  switch(e.key){
    case '1': loadPreset('cyan_vscope'); break;
    case '2': loadPreset('slow_burn'); break;
    case '3': loadPreset('deep_keel'); break;
    case '4': loadPreset('metheus'); break;
    case '5': loadPreset('water'); break;
    case '6': loadPreset('fire'); break;
    case 'f': goFullscreen(); break;
    case 'm': toggleMic(); break;
    case ' ': paused=!paused; e.preventDefault(); break;
  }
});

// Init
buildUI();
initFBs();
loadPreset('metheus');
render();
</script>
</body>
</html>
