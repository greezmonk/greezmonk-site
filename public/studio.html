const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { alpha: false, antialias: false, powerPreference: 'high-performance' });
if (!gl) { document.body.innerHTML = '<p style="color:#f0a500;font:20px monospace;padding:40px">WebGL2 required</p>'; throw 'no gl'; }
const useFloat = !!gl.getExtension('EXT_color_buffer_float');

function mkShader(t,s) { const sh=gl.createShader(t); gl.shaderSource(sh,s); gl.compileShader(sh); if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(sh));} return sh; }
function mkProg(vs,fs) { const p=gl.createProgram(); gl.attachShader(p,mkShader(gl.VERTEX_SHADER,vs)); gl.attachShader(p,mkShader(gl.FRAGMENT_SHADER,fs)); gl.linkProgram(p); if(!gl.getProgramParameter(p,gl.LINK_STATUS)){console.error(gl.getProgramInfoLog(p));} return p; }

const QUAD_VS = `#version 300 es
in vec2 a_pos; out vec2 v_uv;
void main() { v_uv = a_pos; gl_Position = vec4(a_pos * 2.0 - 1.0, 0.0, 1.0); }`;

// Warp mesh — vertex shader does per-vertex distortion like real projectM
const WARP_MESH_VS = `#version 300 es
in vec2 a_pos;
out vec2 v_uv;
uniform float u_time, u_zoom, u_rot, u_warp, u_cx, u_cy, u_dx, u_dy, u_sx, u_sy;
void main() {
  vec2 uv = a_pos;
  vec2 c = vec2(u_cx, u_cy);
  vec2 rel = uv - c;
  // Zoom + stretch
  rel /= vec2(u_zoom * u_sx, u_zoom * u_sy);
  // Rotation
  float cs = cos(u_rot), sn = sin(u_rot);
  rel = vec2(rel.x*cs - rel.y*sn, rel.x*sn + rel.y*cs);
  // Warp displacement per-vertex
  float r = length(rel), a = atan(rel.y, rel.x), w = u_warp * 0.04;
  float w1 = sin(r*12.0 + u_time*0.8 + a*2.0) * w;
  float w2 = sin(r*8.0 - u_time*0.5 + a*3.0) * w * 0.6;
  float w3 = sin(a*5.0 + u_time*0.3 + r*15.0) * w * 0.4;
  rel += vec2((w1+w3)*cos(a) - w2*sin(a), (w1+w3)*sin(a) + w2*cos(a));
  // Pan
  rel -= vec2(u_dx, u_dy);
  v_uv = rel + c;
  gl_Position = vec4(a_pos * 2.0 - 1.0, 0.0, 1.0);
}`;

const WARP_MESH_FS = `#version 300 es
precision highp float;
in vec2 v_uv; out vec4 o;
uniform sampler2D u_prev;
uniform float u_decay;
void main() {
  o = vec4(texture(u_prev, fract(v_uv)).rgb * u_decay, 1.0);
}`;

const WAVE_VS = `#version 300 es
in vec2 a_pos; void main() { gl_Position = vec4(a_pos, 0.0, 1.0); gl_PointSize = 3.0; }`;
const WAVE_FS = `#version 300 es
precision highp float; out vec4 o; uniform vec4 u_col;
void main() { o = u_col; }`;

const COMP_FS = `#version 300 es
precision highp float;
in vec2 v_uv; out vec4 o;
uniform sampler2D u_tex;
uniform float u_gamma;
uniform bool u_darken, u_brighten, u_solarize, u_invert;
uniform float u_obSize; uniform vec4 u_obCol;
void main() {
  vec3 c = texture(u_tex, v_uv).rgb;
  c = pow(max(c,0.0), vec3(1.0/max(u_gamma,0.1)));
  if (u_obCol.a>0.01 && u_obSize>0.001) {
    float d=min(min(v_uv.x,1.0-v_uv.x),min(v_uv.y,1.0-v_uv.y));
    c=mix(c, u_obCol.rgb, (1.0-smoothstep(0.0,u_obSize,d))*u_obCol.a);
  }
  if(u_darken){float l=dot(c,vec3(.299,.587,.114));c*=smoothstep(0.0,0.08,l);}
  if(u_brighten){c=min(c*1.15+0.03,1.0);}
  if(u_solarize){c=mix(c,1.0-c,step(0.5,c)*0.5);}
  if(u_invert){c=1.0-c;}
  vec2 vc=v_uv-0.5; c*=clamp(pow(max(1.0-dot(vc,vc)*1.2,0.0),0.5),0.0,1.0);
  o = vec4(c,1.0);
}`;

// Bloom shaders — extract bright + Gaussian blur + blend
const BLOOM_EXTRACT_FS = `#version 300 es
precision highp float;
in vec2 v_uv; out vec4 o;
uniform sampler2D u_tex;
uniform float u_threshold;
void main() {
  vec3 c = texture(u_tex, v_uv).rgb;
  float b = dot(c, vec3(0.299, 0.587, 0.114));
  o = vec4(c * smoothstep(u_threshold, u_threshold + 0.3, b), 1.0);
}`;

const BLOOM_BLUR_FS = `#version 300 es
precision highp float;
in vec2 v_uv; out vec4 o;
uniform sampler2D u_tex;
uniform vec2 u_dir;
void main() {
  vec3 c = vec3(0.0);
  float w[5] = float[](0.227027, 0.1945946, 0.1216216, 0.054054, 0.016216);
  c += texture(u_tex, v_uv).rgb * w[0];
  for (int i = 1; i < 5; i++) {
    vec2 off = u_dir * float(i);
    c += texture(u_tex, v_uv + off).rgb * w[i];
    c += texture(u_tex, v_uv - off).rgb * w[i];
  }
  o = vec4(c, 1.0);
}`;

const BLOOM_BLEND_FS = `#version 300 es
precision highp float;
in vec2 v_uv; out vec4 o;
uniform sampler2D u_scene;
uniform sampler2D u_bloom;
uniform float u_strength;
void main() {
  vec3 scene = texture(u_scene, v_uv).rgb;
  vec3 bloom = texture(u_bloom, v_uv).rgb;
  o = vec4(scene + bloom * u_strength, 1.0);
}`;

const warpP = mkProg(WARP_MESH_VS, WARP_MESH_FS);
const waveP = mkProg(WAVE_VS, WAVE_FS);
const compP = mkProg(QUAD_VS, COMP_FS);

const bloomExtP = mkProg(QUAD_VS, BLOOM_EXTRACT_FS);
const bloomBlurP = mkProg(QUAD_VS, BLOOM_BLUR_FS);
const bloomBlendP = mkProg(QUAD_VS, BLOOM_BLEND_FS);

function uL(p,n) { return gl.getUniformLocation(p,n); }
const wU={}; ['u_prev','u_time','u_zoom','u_rot','u_warp','u_cx','u_cy','u_dx','u_dy','u_sx','u_sy','u_decay'].forEach(n=>wU[n]=uL(warpP,n));
const cU={}; ['u_tex','u_gamma','u_darken','u_brighten','u_solarize','u_invert','u_obSize','u_obCol'].forEach(n=>cU[n]=uL(compP,n));
const vU={}; ['u_col'].forEach(n=>vU[n]=uL(waveP,n));
const beU={}; ['u_tex','u_threshold'].forEach(n=>beU[n]=uL(bloomExtP,n));
const bbU={}; ['u_tex','u_dir'].forEach(n=>bbU[n]=uL(bloomBlurP,n));
const blU={}; ['u_scene','u_bloom','u_strength'].forEach(n=>blU[n]=uL(bloomBlendP,n));

// Quad buffer (for comp, bloom passes)
const qBuf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, qBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([0,0,1,0,0,1,1,1]), gl.STATIC_DRAW);

function mkQuadVAO(prog) {
  const v=gl.createVertexArray(); gl.bindVertexArray(v);
  gl.bindBuffer(gl.ARRAY_BUFFER, qBuf);
  const l=gl.getAttribLocation(prog,'a_pos'); gl.enableVertexAttribArray(l); gl.vertexAttribPointer(l,2,gl.FLOAT,false,0,0);
  gl.bindVertexArray(null); return v;
}
const compVAO = mkQuadVAO(compP);
const bloomExtVAO = mkQuadVAO(bloomExtP);
const bloomBlurVAO = mkQuadVAO(bloomBlurP);
const bloomBlendVAO = mkQuadVAO(bloomBlendP);

// Warp mesh — 48x36 grid like projectM
const MESH_W = 48, MESH_H = 36;
let warpMeshVerts, warpMeshIdx, warpMeshBuf, warpMeshIdxBuf, warpVAO, warpMeshCount;

function buildWarpMesh() {
  const verts = new Float32Array((MESH_W+1)*(MESH_H+1)*2);
  let vi = 0;
  for (let j = 0; j <= MESH_H; j++) {
    for (let i = 0; i <= MESH_W; i++) {
      verts[vi++] = i / MESH_W;  // 0..1 UV coords
      verts[vi++] = j / MESH_H;
    }
  }
  const indices = [];
  for (let j = 0; j < MESH_H; j++) {
    for (let i = 0; i < MESH_W; i++) {
      const tl = j*(MESH_W+1)+i, tr = tl+1, bl = tl+(MESH_W+1), br = bl+1;
      indices.push(tl, bl, tr, tr, bl, br);
    }
  }
  warpMeshCount = indices.length;

  warpMeshBuf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, warpMeshBuf);
  gl.bufferData(gl.ARRAY_BUFFER, verts, gl.STATIC_DRAW);
  warpMeshIdxBuf = gl.createBuffer(); gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, warpMeshIdxBuf);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(indices), gl.STATIC_DRAW);

  warpVAO = gl.createVertexArray(); gl.bindVertexArray(warpVAO);
  gl.bindBuffer(gl.ARRAY_BUFFER, warpMeshBuf);
  const l = gl.getAttribLocation(warpP, 'a_pos');
  gl.enableVertexAttribArray(l); gl.vertexAttribPointer(l, 2, gl.FLOAT, false, 0, 0);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, warpMeshIdxBuf);
  gl.bindVertexArray(null);
}
buildWarpMesh();

// Wave VAO
const WAVE_N = 256;
const wBuf = gl.createBuffer();
const waveVAO = gl.createVertexArray();
gl.bindVertexArray(waveVAO);
gl.bindBuffer(gl.ARRAY_BUFFER, wBuf);
gl.bufferData(gl.ARRAY_BUFFER, WAVE_N*2*4, gl.DYNAMIC_DRAW);
const wPosL = gl.getAttribLocation(waveP, 'a_pos');
gl.enableVertexAttribArray(wPosL);
gl.vertexAttribPointer(wPosL, 2, gl.FLOAT, false, 0, 0);
gl.bindVertexArray(null);

// Framebuffers
let fbW,fbH,fbA,fbB,texA,texB;
let readTex,writeTex,readFB,writeFB;
// Bloom FBs (half res for performance)
let bloomFB1,bloomTex1,bloomFB2,bloomTex2,bloomW,bloomH;
// Comp intermediate (full res, for bloom source)
let compFB,compTex;

function mkFB(w,h,wrap) {
  const t=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,t);
  useFloat ? gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA16F,w,h,0,gl.RGBA,gl.FLOAT,null)
           : gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA8,w,h,0,gl.RGBA,gl.UNSIGNED_BYTE,null);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S, wrap||gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T, wrap||gl.REPEAT);
  const f=gl.createFramebuffer(); gl.bindFramebuffer(gl.FRAMEBUFFER,f);
  gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,t,0);
  return {fb:f,tex:t};
}

function cleanupFBs() {
  if(texA){gl.deleteTexture(texA);gl.deleteTexture(texB);gl.deleteFramebuffer(fbA);gl.deleteFramebuffer(fbB);}
  if(bloomTex1){gl.deleteTexture(bloomTex1);gl.deleteTexture(bloomTex2);gl.deleteFramebuffer(bloomFB1);gl.deleteFramebuffer(bloomFB2);}
  if(compTex){gl.deleteTexture(compTex);gl.deleteFramebuffer(compFB);}
}

function initFBs() {
  const wrap = document.getElementById('preview-wrap');
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  canvas.width = wrap.clientWidth * dpr;
  canvas.height = wrap.clientHeight * dpr;
  fbW=canvas.width; fbH=canvas.height;
  cleanupFBs();
  // Main ping-pong
  const a=mkFB(fbW,fbH), b=mkFB(fbW,fbH);
  fbA=a.fb;texA=a.tex;fbB=b.fb;texB=b.tex;
  for(const f of[fbA,fbB]){gl.bindFramebuffer(gl.FRAMEBUFFER,f);gl.clearColor(0,0,0,1);gl.clear(gl.COLOR_BUFFER_BIT);}
  // Comp intermediate (full res)
  const ci=mkFB(fbW,fbH,gl.CLAMP_TO_EDGE); compFB=ci.fb; compTex=ci.tex;
  // Bloom (half res)
  bloomW=Math.max(fbW>>1,1); bloomH=Math.max(fbH>>1,1);
  const b1=mkFB(bloomW,bloomH,gl.CLAMP_TO_EDGE), b2=mkFB(bloomW,bloomH,gl.CLAMP_TO_EDGE);
  bloomFB1=b1.fb;bloomTex1=b1.tex;bloomFB2=b2.fb;bloomTex2=b2.tex;
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  readTex=texA;readFB=fbA;writeTex=texB;writeFB=fbB;
}

// Audio
let audioCtx, analyser, audioTime, audioFreq, currentStream;
let selectedDeviceId = '';

async function populateMicList() {
  // Need a temp stream first to get permission, then enumerate
  try {
    const tempStream = await navigator.mediaDevices.getUserMedia({audio:true});
    tempStream.getTracks().forEach(t => t.stop());
  } catch(e) { /* no permission yet, list will be empty */ }
  const devices = await navigator.mediaDevices.enumerateDevices();
  const sel = document.getElementById('mic-select');
  sel.innerHTML = '<option value="">-- mic select --</option>';
  devices.filter(d => d.kind === 'audioinput').forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.deviceId;
    opt.textContent = d.label || `Mic ${sel.options.length}`;
    sel.appendChild(opt);
  });
}

async function switchMic(deviceId) {
  selectedDeviceId = deviceId;
  if (!deviceId) return;
  await startMic(deviceId);
}

async function startMic(deviceId) {
  if (!audioCtx) {
    audioCtx = new AudioContext(); analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512; analyser.smoothingTimeConstant = 0.8;
    audioTime = new Uint8Array(analyser.fftSize);
    audioFreq = new Uint8Array(analyser.frequencyBinCount);
  }
  // Stop existing stream
  if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); }
  try {
    const constraints = deviceId ? {audio:{deviceId:{exact:deviceId}}} : {audio:true};
    currentStream = await navigator.mediaDevices.getUserMedia(constraints);
    audioCtx.createMediaStreamSource(currentStream).connect(analyser);
    useMic = true;
    document.getElementById('btn-mic').textContent = 'mic: ON';
    document.getElementById('btn-mic').classList.add('active');
    // Select the device in dropdown if not already
    if (deviceId) document.getElementById('mic-select').value = deviceId;
  } catch(e) { console.warn('Mic denied',e); }
}

async function toggleMic() {
  if (useMic) {
    useMic = false;
    if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
    document.getElementById('btn-mic').textContent = 'mic: off';
    document.getElementById('btn-mic').classList.remove('active');
    return;
  }
  await startMic(selectedDeviceId || '');
}

// Populate mic list on load
populateMicList();

function getAudio(t) {
  let bass, mid, treb;
  if (useMic && analyser) {
    analyser.getByteFrequencyData(audioFreq);
    const n=audioFreq.length, bE=Math.floor(n*.1), mE=Math.floor(n*.4);
    let b=0,m=0,tr=0;
    for(let i=0;i<bE;i++)b+=audioFreq[i]; for(let i=bE;i<mE;i++)m+=audioFreq[i]; for(let i=mE;i<n;i++)tr+=audioFreq[i];
    bass=b/(bE*255); mid=m/((mE-bE)*255); treb=tr/((n-mE)*255);
  } else {
    bass=.5+.4*Math.sin(t*1.2); mid=.3+.3*Math.sin(t*2.7+1); treb=.2+.2*Math.sin(t*5.3+2);
  }
  // Apply gain
  bass = Math.min(bass * state.audio_bass_gain, 1);
  mid = Math.min(mid * state.audio_mid_gain, 1);
  treb = Math.min(treb * state.audio_treb_gain, 1);
  // Apply trigger threshold — below threshold maps to 0
  const thr = state.audio_trigger;
  if (thr > 0) {
    bass = bass > thr ? (bass - thr) / (1 - thr) : 0;
    mid = mid > thr ? (mid - thr) / (1 - thr) : 0;
    treb = treb > thr ? (treb - thr) / (1 - thr) : 0;
  }
  return { bass, mid, treb };
}

function getWave(t) {
  const s=new Float32Array(WAVE_N);
  if(useMic&&analyser){analyser.getByteTimeDomainData(audioTime);for(let i=0;i<WAVE_N;i++)s[i]=(audioTime[Math.floor(i/WAVE_N*audioTime.length)]-128)/128;}
  else{const a=getAudio(t);for(let i=0;i<WAVE_N;i++){const p=i/WAVE_N;s[i]=Math.sin(p*6.283*2+t*3)*a.bass*.6+Math.sin(p*6.283*7+t*8)*a.mid*.3+Math.sin(p*6.283*16+t*15)*a.treb*.2;}}
  const passes=Math.floor(state.wave_smoothing*5);
  for(let p=0;p<passes;p++)for(let i=1;i<WAVE_N-1;i++)s[i]=s[i]*.5+(s[i-1]+s[i+1])*.25;
  return s;
}

function buildWaveVerts(samples, aspect) {
  const v=new Float32Array(WAVE_N*2);
  const sc=state.wave_scale*0.3, cx=state.wave_x*2-1, cy=1-state.wave_y*2, my=state.wave_mystery, mode=state.wave_mode;
  for(let i=0;i<WAVE_N;i++){
    const t=i/WAVE_N, val=samples[i];
    let x=0,y=0;
    if(mode===0){const a=t*6.283,r=sc*.5+val*sc*.5+my*.05;x=Math.cos(a)*r;y=Math.sin(a)*r;}
    else if(mode===1){const p=(t-.5)*2;x=p*sc+val*sc*.3*my;y=p*sc*(my>0?1:-1)+val*sc*.5;}
    else if(mode===2){const p=(t-.5)*2;x=p*sc;y=val*sc*.5+my*.04;}
    else if(mode===3){const a=t*6.283,r=sc*.4*(1+val*.7+my*.5);x=Math.cos(a)*r;y=Math.sin(a)*r*(1+my*.3);}
    else if(mode===4){const a=t*6.283,ring=t<.5?0:1,t2=(t*2)%1,a2=t2*6.283,rB=sc*(.3+ring*.2),r=rB+val*sc*.3*(ring+1)+my*.03;x=Math.cos(a2)*r;y=Math.sin(a2)*r;}
    else if(mode===5){const p=(t-.5)*2;x=val*sc*.5+my*.05;y=p*sc;}
    else if(mode===6){const p=(t-.5)*2;x=p*sc;y=val*sc*.6+my*.04;}
    else if(mode===7){const a=t*6.283,r=sc*.35*(1+val*.5+.3*Math.sin(a*3+my*4));x=Math.cos(a)*r;y=Math.sin(a)*r;}
    // New shapes 8-15
    else if(mode===8){const a=t*6.283,spikes=7,spike=Math.cos(t*spikes*6.283)*.5+.5,r=sc*(.2+spike*.35+val*.2+my*.05);x=Math.cos(a)*r;y=Math.sin(a)*r;} // star
    else if(mode===9){const a=t*6.283;x=sc*.4*Math.sin(a+my)+val*sc*.2;y=sc*.3*Math.sin(a*2)+val*sc*.15;} // lissajous
    else if(mode===10){const p=(t-.5)*2,strand=i%2===0?1:-1;x=p*sc;y=strand*Math.sin(p*3.14+my)*sc*.25+val*sc*.3;} // helix
    else if(mode===11){const a=t*6.283,r=sc*.35/(1+Math.pow(Math.cos(a),2)+my*.1);x=r*Math.cos(a)+val*sc*.1;y=r*Math.sin(a)*Math.cos(a)+val*sc*.1;} // infinity
    else if(mode===12){const rings=3,ri=Math.floor(t*rings),tf=(t*rings)%1,a=tf*6.283,r=sc*(.15+ri*.12)+val*sc*.15+my*.03;x=Math.cos(a)*r;y=Math.sin(a)*r;} // pulse rings
    else if(mode===13){const a=t*12.56+my*2,r=sc*(.05+t*.35)+val*sc*.15;x=Math.cos(a)*r;y=Math.sin(a)*r;} // spiral
    else if(mode===14){const a=t*6.283,r=sc*.35/(Math.abs(Math.cos(a))+Math.abs(Math.sin(a))+.01)+val*sc*.15+my*.03;x=Math.cos(a)*r;y=Math.sin(a)*r;} // diamond
    else if(mode===15){const bx=(t-.5)*2*sc,by=val*sc*.6+my*.04;x=bx;y=by;} // spectrum
    // Sacred geometry 16-23
    else if(mode===16){ // Flower of Life — 7 circles traced sequentially
      const circ=7,ci=Math.floor(t*circ),tf=(t*circ)%1,a=tf*6.283;
      let ox=0,oy=0; if(ci>0){const ca=(ci-1)/6*6.283;ox=Math.cos(ca)*sc*.2;oy=Math.sin(ca)*sc*.2;}
      const r=sc*.2+val*sc*.08+my*.02; x=ox+Math.cos(a)*r; y=oy+Math.sin(a)*r;
    }
    else if(mode===17){ // Seed of Life — 7 circles, tighter
      const circ=7,ci=Math.floor(t*circ),tf=(t*circ)%1,a=tf*6.283;
      let ox=0,oy=0; if(ci>0){const ca=(ci-1)/6*6.283;ox=Math.cos(ca)*sc*.15;oy=Math.sin(ca)*sc*.15;}
      const r=sc*.15+val*sc*.06+my*.02; x=ox+Math.cos(a)*r; y=oy+Math.sin(a)*r;
    }
    else if(mode===18){ // Metatron's Cube — circles + connecting lines
      const phase=t*3; // 3 phases: inner ring, outer ring, connections
      if(phase<1){ // Inner 6 circles + center
        const circ=7,ci=Math.floor(phase*circ),tf=(phase*circ)%1,a=tf*6.283;
        let ox=0,oy=0; if(ci>0){const ca=(ci-1)/6*6.283;ox=Math.cos(ca)*sc*.12;oy=Math.sin(ca)*sc*.12;}
        const r=sc*.06+val*sc*.03; x=ox+Math.cos(a)*r; y=oy+Math.sin(a)*r;
      } else if(phase<2){ // Outer 6 circles
        const ci=Math.floor((phase-1)*6),tf=((phase-1)*6)%1,a=tf*6.283;
        const ca=ci/6*6.283,d=sc*.24; const ox=Math.cos(ca)*d,oy=Math.sin(ca)*d;
        const r=sc*.06+val*sc*.03; x=ox+Math.cos(a)*r; y=oy+Math.sin(a)*r;
      } else { // Connecting lines — radiate from center through all 12 points
        const li=Math.floor((phase-2)*12),lf=((phase-2)*12)%1;
        const ca=li/12*6.283,d=li<6?sc*.12:sc*.24;
        x=lf*Math.cos(ca)*d+val*sc*.02; y=lf*Math.sin(ca)*d+val*sc*.02;
      }
    }
    else if(mode===19){ // Sri Yantra — nested opposing triangles
      const tri=8,ti=Math.floor(t*tri),tf=(t*tri)%1; // 4 up + 4 down triangles
      const layer=Math.floor(ti/2), up=ti%2===0;
      const s=sc*(.1+layer*.08)+val*sc*.05+my*.02;
      const base=up?-Math.PI/2:Math.PI/2, a=base+tf*6.283;
      const side=Math.floor(tf*3), sf=(tf*3)%1;
      const a1=base+side*2.094, a2=base+(side+1)*2.094;
      x=Math.cos(a1)*s+(Math.cos(a2)*s-Math.cos(a1)*s)*sf; y=Math.sin(a1)*s+(Math.sin(a2)*s-Math.sin(a1)*s)*sf;
    }
    else if(mode===20){ // Vesica Piscis — two overlapping circles
      const half=t<0.5, tf=half?(t*2):(t-0.5)*2, a=tf*6.283;
      const offset=sc*.12, r=sc*.2+val*sc*.08+my*.02;
      x=(half?-offset:offset)+Math.cos(a)*r; y=Math.sin(a)*r;
    }
    else if(mode===21){ // Golden Spiral — Fibonacci
      const phi=1.618, maxTurns=4+my;
      const a=t*maxTurns*6.283, r=sc*.04*Math.pow(phi,a/6.283)+val*sc*.05;
      x=Math.cos(a)*r; y=Math.sin(a)*r;
    }
    else if(mode===22){ // Merkaba — two interlocked tetrahedra (2D projection = Star of David)
      const tri=2, ti=Math.floor(t*tri), tf=(t*tri)%1;
      const s=sc*.35+val*sc*.1+my*.03;
      const base=ti===0?-Math.PI/2:Math.PI/2;
      const side=Math.floor(tf*3), sf=(tf*3)%1;
      const a1=base+side*2.094, a2=base+(side+1)*2.094;
      x=Math.cos(a1)*s+(Math.cos(a2)*s-Math.cos(a1)*s)*sf; y=Math.sin(a1)*s+(Math.sin(a2)*s-Math.sin(a1)*s)*sf;
    }
    else{ // Torus Knot — parametric (p,q) knot
      const p=2,q=3, a=t*6.283*2, R=sc*.25, r2=sc*.1+val*sc*.08;
      x=(R+r2*Math.cos(q*a+my))*Math.cos(p*a)*.7; y=(R+r2*Math.cos(q*a+my))*Math.sin(p*a)*.7;
    }
    v[i*2]=cx+x*2/aspect; v[i*2+1]=cy+y*2;
  }
  return v;
}

// Resize
function resize() { initFBs(); }
window.addEventListener('resize', resize);
document.addEventListener('fullscreenchange', () => setTimeout(resize, 100));

// Fullscreen
function goFullscreen() {
  if (document.fullscreenElement) {
    document.exitFullscreen();
    document.body.classList.remove('fullscreen-mode');
  } else {
    document.body.requestFullscreen();
    document.body.classList.add('fullscreen-mode');
  }
}

// Render loop
let frameCount=0, lastFpsTime=performance.now(), fps=0, startTime=performance.now();

function render() {
  if(paused){requestAnimationFrame(render);return;}
  stepTransition();
  stepChaos();
  const now=performance.now(), t=(now-startTime)/1000;
  const w=canvas.width, h=canvas.height, aspect=w/h;
  const audio=getAudio(t), wave=getWave(t);

  // Per-frame equations
  let dZ=state.zoom,dR=state.rot,dCx=state.cx,dCy=state.cy,dW=state.warp,dD=state.decay;
  if(currentPresetName==='slow_burn'){const p1=t*.0517,p2=t*.0313,p3=t*.0719;dZ=.998+.003*Math.sin(p1)+.002*audio.bass;dR=.012*Math.sin(p2)+.008*Math.cos(p3);dCx=.5+.12*Math.sin(p1)+.08*Math.cos(p3);dCy=.5+.12*Math.cos(p2)+.08*Math.sin(t*.0127);dW=.3+.35*Math.sin(p3)+.15*audio.mid;dD=.973+.018*(1-audio.bass*.4);}
  else if(currentPresetName==='deep_keel'){const p1=t*.0211,p2=t*.0347,p3=t*.0153,p4=t*.0089;dZ=.9993+.001*Math.sin(p1)+.001*audio.bass;dR=.006*Math.sin(p2)+.004*Math.cos(p4);dCx=.5+.08*Math.sin(p1)+.06*Math.cos(p3);dCy=.5+.1*Math.cos(p2)+.05*Math.sin(p4);dW=.15+.2*Math.sin(p3)+.1*audio.mid;dD=.983+.012*(1-audio.bass*.3);}
  else if(currentPresetName==='metheus'){const p1=t*.0617,p2=t*.0431,p3=t*.0829,p4=t*.0173;dZ=.996+.005*Math.sin(p1)+.004*audio.bass;dR=.015*Math.sin(p2)+.01*audio.mid*Math.sin(p3);dCx=.5+.06*Math.sin(p1)+.04*audio.bass*Math.cos(p3);dCy=.5+.06*Math.cos(p2)+.04*audio.bass*Math.sin(p4);dW=.4+.3*Math.sin(p3)+.25*audio.mid;dD=.96+.025*(1-audio.bass*.5);}

  // Pass 1: Warp (mesh)
  gl.bindFramebuffer(gl.FRAMEBUFFER,writeFB); gl.viewport(0,0,w,h);
  gl.useProgram(warpP);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,readTex);
  gl.uniform1i(wU.u_prev,0); gl.uniform1f(wU.u_time,t);
  gl.uniform1f(wU.u_zoom,dZ); gl.uniform1f(wU.u_rot,dR); gl.uniform1f(wU.u_warp,dW);
  gl.uniform1f(wU.u_cx,dCx); gl.uniform1f(wU.u_cy,dCy);
  gl.uniform1f(wU.u_dx,state.dx); gl.uniform1f(wU.u_dy,state.dy);
  gl.uniform1f(wU.u_sx,state.sx); gl.uniform1f(wU.u_sy,state.sy);
  gl.uniform1f(wU.u_decay,dD);
  gl.bindVertexArray(warpVAO); gl.drawElements(gl.TRIANGLES, warpMeshCount, gl.UNSIGNED_SHORT, 0);

  // Pass 2: Waves (with crossfade during transitions)
  gl.useProgram(waveP); gl.enable(gl.BLEND);
  gl.blendFunc(state.wave_additive?gl.SRC_ALPHA:gl.SRC_ALPHA, state.wave_additive?gl.ONE:gl.ONE_MINUS_SRC_ALPHA);
  gl.bindVertexArray(waveVAO);

  // If transitioning between different wave modes, draw both with alpha crossfade
  const xfading = transitionTarget && transitionFrom &&
    transitionFrom.wave_mode !== undefined && transitionTarget.wave_mode !== undefined &&
    transitionFrom.wave_mode !== transitionTarget.wave_mode;

  if (xfading) {
    const ease = transitionProgress < 0.5 ? 2*transitionProgress*transitionProgress : 1-Math.pow(-2*transitionProgress+2,2)/2;
    const fadeOut = 1 - ease, fadeIn = ease;
    // Draw old wave (fading out)
    const oldMode = state.wave_mode;
    state.wave_mode = transitionFrom.wave_mode;
    const wvOld = buildWaveVerts(wave, aspect);
    state.wave_mode = oldMode;
    gl.bindBuffer(gl.ARRAY_BUFFER,wBuf); gl.bufferSubData(gl.ARRAY_BUFFER,0,wvOld);
    const oldR = transitionFrom.wave_r ?? state.wave_r, oldG = transitionFrom.wave_g ?? state.wave_g, oldB = transitionFrom.wave_b ?? state.wave_b;
    gl.uniform4f(vU.u_col, oldR, oldG, oldB, state.wave_a * fadeOut);
    gl.drawArrays(state.wave_dots?gl.POINTS:gl.LINE_STRIP, 0, WAVE_N);
    // Draw new wave (fading in)
    state.wave_mode = transitionTarget.wave_mode;
    const wvNew = buildWaveVerts(wave, aspect);
    state.wave_mode = oldMode;
    gl.bindBuffer(gl.ARRAY_BUFFER,wBuf); gl.bufferSubData(gl.ARRAY_BUFFER,0,wvNew);
    gl.uniform4f(vU.u_col, state.wave_r, state.wave_g, state.wave_b, state.wave_a * fadeIn);
    gl.drawArrays(state.wave_dots?gl.POINTS:gl.LINE_STRIP, 0, WAVE_N);
  } else {
    const wv=buildWaveVerts(wave,aspect);
    gl.bindBuffer(gl.ARRAY_BUFFER,wBuf); gl.bufferSubData(gl.ARRAY_BUFFER,0,wv);
    gl.uniform4f(vU.u_col, state.wave_r, state.wave_g, state.wave_b, state.wave_a);
    gl.drawArrays(state.wave_dots?gl.POINTS:gl.LINE_STRIP, 0, WAVE_N);
  }
  if(state.wave_thick||state.wave_brighten){
    const wvT=buildWaveVerts(wave,aspect);
    gl.bindBuffer(gl.ARRAY_BUFFER,wBuf); gl.bufferSubData(gl.ARRAY_BUFFER,0,wvT);
    gl.uniform4f(vU.u_col, state.wave_r*1.2, state.wave_g*1.2, state.wave_b*1.2, state.wave_a*0.4);
    gl.drawArrays(state.wave_dots?gl.POINTS:gl.LINE_STRIP, 0, WAVE_N);
  }
  gl.disable(gl.BLEND);

  // Pass 3: Composite → intermediate FB (for bloom source)
  gl.bindFramebuffer(gl.FRAMEBUFFER, compFB); gl.viewport(0,0,w,h);
  gl.useProgram(compP);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,writeTex);
  gl.uniform1i(cU.u_tex,0); gl.uniform1f(cU.u_gamma,state.gamma);
  gl.uniform1i(cU.u_darken,state.darken); gl.uniform1i(cU.u_brighten,state.brighten);
  gl.uniform1i(cU.u_solarize,state.solarize); gl.uniform1i(cU.u_invert,state.invert);
  gl.uniform1f(cU.u_obSize,state.ob_size); gl.uniform4f(cU.u_obCol,state.ob_r,state.ob_g,state.ob_b,state.ob_a);
  gl.bindVertexArray(compVAO); gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

  // Pass 4: Bloom
  if (state.bloom_strength > 0.01) {
    // Extract bright pixels
    gl.bindFramebuffer(gl.FRAMEBUFFER, bloomFB1); gl.viewport(0,0,bloomW,bloomH);
    gl.useProgram(bloomExtP);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, compTex);
    gl.uniform1i(beU.u_tex, 0); gl.uniform1f(beU.u_threshold, state.bloom_threshold);
    gl.bindVertexArray(bloomExtVAO); gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

    // Horizontal blur
    gl.bindFramebuffer(gl.FRAMEBUFFER, bloomFB2); gl.viewport(0,0,bloomW,bloomH);
    gl.useProgram(bloomBlurP);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, bloomTex1);
    gl.uniform1i(bbU.u_tex, 0); gl.uniform2f(bbU.u_dir, 1.0/bloomW, 0);
    gl.bindVertexArray(bloomBlurVAO); gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

    // Vertical blur
    gl.bindFramebuffer(gl.FRAMEBUFFER, bloomFB1); gl.viewport(0,0,bloomW,bloomH);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, bloomTex2);
    gl.uniform2f(bbU.u_dir, 0, 1.0/bloomH);
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

    // Blend bloom with scene → screen
    gl.bindFramebuffer(gl.FRAMEBUFFER, null); gl.viewport(0,0,w,h);
    gl.useProgram(bloomBlendP);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, compTex);
    gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, bloomTex1);
    gl.uniform1i(blU.u_scene, 0); gl.uniform1i(blU.u_bloom, 1);
    gl.uniform1f(blU.u_strength, state.bloom_strength);
    gl.bindVertexArray(bloomBlendVAO); gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  } else {
    // No bloom — blit comp straight to screen
    gl.bindFramebuffer(gl.FRAMEBUFFER, null); gl.viewport(0,0,w,h);
    gl.useProgram(bloomBlendP);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, compTex);
    gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, compTex);
    gl.uniform1i(blU.u_scene, 0); gl.uniform1i(blU.u_bloom, 1);
    gl.uniform1f(blU.u_strength, 0);
    gl.bindVertexArray(bloomBlendVAO); gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  }

  // Swap
  [readTex,writeTex]=[writeTex,readTex]; [readFB,writeFB]=[writeFB,readFB];

  // FPS
  frameCount++;
  if(now-lastFpsTime>500){fps=Math.round(frameCount/((now-lastFpsTime)/1000));frameCount=0;lastFpsTime=now;}
  const trans = transitionTarget ? ' <span class="d">|</span> ~' : '';
  const autoTag = autoRandomInterval ? ' <span class="d">|</span> AUTO' : '';
  const chaosTag = chaosEnabled ? ' <span class="d">|</span> CHAOS' : '';
  const libTag = configLibrary.length ? ` <span class="d">|</span> LIB:${configLibrary.length}` : '';
  document.getElementById('hud').innerHTML=`${fps} <span class="d">fps</span> ${useMic?'<span class="d">|</span> MIC':''}${trans}${autoTag}${chaosTag}${libTag}`;

  requestAnimationFrame(render);
}

// Preset loading
function loadPreset(name) {
  const p=PRESETS[name]; if(!p) return;
  if (chaosEnabled) toggleChaos();
  if (autoRandomInterval) toggleAutoRandom();
  transitionTarget = null; transitionFrom = null;
  currentPresetName=name;
  Object.assign(state, DEFAULTS, {...p}); delete state._name;
  syncUI(); updateMilk();
  document.querySelectorAll('.presets button').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById(`pre-${name}`); if(btn) btn.classList.add('active');
}

// =====================================================
// SAVE / LOAD CONFIG
// =====================================================
function saveConfig() {
  const data = JSON.stringify({ version: 1, name: currentPresetName || 'custom', state: {...state} }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `visualizer-${(currentPresetName||'custom').replace(/\s+/g,'-')}-${Date.now()}.json`;
  a.click(); URL.revokeObjectURL(a.href);
}

function loadConfig(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.state) {
        Object.assign(state, DEFAULTS, data.state);
        currentPresetName = '';
        syncUI(); updateMilk();
        document.querySelectorAll('.presets button').forEach(b => b.classList.remove('active'));
      }
    } catch(err) { console.warn('Invalid config file', err); }
  };
  reader.readAsText(file);
  event.target.value = ''; // reset so same file can be loaded again
}

// =====================================================
// FAVORITES (10 slots, localStorage, Shift+1-0)
// =====================================================
const FAV_KEY = 'visualizer-studio-favorites';
let favorites = new Array(10).fill(null);

function loadFavorites() {
  try {
    const saved = localStorage.getItem(FAV_KEY);
    if (saved) favorites = JSON.parse(saved);
  } catch(e) {}
}

function saveFavorites() {
  localStorage.setItem(FAV_KEY, JSON.stringify(favorites));
}

function buildFavBar() {
  const bar = document.getElementById('fav-bar');
  bar.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    const btn = document.createElement('button');
    btn.className = 'fav-slot' + (favorites[i] ? ' occupied' : '');
    btn.textContent = favorites[i] ? favorites[i].name || `F${i+1}` : `${(i+1)%10}`;
    btn.title = favorites[i]
      ? `Shift+${(i+1)%10}: ${favorites[i].name}\nCtrl+Shift+${(i+1)%10}: overwrite`
      : `Shift+${(i+1)%10}: empty\nCtrl+Shift+${(i+1)%10}: save here`;
    btn.onclick = () => recallFavorite(i);
    bar.appendChild(btn);
  }
}

function storeFavorite(slot) {
  favorites[slot] = { name: currentPresetName || 'custom', state: {...state} };
  saveFavorites(); buildFavBar();
  // Flash feedback
  const btns = document.querySelectorAll('.fav-slot');
  if (btns[slot]) { btns[slot].classList.add('active'); setTimeout(() => btns[slot].classList.remove('active'), 600); }
}

function recallFavorite(slot) {
  if (!favorites[slot]) return;
  Object.assign(state, DEFAULTS, favorites[slot].state);
  currentPresetName = '';
  syncUI(); updateMilk();
  document.querySelectorAll('.presets button').forEach(b => b.classList.remove('active'));
  // Highlight slot
  document.querySelectorAll('.fav-slot').forEach(b => b.classList.remove('active'));
  const btns = document.querySelectorAll('.fav-slot');
  if (btns[slot]) btns[slot].classList.add('active');
}

loadFavorites();

// =====================================================
// CONFIG LIBRARY (built-in + user loaded)
// =====================================================
let configLibrary = []; // array of {name, author, state} objects
let currentAttribution = null;
let attrTimeout = null;

function showAttribution(name, author) {
  const el = document.getElementById('attribution');
  el.innerHTML = `<span class="attr-title">${name}</span> <span class="attr-author">— ${author || 'Unknown'}</span>`;
  el.classList.add('show');
  if (attrTimeout) clearTimeout(attrTimeout);
  attrTimeout = setTimeout(() => el.classList.remove('show'), 4000);
}

// Load built-in library from server
async function loadBuiltInLibrary() {
  try {
    const resp = await fetch('presets-library.json');
    if (!resp.ok) return;
    const data = await resp.json();
    if (Array.isArray(data)) {
      configLibrary = data;
    }
  } catch(e) { /* local file, no server — that's fine */ }
}

function loadLibrary(event) {
  const files = event.target.files; if (!files.length) return;
  let loaded = 0;
  for (const file of files) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (Array.isArray(data)) {
          configLibrary = configLibrary.concat(data);
        } else if (data.state || data.s) {
          configLibrary.push({ name: data.name || data.n || file.name.replace('.json',''), author: data.author || data.a || '', state: data.state || data.s });
        }
      } catch(err) {}
      loaded++;
    };
    reader.readAsText(file);
  }
  event.target.value = '';
}

loadBuiltInLibrary();

// =====================================================
// RANDOM WITH SMOOTH TRANSITIONS
// =====================================================
let transitionTarget = null;
let transitionProgress = 0;
let transitionFrom = null; // snapshot of state before transition

function randomize() {
  let target;

  // If library has configs, pull from there
  if (configLibrary.length > 0) {
    const pickA = configLibrary[Math.floor(Math.random() * configLibrary.length)];
    const stateA = pickA.state || pickA.s;
    const nameA = pickA.name || pickA.n || 'Untitled';
    const authorA = pickA.author || pickA.a || 'Community';

    // 40% chance: blend two presets (motion from one, color/wave from another)
    if (configLibrary.length > 1 && Math.random() < 0.4) {
      let pickB = pickA;
      while (pickB === pickA) pickB = configLibrary[Math.floor(Math.random() * configLibrary.length)];
      const stateB = pickB.state || pickB.s;
      const nameB = pickB.name || pickB.n || 'Untitled';
      const authorB = pickB.author || pickB.a || 'Community';

      // Take wave/color from A, motion/warp from B
      target = { ...DEFAULTS, ...stateA };
      target.zoom = stateB.zoom ?? target.zoom;
      target.rot = stateB.rot ?? target.rot;
      target.warp = stateB.warp ?? target.warp;
      target.cx = stateB.cx ?? target.cx;
      target.cy = stateB.cy ?? target.cy;
      target.dx = stateB.dx ?? target.dx;
      target.dy = stateB.dy ?? target.dy;
      target.sx = stateB.sx ?? target.sx;
      target.sy = stateB.sy ?? target.sy;
      target.decay = stateB.decay ?? target.decay;

      showAttribution(nameA + ' + ' + nameB, authorA + ' / ' + authorB);
    } else {
      target = { ...DEFAULTS, ...stateA };
      showAttribution(nameA, authorA);
    }

    // 35% chance: swap in a new/sacred geometry wave shape
    if (Math.random() < 0.35) {
      target.wave_mode = 8 + Math.floor(Math.random() * 16); // modes 8-23
    }

    // Safety clamps
    if (target.decay > 0.99) target.decay = 0.985;
    if (target.gamma > 2.5) target.gamma = 2.0;
    if (target.zoom > 1.15) target.zoom = 1.1;
    if (target.wave_a < 0.2) target.wave_a = 0.8;
    if (target.wave_scale < 0.5) target.wave_scale = 0.5;
    if ((target.wave_r||0)+(target.wave_g||0)+(target.wave_b||0) < 0.15) {
      target.wave_r = 0.8; target.wave_g = 0.6; target.wave_b = 0.3;
    }
  } else {
    // Generate random config
    target = { ...DEFAULTS };
    target.wave_mode = Math.floor(Math.random() * 24);
    target.wave_a = 0.6 + Math.random() * 0.4;
    target.wave_x = 0.3 + Math.random() * 0.4;
    target.wave_y = 0.3 + Math.random() * 0.4;
    target.wave_mystery = (Math.random() - 0.5) * 2;
    target.wave_dots = Math.random() > 0.7 ? 1 : 0;
    target.wave_thick = Math.random() > 0.4 ? 1 : 0;
    target.wave_additive = Math.random() > 0.3 ? 1 : 0;
    target.wave_brighten = Math.random() > 0.6 ? 1 : 0;
    target.zoom = 0.95 + Math.random() * 0.15;
    target.rot = (Math.random() - 0.5) * 0.08;
    target.warp = Math.random() * 1.5;
    target.cx = 0.4 + Math.random() * 0.2;
    target.cy = 0.4 + Math.random() * 0.2;
    target.dx = (Math.random() - 0.5) * 0.02;
    target.dy = (Math.random() - 0.5) * 0.02;
    target.sx = 0.95 + Math.random() * 0.1;
    target.sy = 0.95 + Math.random() * 0.1;
    target.decay = 0.92 + Math.random() * 0.06; // cap at 0.98 to prevent white-out
    target.gamma = 0.8 + Math.random() * 1.2; // cap at 2.0
    target.wave_scale = 0.5 + Math.random() * 2.5;
    target.wave_smoothing = Math.random();
    target.brighten = 0; // avoid white-out — brighten compounds with high decay
    target.darken = Math.random() > 0.6 ? 1 : 0;
    target.solarize = Math.random() > 0.9 ? 1 : 0;
    target.invert = Math.random() > 0.85 ? 1 : 0;
    target.bloom_strength = Math.random() * 0.6;
    target.bloom_threshold = 0.2 + Math.random() * 0.5;

    // Apply palette colors if active
    const palColor = getRandomPaletteColor();
    if (palColor) {
      target.wave_r = palColor[0]; target.wave_g = palColor[1]; target.wave_b = palColor[2];
    } else {
      target.wave_r = Math.random(); target.wave_g = Math.random(); target.wave_b = Math.random();
    }
  }

  // Preserve audio settings and randomizer settings
  target.audio_bass_gain = state.audio_bass_gain;
  target.audio_mid_gain = state.audio_mid_gain;
  target.audio_treb_gain = state.audio_treb_gain;
  target.audio_trigger = state.audio_trigger;
  target.transition_speed = state.transition_speed;
  target.auto_interval = state.auto_interval;

  transitionFrom = { ...state };
  transitionTarget = target;
  transitionProgress = 0;
  currentPresetName = '';
  document.querySelectorAll('.presets button').forEach(b => b.classList.remove('active'));
}

// Keys that should snap (integers/booleans), not lerp
const SNAP_KEYS = new Set(['wave_mode','wave_dots','wave_thick','wave_additive','wave_brighten','brighten','darken','solarize','invert']);

function stepTransition() {
  if (!transitionTarget) return;
  transitionProgress += state.transition_speed;
  if (transitionProgress >= 1) {
    Object.assign(state, transitionTarget);
    transitionTarget = null; transitionFrom = null;
    syncUI(); updateMilk();
    return;
  }
  const t = transitionProgress;
  const ease = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; // ease in-out
  for (const k of Object.keys(transitionTarget)) {
    if (k.startsWith('_')) continue;
    if (SNAP_KEYS.has(k)) {
      state[k] = ease > 0.5 ? transitionTarget[k] : (transitionFrom ? transitionFrom[k] : state[k]);
    } else if (typeof transitionTarget[k] === 'number') {
      const from = transitionFrom ? transitionFrom[k] : (state[k] ?? DEFAULTS[k] ?? 0);
      state[k] = from + (transitionTarget[k] - from) * ease;
    }
  }
  if (Math.floor(transitionProgress * 10) !== Math.floor((transitionProgress - state.transition_speed) * 10)) {
    syncUI();
  }
}

// =====================================================
// AUTO-RANDOM
// =====================================================
let autoRandomInterval = null;

function toggleAutoRandom() {
  if (autoRandomInterval) {
    clearInterval(autoRandomInterval);
    autoRandomInterval = null;
    document.getElementById('btn-auto').textContent = 'auto: off';
    document.getElementById('btn-auto').classList.remove('active');
  } else {
    randomize(); // immediate first hit
    autoRandomInterval = setInterval(randomize, state.auto_interval * 1000);
    document.getElementById('btn-auto').textContent = 'auto: ON';
    document.getElementById('btn-auto').classList.add('active');
  }
}

// Restart auto-random interval when interval changes
function restartAutoIfRunning() {
  if (autoRandomInterval) {
    clearInterval(autoRandomInterval);
    autoRandomInterval = setInterval(randomize, state.auto_interval * 1000);
  }
}

// =====================================================
// CHAOS MODE — slow Brownian drift on parameters
// =====================================================
let chaosEnabled = false;
const CHAOS_SPEED = 0.0008; // base drift per frame

const CHAOS_PARAMS = {
  zoom:  { min: 0.92, max: 1.1, drift: 1 },
  rot:   { min: -0.08, max: 0.08, drift: 1 },
  warp:  { min: 0, max: 2, drift: 0.8 },
  cx:    { min: 0.3, max: 0.7, drift: 0.5 },
  cy:    { min: 0.3, max: 0.7, drift: 0.5 },
  dx:    { min: -0.015, max: 0.015, drift: 0.3 },
  dy:    { min: -0.015, max: 0.015, drift: 0.3 },
  sx:    { min: 0.95, max: 1.05, drift: 0.3 },
  sy:    { min: 0.95, max: 1.05, drift: 0.3 },
  decay: { min: 0.93, max: 0.985, drift: 0.3 },
  gamma: { min: 0.7, max: 1.6, drift: 0.2 },
  wave_r: { min: 0.1, max: 1, drift: 0.4 },
  wave_g: { min: 0.05, max: 1, drift: 0.4 },
  wave_b: { min: 0.05, max: 1, drift: 0.4 },
  wave_a: { min: 0.5, max: 1, drift: 0.15 },
  wave_x: { min: 0.2, max: 0.8, drift: 0.3 },
  wave_y: { min: 0.2, max: 0.8, drift: 0.3 },
  wave_mystery: { min: -2, max: 2, drift: 0.4 },
  wave_scale: { min: 0.5, max: 4, drift: 0.3 },
  bloom_strength: { min: 0.05, max: 0.5, drift: 0.15 },
  bloom_threshold: { min: 0.2, max: 0.6, drift: 0.1 },
};

// Each param has its own random walk velocity
const chaosVelocity = {};
for (const k of Object.keys(CHAOS_PARAMS)) chaosVelocity[k] = (Math.random() - 0.5) * 2;

let chaosFrameCount = 0;

function stepChaos() {
  if (!chaosEnabled) return;
  chaosFrameCount++;

  for (const [k, cfg] of Object.entries(CHAOS_PARAMS)) {
    // Brownian: nudge velocity randomly, then apply
    chaosVelocity[k] += (Math.random() - 0.5) * 0.3;
    chaosVelocity[k] *= 0.98; // dampen to prevent runaway
    chaosVelocity[k] = Math.max(-1, Math.min(1, chaosVelocity[k]));

    const range = cfg.max - cfg.min;
    const nudge = chaosVelocity[k] * CHAOS_SPEED * cfg.drift * range;
    state[k] = Math.max(cfg.min, Math.min(cfg.max, (state[k] ?? DEFAULTS[k]) + nudge));
  }

  // Occasionally flip a boolean (~every 10 seconds at 60fps)
  if (chaosFrameCount % 600 === 0) {
    const bools = ['wave_dots','wave_thick','wave_additive','darken','solarize'];
    const pick = bools[Math.floor(Math.random() * bools.length)];
    state[pick] = state[pick] ? 0 : 1;
  }

  // Occasionally change wave_mode (~every 15 seconds)
  if (chaosFrameCount % 900 === 0 && Math.random() < 0.5) {
    state.wave_mode = Math.floor(Math.random() * 24);
  }

  // Keep wave color saturated — at least one channel stays bright
  const maxC = Math.max(state.wave_r||0, state.wave_g||0, state.wave_b||0);
  if (maxC < 0.5) {
    const channels = ['wave_r','wave_g','wave_b'];
    const strongest = channels.reduce((a,b) => (state[a]||0) > (state[b]||0) ? a : b);
    state[strongest] = Math.max(state[strongest], 0.7);
  }

  // Sync UI every ~30 frames to avoid performance hit
  if (chaosFrameCount % 30 === 0) syncUI();
}

function toggleChaos() {
  chaosEnabled = !chaosEnabled;
  document.getElementById('btn-chaos').textContent = chaosEnabled ? 'chaos: ON' : 'chaos: off';
  document.getElementById('btn-chaos').classList.toggle('active', chaosEnabled);
}

// =====================================================
// KEYBOARD
// =====================================================
document.addEventListener('keydown', e => {
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;

  // Shift+1-0: recall favorites, Ctrl+Shift+1-0: store favorites
  const numKey = e.key >= '0' && e.key <= '9' ? parseInt(e.key) : -1;
  if (e.shiftKey && numKey >= 0) {
    const slot = numKey === 0 ? 9 : numKey - 1; // Shift+1=slot0, Shift+0=slot9
    if (e.ctrlKey) { storeFavorite(slot); } else { recallFavorite(slot); }
    e.preventDefault(); return;
  }

  switch(e.key){
    case '1': loadPreset('cyan_vscope'); break;
    case '2': loadPreset('slow_burn'); break;
    case '3': loadPreset('deep_keel'); break;
    case '4': loadPreset('metheus'); break;
    case '5': loadPreset('water'); break;
    case '6': loadPreset('fire'); break;
    case 'r': randomize(); break;
    case 'a': toggleAutoRandom(); break;
    case 'c': toggleChaos(); break;
    case 'f': goFullscreen(); break;
    case 'm': toggleMic(); break;
    case ' ': paused=!paused; e.preventDefault(); break;
  }
});

// Init
buildUI();
buildFavBar();
initFBs();
loadPreset('metheus');
render();
</script>
