<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synthestasia</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a1a1a; --panel: #1f1f1f; --border: #333; --text: #c8c0b0;
    --dim: #706860; --accent: #f0a500; --accent-dim: #a87200;
    --input-bg: #252525; --group-bg: #1c1c1c;
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Courier New', monospace;
    background: var(--bg); color: var(--text);
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
  }
  body.fullscreen-mode { grid-template-columns: 1fr; }
  body.fullscreen-mode #sidebar,
  body.fullscreen-mode #output-panel,
  body.fullscreen-mode header { display: none; }

  header {
    grid-column: 1 / -1; grid-row: 1; padding: 8px 16px;
    background: var(--panel); border-bottom: 1px dashed var(--border);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  header h1 { font-size: 13px; font-weight: 400; color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase; }
  .presets { display: flex; gap: 5px; margin-left: auto; flex-wrap: wrap; }
  .presets button, .toolbar button {
    background: var(--input-bg); border: 1px dashed var(--border); color: var(--dim);
    padding: 3px 9px; border-radius: 2px; cursor: pointer;
    font: 10px 'Courier New', monospace; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .presets button:hover, .toolbar button:hover { border-color: var(--accent-dim); color: var(--text); }
  .favorites { display: flex; gap: 3px; width: 100%; margin-top: 4px; }
  .fav-slot {
    flex: 1; min-width: 0; font: 9px 'Courier New', monospace; padding: 3px 2px;
    background: var(--input-bg); border: 1px dashed var(--border); color: var(--dim);
    border-radius: 2px; cursor: pointer; text-align: center; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .fav-slot.occupied { color: var(--text); }
  .fav-slot.active { border-color: var(--accent); border-style: solid; color: var(--accent); background: rgba(240,165,0,0.08); }
  .fav-slot:hover { border-color: var(--accent-dim); }
  .palette-grid { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .pal-swatch {
    width: 28px; height: 20px; border: 1px dashed var(--border); border-radius: 2px;
    cursor: pointer; transition: all 0.2s;
  }
  .pal-swatch:hover { transform: scale(1.2); border-color: var(--accent); }
  .pal-swatch.active { border: 2px solid var(--accent); border-style: solid; }
  .pal-name { font-size: 9px; color: var(--dim); margin-top: 6px; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 1px; }
  .pal-section { margin-bottom: 6px; }
  .pal-custom-row { display: flex; gap: 4px; margin-top: 6px; align-items: center; }
  .pal-custom-row input[type="color"] { width: 28px; height: 20px; border: 1px dashed var(--border); background: var(--input-bg); cursor: pointer; padding: 0; }
  .pal-custom-row button { font: 9px 'Courier New',monospace; padding: 2px 6px; background: var(--input-bg); border: 1px dashed var(--border); color: var(--dim); cursor: pointer; border-radius: 2px; }
  .pal-custom-row button:hover { border-color: var(--accent); color: var(--accent); }
  .presets button.active, .toolbar button.active { border-color: var(--accent); border-style: solid; color: var(--accent); background: rgba(240,165,0,0.08); }
  .toolbar { display: flex; gap: 5px; align-items: center; }
  #mic-select {
    font: 10px 'Courier New', monospace; background: var(--input-bg); color: var(--dim);
    border: 1px dashed var(--border); padding: 3px 6px; border-radius: 2px; max-width: 180px;
    outline: none; cursor: pointer;
  }
  #mic-select:hover { border-color: var(--accent-dim); color: var(--text); }
  #mic-select option { background: var(--panel); color: var(--text); }

  #sidebar {
    grid-column: 1; grid-row: 2; overflow-y: auto; padding: 8px;
    background: var(--panel); border-right: 1px dashed var(--border);
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    min-height: 0;
  }
  .group { margin-bottom: 5px; background: var(--group-bg); border: 1px dashed var(--border); border-radius: 2px; }
  .group-header {
    padding: 6px 10px; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--accent); cursor: pointer; display: flex; justify-content: space-between; align-items: center; user-select: none;
  }
  .group-header::after { content: '▾'; font-size: 9px; color: var(--dim); transition: transform 0.2s; }
  .group.collapsed .group-header::after { transform: rotate(-90deg); }
  .group.collapsed .group-body { display: none; }
  .group-body { padding: 5px 10px 8px; }
  .ctl { margin-bottom: 6px; }
  .ctl:last-child { margin-bottom: 0; }
  .ctl label { display: flex; justify-content: space-between; font-size: 10px; color: var(--dim); margin-bottom: 2px; }
  .ctl .val { color: var(--accent); min-width: 44px; text-align: right; }
  input[type="range"] { -webkit-appearance: none; width: 100%; height: 3px; background: var(--input-bg); border-radius: 1px; outline: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; cursor: pointer; border: 2px solid var(--bg); }
  input[type="range"]::-moz-range-thumb { width: 12px; height: 12px; background: var(--accent); border-radius: 50%; cursor: pointer; border: 2px solid var(--bg); }
  .toggle-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 3px; }
  .tog {
    font: 9px 'Courier New', monospace; padding: 2px 6px;
    background: var(--input-bg); border: 1px dashed var(--border); color: var(--dim);
    border-radius: 2px; cursor: pointer;
  }
  .tog.on { background: rgba(240,165,0,0.1); border-color: var(--accent); border-style: solid; color: var(--accent); }
  .wm-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 3px; margin-top: 3px; }
  .wm-btn {
    aspect-ratio: 1.4; background: var(--input-bg); border: 1px dashed var(--border); border-radius: 2px;
    cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 9px; color: var(--dim); padding: 2px;
  }
  .wm-btn canvas { width: 34px; height: 18px; pointer-events: none; }
  .wm-grid.expanded { grid-template-columns: repeat(4,1fr); }
  .wm-expand { grid-column: 1 / -1; font: 9px 'Courier New', monospace; padding: 3px; background: var(--input-bg); border: 1px dashed var(--border); color: var(--dim); border-radius: 2px; cursor: pointer; text-align: center; }
  .wm-expand:hover { border-color: var(--accent-dim); color: var(--text); }
  .wm-btn.active { border-color: var(--accent); border-style: solid; color: var(--accent); background: rgba(240,165,0,0.06); }
  .cprev { width: 100%; height: 5px; border-radius: 1px; margin-top: 2px; border: 1px dashed var(--border); }

  #preview-wrap { grid-column: 2; grid-row: 2; position: relative; overflow: hidden; background: #000; min-height: 0; }
  #preview-wrap canvas { width: 100%; height: 100%; display: block; }
  #hud {
    position: absolute; top: 8px; right: 8px;
    font: 10px 'Courier New', monospace; color: var(--accent);
    background: rgba(0,0,0,0.5); padding: 3px 8px; border-radius: 2px;
    pointer-events: none;
  }
  #hud .d { color: var(--dim); }
  #attribution {
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    font: 11px 'Courier New', monospace; color: var(--accent);
    background: rgba(0,0,0,0.6); padding: 4px 14px; border-radius: 2px;
    pointer-events: none; text-align: center; opacity: 0; transition: opacity 0.8s;
    white-space: nowrap; max-width: 90%;
  }
  #attribution.show { opacity: 1; }
  #attribution .attr-title { color: var(--text); }
  #attribution .attr-author { color: var(--dim); font-size: 9px; }

  #output-panel {
    grid-column: 1 / -1; grid-row: 3; background: var(--panel); border-top: 1px dashed var(--border);
    display: grid; grid-template-columns: 1fr auto; height: 140px; min-height: 100px; max-height: 180px;
  }
  #milk-out {
    font: 10px 'Courier New', monospace; background: var(--bg); color: var(--text);
    border: none; padding: 6px 10px; resize: none; overflow-y: auto; outline: none;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #copy-col { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; gap: 6px; }
  #copy-btn {
    background: var(--accent); color: var(--bg); border: none; padding: 7px 14px; border-radius: 2px;
    cursor: pointer; font: bold 11px 'Courier New', monospace; text-transform: uppercase; letter-spacing: 1px;
  }
  #copy-btn:hover { background: #f0c060; }
  #copy-btn.ok { background: #4a8; }
  #copy-label { font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 1.5px; }
</style>
</head>
<body>

<header>
  <a href="lab.html" style="color:var(--dim);text-decoration:none;border:1px dashed var(--border);padding:3px 9px;font:10px 'Courier New',monospace;letter-spacing:0.5px;transition:all 0.3s;" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--dim)'">&larr; LAB</a>
  <h1>// synthestasia</h1>
  <div class="toolbar">
    <select id="mic-select" onchange="switchMic(this.value)" title="Audio input device">
      <option value="">-- mic select --</option>
    </select>
    <button id="btn-mic" onclick="toggleMic()">mic: off</button>
    <button id="btn-fs" onclick="goFullscreen()">fullscreen</button>
  </div>
  <div class="presets">
    <button onclick="loadPreset('cyan_vscope')" id="pre-cyan_vscope">Cyan V-Scope</button>
    <button onclick="loadPreset('slow_burn')" id="pre-slow_burn">Slow Burn</button>
    <button onclick="loadPreset('deep_keel')" id="pre-deep_keel">Deep Keel</button>
    <button onclick="loadPreset('metheus')" id="pre-metheus">Metheus</button>
    <button onclick="loadPreset('water')" id="pre-water">Water</button>
    <button onclick="loadPreset('fire')" id="pre-fire">Fire</button>
  </div>
  <div class="toolbar">
    <button onclick="randomize()" title="Random preset (r)">random</button>
    <button onclick="toggleAutoRandom()" id="btn-auto" title="Auto-random mode (a)">auto: off</button>
    <button onclick="toggleChaos()" id="btn-chaos" title="Chaos drift mode (c)">chaos: off</button>
    <button onclick="saveConfig()" title="Save to file">save</button>
    <button onclick="document.getElementById('load-file').click()" title="Load from file">load</button>
    <button onclick="document.getElementById('load-library').click()" title="Load config library folder">library</button>
    <input type="file" id="load-file" accept=".json" style="display:none" onchange="loadConfig(event)">
    <input type="file" id="load-library" accept=".json" multiple style="display:none" onchange="loadLibrary(event)">
  </div>
  <div class="favorites" id="fav-bar"></div>
</header>

<div id="sidebar"></div>

<div id="preview-wrap">
  <canvas id="c"></canvas>
  <div id="hud">--</div>
  <div id="attribution"></div>
</div>

<div id="output-panel">
  <textarea id="milk-out" readonly rows="7"></textarea>
  <div id="copy-col">
    <span id="copy-label">.milk</span>
    <button id="copy-btn" onclick="copyMilk()">Copy</button>
  </div>
</div>

<script>
// =====================================================
// SYNTHESTASIA — WebGL Audio-Reactive Visual Engine
// =====================================================

const DEFAULTS = {
  wave_mode: 0,
  wave_r: 1, wave_g: 1, wave_b: 1, wave_a: 1,
  wave_x: 0.5, wave_y: 0.5, wave_mystery: 0,
  wave_dots: 0, wave_thick: 0, wave_additive: 1, wave_brighten: 1,
  zoom: 1, rot: 0, warp: 0,
  cx: 0.5, cy: 0.5, dx: 0, dy: 0, sx: 1, sy: 1,
  decay: 0.98, gamma: 1,
  ob_size: 0.01, ob_r: 0, ob_g: 0, ob_b: 0, ob_a: 0,
  ib_size: 0.01, ib_r: 0.25, ib_g: 0.25, ib_b: 0.25, ib_a: 0,
  brighten: 0, darken: 0, solarize: 0, invert: 0,
  wave_scale: 1, wave_smoothing: 0.75,
  bloom_strength: 0.3, bloom_threshold: 0.4,
  audio_bass_gain: 3, audio_mid_gain: 1.5, audio_treb_gain: 0.25, audio_trigger: 0,
  transition_speed: 0.03, auto_interval: 20,
};

const PRESETS = {
  cyan_vscope: {
    _name: 'Cyan V-Scope', wave_mode: 5, wave_r: 0.33, wave_g: 1, wave_b: 1, wave_a: 0.8,
    wave_x: 0.51, wave_y: 0.5, wave_mystery: 1, wave_dots: 0, wave_thick: 1, wave_additive: 1, wave_brighten: 0,
    zoom: 1.081, rot: 0.057, warp: 0.56, cx: 0.5, cy: 0.48, dx: -0.001, dy: 0, sx: 1, sy: 1.012,
    decay: 0.9, gamma: 0.5, ob_size: 0.034, ob_r: 0.08, ob_g: 0, ob_b: 0, ob_a: 0,
    ib_size: 0, ib_r: 0.25, ib_g: 0.25, ib_b: 0.25, ib_a: 0,

  },
  slow_burn: {
    _name: 'Forge — Slow Burn', wave_mode: 7, wave_r: 0.9, wave_g: 0.6, wave_b: 0.2, wave_a: 0.9,
    wave_x: 0.5, wave_y: 0.5, wave_mystery: 0, wave_dots: 0, wave_thick: 1, wave_additive: 1, wave_brighten: 0,
    zoom: 0.999, rot: 0, warp: 0.5, cx: 0.5, cy: 0.5, dx: 0, dy: 0, sx: 1, sy: 1,
    decay: 0.975, gamma: 1.8, ob_size: 0.005, ob_r: 0, ob_g: 0, ob_b: 0, ob_a: 0,
    ib_size: 0.01, ib_r: 0, ib_g: 0, ib_b: 0, ib_a: 0,
    wave_scale: 1, wave_smoothing: 0.75, brighten: 0, darken: 0, solarize: 0, invert: 0,
    bloom_strength: 0.4, bloom_threshold: 0.35,
  },
  deep_keel: {
    _name: 'Forge — Deep Keel', wave_mode: 7, wave_r: 0.2, wave_g: 0.5, wave_b: 0.9, wave_a: 0.85,
    wave_x: 0.5, wave_y: 0.5, wave_mystery: 0, wave_dots: 0, wave_thick: 1, wave_additive: 1, wave_brighten: 0,
    zoom: 0.9995, rot: 0, warp: 0.2, cx: 0.5, cy: 0.5, dx: 0, dy: 0, sx: 1, sy: 1,
    decay: 0.985, gamma: 1.6, ob_size: 0.005, ob_r: 0, ob_g: 0, ob_b: 0, ob_a: 0,
    ib_size: 0.01, ib_r: 0, ib_g: 0, ib_b: 0, ib_a: 0,
    wave_scale: 1, wave_smoothing: 0.85, brighten: 0, darken: 0, solarize: 0, invert: 0,
    bloom_strength: 0.2, bloom_threshold: 0.45,
  },
  metheus: {
    _name: 'Forge — Metheus', wave_mode: 7, wave_r: 1, wave_g: 0.5, wave_b: 0.1, wave_a: 0.9,
    wave_x: 0.5, wave_y: 0.5, wave_mystery: 0, wave_dots: 0, wave_thick: 1, wave_additive: 1, wave_brighten: 0,
    zoom: 0.998, rot: 0, warp: 0.6, cx: 0.5, cy: 0.5, dx: 0, dy: 0, sx: 1, sy: 1,
    decay: 0.965, gamma: 2, ob_size: 0.005, ob_r: 0, ob_g: 0, ob_b: 0, ob_a: 0,
    ib_size: 0.01, ib_r: 0, ib_g: 0, ib_b: 0, ib_a: 0,
    wave_scale: 1.2, wave_smoothing: 0.7, brighten: 0, darken: 0, solarize: 0, invert: 0,
    bloom_strength: 0.5, bloom_threshold: 0.3,
  },
  water: {
    _name: 'ROOT — Water', wave_mode: 1, wave_r: 0.98, wave_g: 0.6, wave_b: 0.2, wave_a: 0.9,
    wave_x: 0.54, wave_y: 0.54, wave_mystery: -0.02, wave_dots: 1, wave_thick: 1, wave_additive: 1, wave_brighten: 0,
    zoom: 1.051, rot: 0.002, warp: 0.13, cx: 0.53, cy: 0.5, dx: 0, dy: 0, sx: 1, sy: 1,
    decay: 0.989, gamma: 1.35, ob_size: 0.005, ob_r: 0, ob_g: 0, ob_b: 0, ob_a: 0,
    ib_size: 0.01, ib_r: 0, ib_g: 0, ib_b: 0, ib_a: 0,
    wave_scale: 4, wave_smoothing: 1, brighten: 0, darken: 0, solarize: 0, invert: 1,
    bloom_strength: 0.3, bloom_threshold: 0.4,
  },
  fire: {
    _name: 'ROOT — Fire', wave_mode: 1, wave_r: 0.98, wave_g: 0.6, wave_b: 0.2, wave_a: 0.9,
    wave_x: 0.54, wave_y: 0.54, wave_mystery: -0.02, wave_dots: 0, wave_thick: 1, wave_additive: 1, wave_brighten: 0,
    zoom: 1.051, rot: 0.002, warp: 0.13, cx: 0.53, cy: 0.5, dx: 0, dy: 0, sx: 1, sy: 1,
    decay: 0.989, gamma: 1.35, ob_size: 0.005, ob_r: 0, ob_g: 0, ob_b: 0, ob_a: 0,
    ib_size: 0.01, ib_r: 0, ib_g: 0, ib_b: 0, ib_a: 0,
    wave_scale: 4, wave_smoothing: 1, brighten: 0, darken: 0, solarize: 0, invert: 0,
    bloom_strength: 0.45, bloom_threshold: 0.3,
  },

const state = { ...DEFAULTS };
let currentPresetName = '';
let paused = false;
let useMic = false;

// =====================================================
// UI CONTROLS
// =====================================================
const GROUPS = [
  { name: 'Wave Shape', controls: [
    { type: 'wavemode' },
    { type: 'slider', key: 'wave_mystery', min: -1, max: 1, step: 0.01, label: 'mystery' },
    { type: 'slider', key: 'wave_scale', min: 0.1, max: 4, step: 0.01, label: 'scale' },
    { type: 'slider', key: 'wave_smoothing', min: 0, max: 1, step: 0.01, label: 'smoothing' },
    { type: 'toggles', keys: ['wave_dots','wave_thick','wave_additive','wave_brighten'] },
  ]},
  { name: 'Wave Color', controls: [
    { type: 'slider', key: 'wave_r', min: 0, max: 1, step: 0.01, label: 'red' },
    { type: 'slider', key: 'wave_g', min: 0, max: 1, step: 0.01, label: 'green' },
    { type: 'slider', key: 'wave_b', min: 0, max: 1, step: 0.01, label: 'blue' },
    { type: 'slider', key: 'wave_a', min: 0, max: 1, step: 0.01, label: 'alpha' },
    { type: 'color', keys: ['wave_r','wave_g','wave_b','wave_a'] },
    { type: 'slider', key: 'wave_x', min: 0, max: 1, step: 0.01, label: 'x pos' },
    { type: 'slider', key: 'wave_y', min: 0, max: 1, step: 0.01, label: 'y pos' },
  ]},
  { name: 'Motion', controls: [
    { type: 'slider', key: 'zoom', min: 0.9, max: 1.2, step: 0.001, label: 'zoom' },
    { type: 'slider', key: 'rot', min: -0.1, max: 0.1, step: 0.001, label: 'rotation' },
    { type: 'slider', key: 'warp', min: 0, max: 2, step: 0.01, label: 'warp' },
    { type: 'slider', key: 'cx', min: 0, max: 1, step: 0.01, label: 'center x' },
    { type: 'slider', key: 'cy', min: 0, max: 1, step: 0.01, label: 'center y' },
    { type: 'slider', key: 'dx', min: -0.05, max: 0.05, step: 0.001, label: 'pan x' },
    { type: 'slider', key: 'dy', min: -0.05, max: 0.05, step: 0.001, label: 'pan y' },
    { type: 'slider', key: 'sx', min: 0.9, max: 1.1, step: 0.001, label: 'stretch x' },
    { type: 'slider', key: 'sy', min: 0.9, max: 1.1, step: 0.001, label: 'stretch y' },
  ]},
  { name: 'Decay & Gamma', controls: [
    { type: 'slider', key: 'decay', min: 0.9, max: 1, step: 0.001, label: 'decay' },
    { type: 'slider', key: 'gamma', min: 0.5, max: 3, step: 0.01, label: 'gamma' },
  ]},
  { name: 'Borders', collapsed: true, controls: [
    { type: 'slider', key: 'ob_size', min: 0, max: 0.1, step: 0.001, label: 'outer size' },
    { type: 'slider', key: 'ob_r', min: 0, max: 1, step: 0.01, label: 'outer R' },
    { type: 'slider', key: 'ob_g', min: 0, max: 1, step: 0.01, label: 'outer G' },
    { type: 'slider', key: 'ob_b', min: 0, max: 1, step: 0.01, label: 'outer B' },
    { type: 'slider', key: 'ob_a', min: 0, max: 1, step: 0.01, label: 'outer A' },
    { type: 'color', keys: ['ob_r','ob_g','ob_b','ob_a'] },
    { type: 'slider', key: 'ib_size', min: 0, max: 0.1, step: 0.001, label: 'inner size' },
    { type: 'slider', key: 'ib_r', min: 0, max: 1, step: 0.01, label: 'inner R' },
    { type: 'slider', key: 'ib_g', min: 0, max: 1, step: 0.01, label: 'inner G' },
    { type: 'slider', key: 'ib_b', min: 0, max: 1, step: 0.01, label: 'inner B' },
    { type: 'slider', key: 'ib_a', min: 0, max: 1, step: 0.01, label: 'inner A' },
    { type: 'color', keys: ['ib_r','ib_g','ib_b','ib_a'] },
  ]},
  { name: 'Randomizer', controls: [
    { type: 'slider', key: 'transition_speed', min: 0.005, max: 0.15, step: 0.005, label: 'morph speed' },
    { type: 'slider', key: 'auto_interval', min: 5, max: 120, step: 1, label: 'auto interval (s)' },
    { type: 'palette' },
  ]},
  { name: 'Audio Sensitivity', controls: [
    { type: 'slider', key: 'audio_bass_gain', min: 0, max: 3, step: 0.01, label: 'bass gain' },
    { type: 'slider', key: 'audio_mid_gain', min: 0, max: 3, step: 0.01, label: 'mid gain' },
    { type: 'slider', key: 'audio_treb_gain', min: 0, max: 3, step: 0.01, label: 'treb gain' },
    { type: 'slider', key: 'audio_trigger', min: 0, max: 1, step: 0.01, label: 'trigger threshold' },

function buildUI() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  for (const g of GROUPS) {
    const div = document.createElement('div');
    div.className = 'group' + (g.collapsed ? ' collapsed' : '');
    const hdr = document.createElement('div');
    hdr.className = 'group-header'; hdr.textContent = g.name;
    hdr.onclick = () => div.classList.toggle('collapsed');
    div.appendChild(hdr);
    const body = document.createElement('div');
    body.className = 'group-body';
    for (const c of g.controls) {
      if (c.type === 'slider') body.appendChild(mkSlider(c));
      else if (c.type === 'wavemode') body.appendChild(mkWaveMode());
      else if (c.type === 'toggles') body.appendChild(mkToggles(c.keys));
      else if (c.type === 'color') body.appendChild(mkColor(c.keys));
      else if (c.type === 'palette') body.appendChild(mkPalette());
    }
    div.appendChild(body);
    sb.appendChild(div);
  }
}

function mkSlider(c) {
  const d = document.createElement('div'); d.className = 'ctl';
  const dec = c.step < 0.01 ? 3 : 2;
  d.innerHTML = `<label><span>${c.label}</span><span class="val" id="v-${c.key}">${Number(state[c.key]).toFixed(dec)}</span></label>
    <input type="range" id="s-${c.key}" min="${c.min}" max="${c.max}" step="${c.step}" value="${state[c.key]}">`;
  d.querySelector('input').addEventListener('input', e => {
    state[c.key] = parseFloat(e.target.value);
    document.getElementById(`v-${c.key}`).textContent = Number(e.target.value).toFixed(dec);
    onParamChange();
  });
  return d;
}

const WAVE_NAMES = ['circle','x-cross','cross','blob','rings','v-line','sine','organic',
  'star','lissajous','helix','infinity','pulse','spiral','diamond','spectrum',
  'flower','seed','metatron','sri yantra','vesica','golden','merkaba','torus knot'];

function mkWaveMode() {
  const d = document.createElement('div'); d.className = 'ctl';
  d.innerHTML = '<label><span>wave_mode</span></label>';
  const grid = document.createElement('div'); grid.className = 'wm-grid';
  for (let i = 0; i < 24; i++) {
    const btn = document.createElement('div');
    btn.className = 'wm-btn' + (state.wave_mode === i ? ' active' : '');
    btn.id = `wm-${i}`;
    if (i >= 8) btn.style.display = 'none';
    const cvs = document.createElement('canvas'); cvs.width = 68; cvs.height = 36;
    drawWaveThumb(cvs, i);
    btn.appendChild(cvs);
    const lbl = document.createElement('span'); lbl.textContent = WAVE_NAMES[i] || i; lbl.style.fontSize = '7px'; btn.appendChild(lbl);
    btn.onclick = () => {
      document.querySelectorAll('.wm-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.wave_mode = i; onParamChange();
    };
    grid.appendChild(btn);
  }
  // Expand buttons
  const expBtn = document.createElement('button'); expBtn.className = 'wm-expand'; expBtn.id = 'wm-exp1'; expBtn.textContent = '+ more shapes';
  expBtn.onclick = () => {
    const showing = expBtn.textContent.startsWith('+');
    for (let i = 8; i < 16; i++) document.getElementById(`wm-${i}`).style.display = showing ? '' : 'none';
    document.getElementById('wm-exp2').style.display = showing ? '' : 'none';
    expBtn.textContent = showing ? '- fewer shapes' : '+ more shapes';
    if (!showing) { for (let i = 16; i < 24; i++) document.getElementById(`wm-${i}`).style.display = 'none'; document.getElementById('wm-exp2').textContent = '+ sacred geometry'; }
  };
  grid.appendChild(expBtn);
  const sacBtn = document.createElement('button'); sacBtn.className = 'wm-expand'; sacBtn.id = 'wm-exp2'; sacBtn.textContent = '+ sacred geometry'; sacBtn.style.display = 'none';
  sacBtn.style.color = '#f0a500';
  sacBtn.onclick = () => {
    const showing = sacBtn.textContent.startsWith('+');
    for (let i = 16; i < 24; i++) document.getElementById(`wm-${i}`).style.display = showing ? '' : 'none';
    sacBtn.textContent = showing ? '- sacred geometry' : '+ sacred geometry';
  };
  grid.appendChild(sacBtn);
  d.appendChild(grid); return d;
}

function drawWaveThumb(cvs, mode) {
  const ctx = cvs.getContext('2d'), w = cvs.width, h = cvs.height, cx = w/2, cy = h/2;
  ctx.strokeStyle = '#f0a500'; ctx.lineWidth = 1.5; ctx.beginPath();
  if (mode===0) ctx.arc(cx,cy,10,0,Math.PI*2);
  else if (mode===1) { ctx.moveTo(cx-10,cy-8); ctx.lineTo(cx+10,cy+8); ctx.moveTo(cx+10,cy-8); ctx.lineTo(cx-10,cy+8); }
  else if (mode===2) { ctx.moveTo(cx,cy-10); ctx.lineTo(cx,cy+10); ctx.moveTo(cx-12,cy); ctx.lineTo(cx+12,cy); }
  else if (mode===3) { for(let a=0;a<=6.3;a+=.1){const r=8+3*Math.sin(a*3);a===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));} ctx.closePath(); }
  else if (mode===4) { ctx.arc(cx,cy,11,0,Math.PI*2); ctx.moveTo(cx+6,cy); ctx.arc(cx,cy,6,0,Math.PI*2); }
  else if (mode===5) { ctx.moveTo(cx,cy-12); ctx.lineTo(cx,cy+12); }
  else if (mode===6) { for(let x=6;x<w-6;x++){const y=cy+Math.sin((x-6)*0.15)*8;x===6?ctx.moveTo(x,y):ctx.lineTo(x,y);} }
  else if (mode===7) { for(let a=0;a<=6.3;a+=.1){const r=8+2*Math.sin(a*5)+2*Math.cos(a*2);a===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));} ctx.closePath(); }
  // New shapes 8-15
  else if (mode===8) { for(let i=0;i<7;i++){const a=i/7*6.283;ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*12,cy+Math.sin(a)*12);} } // star
  else if (mode===9) { for(let a=0;a<=6.3;a+=.05){const x2=cx+12*Math.sin(a),y2=cy+8*Math.sin(a*2);a===0?ctx.moveTo(x2,y2):ctx.lineTo(x2,y2);} } // lissajous
  else if (mode===10) { for(let x2=6;x2<w-6;x2++){const t2=(x2-6)/(w-12),y2=cy+Math.sin(t2*6.28)*6;x2===6?ctx.moveTo(x2,y2):ctx.lineTo(x2,y2);} ctx.stroke(); ctx.beginPath(); for(let x2=6;x2<w-6;x2++){const t2=(x2-6)/(w-12),y2=cy-Math.sin(t2*6.28)*6;x2===6?ctx.moveTo(x2,y2):ctx.lineTo(x2,y2);} } // helix
  else if (mode===11) { for(let a=0;a<=6.3;a+=.05){const r2=10/(1+Math.pow(Math.cos(a),2));const x2=cx+r2*Math.cos(a),y2=cy+r2*Math.sin(a)*Math.cos(a);a===0?ctx.moveTo(x2,y2):ctx.lineTo(x2,y2);} } // infinity
  else if (mode===12) { for(let r=3;r<=11;r+=4) ctx.arc(cx,cy,r,0,Math.PI*2); } // pulse rings
  else if (mode===13) { for(let a=0;a<=12;a+=.1){const r2=2+a*.8;const x2=cx+r2*Math.cos(a),y2=cy+r2*Math.sin(a);a===0?ctx.moveTo(x2,y2):ctx.lineTo(x2,y2);} } // spiral
  else if (mode===14) { const s=10; ctx.moveTo(cx,cy-s); ctx.lineTo(cx+s,cy); ctx.lineTo(cx,cy+s); ctx.lineTo(cx-s,cy); ctx.closePath(); } // diamond
  else if (mode===15) { const n=8; for(let i=0;i<n;i++){const x2=6+i*(w-12)/n,bh=4+Math.random()*10;ctx.moveTo(x2,cy+6);ctx.lineTo(x2,cy+6-bh);} } // spectrum
  // Sacred geometry 16-23
  else if (mode===16) { const r=5; for(let i=0;i<6;i++){const a=i/6*6.283,ox=cx+r*Math.cos(a),oy=cy+r*Math.sin(a);ctx.moveTo(ox+r,oy);ctx.arc(ox,oy,r,0,Math.PI*2);} ctx.moveTo(cx+r,cy);ctx.arc(cx,cy,r,0,Math.PI*2); } // flower of life
  else if (mode===17) { const r=5; ctx.arc(cx,cy,r,0,Math.PI*2); for(let i=0;i<6;i++){const a=i/6*6.283;ctx.moveTo(cx+r*Math.cos(a)+r,cy+r*Math.sin(a));ctx.arc(cx+r*Math.cos(a),cy+r*Math.sin(a),r,0,Math.PI*2);} } // seed of life
  else if (mode===18) { const r=4,pts=[]; for(let i=0;i<13;i++){const a=i<1?0:((i-1)/12)*6.283,d=i<1?0:i<7?r:r*2;pts.push([cx+d*Math.cos(a),cy+d*Math.sin(a)]);} for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){ctx.moveTo(pts[i][0],pts[i][1]);ctx.lineTo(pts[j][0],pts[j][1]);} } // metatron's cube
  else if (mode===19) { for(let i=0;i<4;i++){const s=4+i*2.5,a1=Math.PI/2;ctx.moveTo(cx+s*Math.cos(a1),cy-s*Math.sin(a1));for(let j=1;j<=3;j++){const a2=a1+j*2.094;ctx.lineTo(cx+s*Math.cos(a2),cy-s*Math.sin(a2));}ctx.closePath();ctx.moveTo(cx+s*Math.cos(-a1),cy-s*Math.sin(-a1));for(let j=1;j<=3;j++){const a2=-a1+j*2.094;ctx.lineTo(cx+s*Math.cos(a2),cy-s*Math.sin(a2));}ctx.closePath();} } // sri yantra
  else if (mode===20) { const r=8,d=r*0.577; ctx.arc(cx-d,cy,r,0,Math.PI*2); ctx.moveTo(cx+d+r,cy); ctx.arc(cx+d,cy,r,0,Math.PI*2); } // vesica piscis
  else if (mode===21) { const phi=1.618; let r2=0.5; for(let a=0;a<=16;a+=.1){r2=0.5*Math.pow(phi,a/6.283);const x2=cx+r2*Math.cos(a),y2=cy+r2*Math.sin(a);if(r2>14)break;a===0?ctx.moveTo(x2,y2):ctx.lineTo(x2,y2);} } // golden spiral
  else if (mode===22) { const s=10,v2=[[0,-s],[s*.866,s*.5],[-s*.866,s*.5],[0,s*.4]]; const edges=[[0,1],[0,2],[1,2],[0,3],[1,3],[2,3]]; for(const[a,b]of edges){ctx.moveTo(cx+v2[a][0],cy+v2[a][1]);ctx.lineTo(cx+v2[b][0],cy+v2[b][1]);} } // merkaba/tetrahedron
  else { const r=10; for(let a=0;a<=18.85;a+=.08){const p=2,q=3,x2=cx+(r+4*Math.cos(q*a))*Math.cos(p*a)*.5,y2=cy+(r+4*Math.cos(q*a))*Math.sin(p*a)*.5;a===0?ctx.moveTo(x2,y2):ctx.lineTo(x2,y2);} } // torus knot
  ctx.stroke();
}

function mkToggles(keys) {
  const d = document.createElement('div'); d.className = 'ctl';
  const row = document.createElement('div'); row.className = 'toggle-row';
  for (const k of keys) {
    const b = document.createElement('button');
    b.className = 'tog' + (state[k] ? ' on' : '');
    b.textContent = k.replace('wave_',''); b.id = `t-${k}`;
    b.onclick = () => { state[k] = state[k] ? 0 : 1; b.classList.toggle('on'); onParamChange(); };
    row.appendChild(b);
  }
  d.appendChild(row); return d;
}

function mkColor(keys) {
  const d = document.createElement('div');
  const p = document.createElement('div'); p.className = 'cprev'; p.id = `cp-${keys.join('-')}`;
  const [r,g,b] = [state[keys[0]], state[keys[1]], state[keys[2]]];
  const a = keys[3] ? state[keys[3]] : 1;
  p.style.background = `rgba(${r*255|0},${g*255|0},${b*255|0},${a})`;
  d.appendChild(p); return d;
}

const CUSTOM_PAL_KEY = 'visualizer-studio-custom-palettes';
let customPalettes = {};
let activePalette = null; // null = no palette constraint on random

function loadCustomPalettes() {
  try {
    const saved = localStorage.getItem(CUSTOM_PAL_KEY);
    if (saved) customPalettes = JSON.parse(saved);
  } catch(e) {}
}
function saveCustomPalettes() {
  localStorage.setItem(CUSTOM_PAL_KEY, JSON.stringify(customPalettes));
}
loadCustomPalettes();

function getAllPalettes() {
  return { ...PALETTES, ...customPalettes };
}

function applyPaletteColor(color) {
  state.wave_r = color[0]; state.wave_g = color[1]; state.wave_b = color[2];
  syncUI(); updateMilk();
}

function getRandomPaletteColor() {
  if (!activePalette) return null;
  const all = getAllPalettes();
  const pal = all[activePalette];
  if (!pal) return null;
  return pal.colors[Math.floor(Math.random() * pal.colors.length)];
}

function mkPalette() {
  const d = document.createElement('div'); d.className = 'ctl';
  d.id = 'palette-container';
  rebuildPaletteUI(d);
  return d;
}

function rebuildPaletteUI(container) {
  if (!container) container = document.getElementById('palette-container');
  if (!container) return;
  container.innerHTML = '';

  // "None" option
  const noneLabel = document.createElement('div');
  noneLabel.className = 'pal-name';
  noneLabel.innerHTML = 'palette for random <span style="color:var(--accent)">' + (activePalette ? getAllPalettes()[activePalette]?.name || activePalette : 'none') + '</span>';
  container.appendChild(noneLabel);

  const noneBtn = document.createElement('button');
  noneBtn.className = 'tog' + (!activePalette ? ' on' : '');
  noneBtn.textContent = 'none';
  noneBtn.style.cssText = 'font:9px "Courier New",monospace;margin-bottom:6px;';
  noneBtn.onclick = () => { activePalette = null; rebuildPaletteUI(); };
  container.appendChild(noneBtn);

  // Built-in palettes
  const all = getAllPalettes();
  for (const [key, pal] of Object.entries(all)) {
    const sec = document.createElement('div'); sec.className = 'pal-section';
    const name = document.createElement('div'); name.className = 'pal-name';
    name.textContent = pal.name + (customPalettes[key] ? ' *' : '');
    sec.appendChild(name);
    const grid = document.createElement('div'); grid.className = 'palette-grid';
    for (const c of pal.colors) {
      const sw = document.createElement('div'); sw.className = 'pal-swatch';
      sw.style.background = `rgb(${c[0]*255|0},${c[1]*255|0},${c[2]*255|0})`;
      sw.title = `Click: apply | Right-click: set as random palette`;
      sw.onclick = () => applyPaletteColor(c);
      sw.oncontextmenu = (e) => { e.preventDefault(); activePalette = key; rebuildPaletteUI(); };
      grid.appendChild(sw);
    }
    // Select palette button
    const selBtn = document.createElement('div');
    selBtn.className = 'pal-swatch' + (activePalette === key ? ' active' : '');
    selBtn.style.cssText = 'width:16px;height:20px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--dim);';
    selBtn.innerHTML = activePalette === key ? '&#10003;' : '&#9654;';
    selBtn.title = 'Use this palette for random';
    selBtn.onclick = () => { activePalette = activePalette === key ? null : key; rebuildPaletteUI(); };
    grid.appendChild(selBtn);
    sec.appendChild(grid);
    container.appendChild(sec);
  }

  // Custom palette creator
  const customRow = document.createElement('div'); customRow.className = 'pal-custom-row';
  const picker = document.createElement('input'); picker.type = 'color'; picker.value = '#f0a500';
  const addBtn = document.createElement('button'); addBtn.textContent = '+ add to custom';
  addBtn.onclick = () => {
    const hex = picker.value;
    const r = parseInt(hex.slice(1,3),16)/255;
    const g = parseInt(hex.slice(3,5),16)/255;
    const b = parseInt(hex.slice(5,7),16)/255;
    if (!customPalettes._custom) customPalettes._custom = { name: 'My Palette', colors: [] };
    customPalettes._custom.colors.push([+r.toFixed(3),+g.toFixed(3),+b.toFixed(3)]);
    saveCustomPalettes(); rebuildPaletteUI();
  };
  const clearBtn = document.createElement('button'); clearBtn.textContent = 'clear';
  clearBtn.onclick = () => { delete customPalettes._custom; saveCustomPalettes(); if(activePalette==='_custom') activePalette=null; rebuildPaletteUI(); };
  customRow.appendChild(picker); customRow.appendChild(addBtn); customRow.appendChild(clearBtn);
  container.appendChild(customRow);
}

function syncUI() {
  for (const g of GROUPS) for (const c of g.controls) {
    if (c.type === 'slider') {
      const sl = document.getElementById(`s-${c.key}`);
      const vl = document.getElementById(`v-${c.key}`);
      if (sl) { sl.value = state[c.key]; vl.textContent = Number(state[c.key]).toFixed(c.step<0.01?3:2); }
    } else if (c.type === 'toggles') {
      for (const k of c.keys) { const b = document.getElementById(`t-${k}`); if(b) b.className = 'tog'+(state[k]?' on':''); }
    } else if (c.type === 'wavemode') {
      document.querySelectorAll('.wm-btn').forEach(b => b.classList.remove('active'));
      const a = document.getElementById(`wm-${state.wave_mode}`);
      if(a) {
        a.classList.add('active'); a.style.display = '';
        if(state.wave_mode >= 8) { for(let j=8;j<16;j++) document.getElementById(`wm-${j}`).style.display=''; const e1=document.getElementById('wm-exp1'); if(e1) e1.textContent='- fewer shapes'; const e2=document.getElementById('wm-exp2'); if(e2) e2.style.display=''; }
        if(state.wave_mode >= 16) { for(let j=16;j<24;j++) document.getElementById(`wm-${j}`).style.display=''; const e2=document.getElementById('wm-exp2'); if(e2) e2.textContent='- sacred geometry'; }
      }
    }
  }
  // Color previews
  document.querySelectorAll('.cprev').forEach(el => {
    const ks = el.id.replace('cp-','').split('-');
    const r=state[ks[0]]||0, g=state[ks[1]]||0, b=state[ks[2]]||0, a=ks[3]?state[ks[3]]||0:1;
    el.style.background = `rgba(${r*255|0},${g*255|0},${b*255|0},${a})`;
  });
}

function onParamChange() {
  syncUI();
  updateMilk();
  // Clear preset highlight when manually changing
  document.querySelectorAll('.presets button').forEach(b => b.classList.remove('active'));
  currentPresetName = ''; // disable per-frame equations when manually tweaking
  // Restart auto-random timer if interval changed
  restartAutoIfRunning();
}

  document.getElementById('milk-out').value = [
    `[preset00]`, `fRating=3.0`, `fGammaAdj=${s.gamma.toFixed(4)}`, `fDecay=${s.decay.toFixed(4)}`,
    `fVideoEchoZoom=1.0000`, `fVideoEchoAlpha=0.0000`, `nVideoEchoOrientation=0`,
    `nWaveMode=${s.wave_mode}`, `bAdditiveWaves=${s.wave_additive}`, `bWaveDots=${s.wave_dots}`,
    `bWaveThick=${s.wave_thick}`, `bModWaveAlphaByVolume=0`, `bMaximizeWaveColor=${s.wave_brighten}`,
    `bTexWrap=1`, `bDarkenCenter=0`, `bRedBlueStereo=0`,
    `bBrighten=${s.brighten}`, `bDarken=${s.darken}`, `bSolarize=${s.solarize}`, `bInvert=${s.invert}`,
    `fWaveAlpha=${s.wave_a.toFixed(2)}`, `fWaveScale=${s.wave_scale.toFixed(4)}`,
    `fWaveSmoothing=${s.wave_smoothing.toFixed(4)}`, `fWaveParam=${s.wave_mystery.toFixed(4)}`,
    `fModWaveAlphaStart=0.7500`, `fModWaveAlphaEnd=0.9500`,
    `fWarpAnimSpeed=1.0000`, `fWarpScale=1.0000`, `fZoomExponent=1.0000`, `fShader=0.0000`,
    `zoom=${s.zoom.toFixed(4)}`, `rot=${s.rot.toFixed(4)}`,
    `cx=${s.cx.toFixed(4)}`, `cy=${s.cy.toFixed(4)}`,
    `dx=${s.dx.toFixed(4)}`, `dy=${s.dy.toFixed(4)}`,
    `warp=${s.warp.toFixed(4)}`, `sx=${s.sx.toFixed(4)}`, `sy=${s.sy.toFixed(4)}`,
    `wave_r=${s.wave_r.toFixed(2)}`, `wave_g=${s.wave_g.toFixed(2)}`, `wave_b=${s.wave_b.toFixed(2)}`,
    `wave_x=${s.wave_x.toFixed(4)}`, `wave_y=${s.wave_y.toFixed(4)}`,
    `ob_size=${s.ob_size.toFixed(4)}`, `ob_r=${s.ob_r.toFixed(2)}`, `ob_g=${s.ob_g.toFixed(2)}`, `ob_b=${s.ob_b.toFixed(2)}`, `ob_a=${s.ob_a.toFixed(2)}`,
    `ib_size=${s.ib_size.toFixed(4)}`, `ib_r=${s.ib_r.toFixed(2)}`, `ib_g=${s.ib_g.toFixed(2)}`, `ib_b=${s.ib_b.toFixed(2)}`, `ib_a=${s.ib_a.toFixed(2)}`,
  ].join('\n');

function copyMilk() {
  navigator.clipboard.writeText(document.getElementById('milk-out').value).then(() => {
    const b = document.getElementById('copy-btn'); b.textContent='Copied!'; b.classList.add('ok');
    setTimeout(()=>{b.textContent='Copy';b.classList.remove('ok');},1500);
  });
}
